AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, prod]
  BackupRetention:                          # SMELL 1
    Type: Number
    Default: 7
Conditions:
  IsProduction: !Equals [!Ref Environment, prod]
Resources:
  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Database access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0                # SMELL 2
  Database:
    Type: AWS::RDS::DBInstance
    Condition: IsProduction
    Properties:
      Engine: mysql
      DBInstanceClass: db.t3.micro
      MasterUsername: admin
      MasterUserPassword: Admin123!         # SMELL 3
      VPCSecurityGroups:
        - !GetAtt DbSecurityGroup.GroupId
  DbCpuAlarm:
    Type: AWS::CloudWatch::Alarm            # SMELL 4
    Properties:
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref Database
      ComparisonOperator: GreaterThanThreshold
      Threshold: 80
      EvaluationPeriods: 2
      Period: 300
      Statistic: Average
