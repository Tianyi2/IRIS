---
AWSTemplateFormatVersion: 2010-09-09

#Parameters:
#  ShardCount:
#    Type: Number
#    Description: Number of shards allotted to the Kinesis Stream- you can use more for higher thorughput

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      StreamModeDetails:
        StreamMode: ON_DEMAND
#      ShardCount: !Ref ShardCount
      Tags:
      - Key: Name
        Value: !Select [ 1, !Split [ '-', !Ref 'AWS::StackName' ] ]
      - Key: Project
        Value: 'DataLake'
      - Key: Service
        Value: datalake
      - Key: Owner
        Value: Electron
      - Key: Department
        Value: Tech
      - Key: Stage
        Value: LMS
      - Key: Sub-Department
        Value: Privo

Outputs:
  KinesisStream:
    Value: !Ref KinesisStream
  KinesisStreamArn:
    Value: !GetAtt KinesisStream.Arn