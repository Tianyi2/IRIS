Parameters:
  DataZoneDomainName:
    Description: Amazon DataZone domain name
    Type: String
    Default: cookbookChapter11
Resources:
  datazoneexecutionroleA8D05138:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action:
              - sts:AssumeRole
              - sts:TagSession
            Effect: Allow
            Principal:
              Service: datazone.amazonaws.com
        Version: "2012-10-17"
      ManagedPolicyArns:
        - Fn::Join:
            - ""
            - - "arn:"
              - Ref: AWS::Partition
              - :iam::aws:policy/service-role/AmazonDataZoneDomainExecutionRolePolicy
        - Fn::Join:
            - ""
            - - "arn:"
              - Ref: AWS::Partition
              - :iam::aws:policy/IAMReadOnlyAccess
  datazonedomain:
    Type: AWS::DataZone::Domain
    Properties:
      Description: Amazon DataZone domain used for a blog sample use-case for Redshift Enancements
      DomainExecutionRole:
        Fn::GetAtt:
          - datazoneexecutionroleA8D05138
          - Arn
      Name: 
        Ref: DataZoneDomainName
  salespublisher:
    Type: AWS::DataZone::Project
    Properties:
      Description: Producer project managed by the sales publishing team
      DomainIdentifier:
        Ref: datazonedomain
      Name: SalesPublisher
  marketingconsumer:
    Type: AWS::DataZone::Project
    Properties:
      Description: Consumer project managed by the marketing team
      DomainIdentifier:
        Ref: datazonedomain
      Name: MarketingConsumer          
  datazoneaccessroleF4506F82:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: datazone.amazonaws.com
        Version: "2012-10-17"
      ManagedPolicyArns:
        - Fn::Join:
            - ""
            - - "arn:"
              - Ref: AWS::Partition
              - :iam::aws:policy/service-role/AmazonDataZoneGlueManageAccessRolePolicy
        - Fn::Join:
            - ""
            - - "arn:"
              - Ref: AWS::Partition
              - :iam::aws:policy/service-role/AmazonDataZoneRedshiftManageAccessRolePolicy
      Policies:
        - PolicyName: MyCustomDataZoneDataPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'secretsmanager:GetSecretValue'
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:AmazonDataZone-*'            
  datazoneprovisioningroleE2AAC33A:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: datazone.amazonaws.com
        Version: "2012-10-17"
      ManagedPolicyArns:
        - Fn::Join:
            - ""
            - - "arn:"
              - Ref: AWS::Partition
              - :iam::aws:policy/AmazonDataZoneRedshiftGlueProvisioningPolicy
  datazoneblueprintconfiguration:
    Type: AWS::DataZone::EnvironmentBlueprintConfiguration
    Properties:
      DomainIdentifier:
        Ref: datazonedomain
      EnabledRegions:
        - Ref: AWS::Region
      EnvironmentBlueprintIdentifier: DefaultDataWarehouse
      ManageAccessRoleArn:
        Fn::GetAtt:
          - datazoneaccessroleF4506F82
          - Arn
      ProvisioningRoleArn:
        Fn::GetAtt:
          - datazoneprovisioningroleE2AAC33A
          - Arn
Outputs:
  datazoneportal:
    Value:
      Fn::GetAtt:
        - datazonedomain
        - PortalUrl
    Description: Amazon DataZone portal URL
    Export:
      Name: datazone-portal-url
  datazonedomainid:
    Value:
      Fn::GetAtt:
        - datazonedomain
        - Id
    Description: Amazon DataZone Domain Id
    Export:
      Name: datazone-domain-id     
  datazonePublisherProjectId:
    Value:
      Fn::GetAtt:
        - salespublisher
        - Id
    Description: Amazon DataZone publisher project id
    Export:
      Name: datazone-publisher-project-id      
  datazoneConsumerProjectId:
    Value:
      Fn::GetAtt:
        - marketingconsumer
        - Id
    Description: Amazon DataZone Consumer project id
    Export:
      Name: datazone-consumer-project-id          