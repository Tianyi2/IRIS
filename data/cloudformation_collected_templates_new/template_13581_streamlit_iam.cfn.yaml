AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role and Service Account for Streamlit Dashboard to access S3 bucket

Parameters:
  S3BucketName:
    Type: String
    Description: Name of the S3 bucket where evaluation logs are stored

Resources:
  # Service Account for Streamlit
  StreamlitServiceUser:
    Type: AWS::IAM::User
    Properties:
      UserName: streamlit-service-user
      Path: /service/

  # Access Keys for the Service User
  StreamlitServiceUserAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref StreamlitServiceUser

  # Policy to allow the service user to assume the role
  StreamlitAssumeRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: AssumeStreamlitRole
      Users:
        - !Ref StreamlitServiceUser
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: sts:AssumeRole
            Resource:
              !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/StreamlitS3AccessRole'

  # Role that will be assumed by the service account
  StreamlitS3AccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StreamlitS3AccessRole
      Description: IAM role for Streamlit dashboard to read logs from S3
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
                - !GetAtt StreamlitServiceUser.Arn
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StreamlitS3ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${S3BucketName}'
                  - !Sub 'arn:${AWS::Partition}:s3:::${S3BucketName}/*'

Outputs:
  StreamlitS3AccessRoleArn:
    Description: ARN of the IAM Role for Streamlit S3 Access
    Value: !GetAtt StreamlitS3AccessRole.Arn
    Export:
      Name: StreamlitS3AccessRoleArn

  StreamlitServiceUserArn:
    Description: ARN of the Streamlit Service User
    Value: !GetAtt StreamlitServiceUser.Arn
    Export:
      Name: StreamlitServiceUserArn

  StreamlitServiceUserAccessKeyId:
    Description: Access Key ID for the Streamlit Service User
    Value: !Ref StreamlitServiceUserAccessKey
    Export:
      Name: StreamlitServiceUserAccessKeyId

  StreamlitServiceUserSecretAccessKey:
    Description: Secret Access Key for the Streamlit Service User
    Value: !GetAtt StreamlitServiceUserAccessKey.SecretAccessKey
    Export:
      Name: StreamlitServiceUserSecretAccessKey
