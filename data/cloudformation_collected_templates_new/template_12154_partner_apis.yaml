  PartnerApiAnyMethod:
    Type: "AWS::ApiGateway::Method"
    Properties:
      ApiKeyRequired: false
      RestApiId: !Ref PrivoPartnerIntegrationApi
      ResourceId: !Ref PartnerProxyResource
      HttpMethod: ANY
      AuthorizationType: NONE  # Changed from CUSTOM
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 503
            ResponseTemplates:
              application/json: '{"message": "Service temporarily unavailable"}'
        RequestTemplates:
          application/json: '{"statusCode": 503}'
      MethodResponses:
        - StatusCode: 503
          ResponseModels:
            application/json: 'Error'

  # Sbl Partner resource
  SblPartnerApiAnyMethod:
    Type: "AWS::ApiGateway::Method"
    Properties:
      ApiKeyRequired: false
      RestApiId: !Ref PrivoPartnerIntegrationApi
      ResourceId: !Ref SblPartnerProxyResource
      HttpMethod: ANY
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref IronManPartnerAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SblPartnerApiLambdaArn}/invocations"

  SblPartnerApiProxyAnyPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SblPartnerApiLambdaArn
      Action: "lambda:InvokeFunction"
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PartnerApi}/*/ANY/business/{proxy+}"
        - PartnerApi: !Ref PrivoPartnerIntegrationApi

  CallBackResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref PrivoPartnerIntegrationApi
      ParentId: !GetAtt PrivoPartnerIntegrationApi.RootResourceId
      PathPart: 'callback'

  CallBackProxyResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref PrivoPartnerIntegrationApi
      ParentId: !Ref CallBackResource
      PathPart: '{proxy+}'

  PartnerCallBackApiAnyMethod:
    Type: "AWS::ApiGateway::Method"
    Properties:
      ApiKeyRequired: true
      RestApiId: !Ref PrivoPartnerIntegrationApi
      ResourceId: !Ref CallBackProxyResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PrivoPartnerWebhookApiArn}/invocations"

  PartnerCallBackApiProxyAnyPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PrivoPartnerWebhookApiArn
      Action: "lambda:InvokeFunction"
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PartnerApi}/*/ANY/callback/{proxy+}"
        - PartnerApi: !Ref PrivoPartnerIntegrationApi

  MicroWebResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref MicroWebApiId
      ParentId: !Ref MicroWebApiParentResourceId
      PathPart: 'microWeb'
  MicroWebVendorResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref MicroWebApiId
      ParentId: !Ref MicroWebResource
      PathPart: 'vendor'
  MicroWebKsfInternalResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref MicroWebApiId
      ParentId: !Ref MicroWebResource
      PathPart: 'ksfInternal'
  MicroWebVendorProxyResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref MicroWebApiId
      ParentId: !Ref MicroWebVendorResource
      PathPart: '{proxy+}'
  MicroWebKsfInternalProxyResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref MicroWebApiId
      ParentId: !Ref MicroWebKsfInternalResource
      PathPart: '{proxy+}'
  MicroWebVendorApiAnyMethod:
    Type: "AWS::ApiGateway::Method"
    Properties:
      ApiKeyRequired: false
      RestApiId: !Ref MicroWebApiId
      ResourceId: !Ref MicroWebVendorProxyResource
      HttpMethod: ANY
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref AntmanGatewayIronManAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MicroWebServiceLambdaArn}/invocations"
  MicroWebVendorApiProxyAnyPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MicroWebServiceLambdaArn
      Action: "lambda:InvokeFunction"
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PartnerApi}/*/ANY/microWeb/vendor/{proxy+}"
        - PartnerApi: !Ref MicroWebApiId
  MicroWebKsfInternalApiAnyMethod:
    Type: "AWS::ApiGateway::Method"
    Properties:
      ApiKeyRequired: true
      RestApiId: !Ref MicroWebApiId
      ResourceId: !Ref MicroWebKsfInternalProxyResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MicroWebServiceLambdaArn}/invocations"
  MicroWebKsfInternalApiProxyAnyPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MicroWebServiceLambdaArn
      Action: "lambda:InvokeFunction"
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PartnerApi}/*/ANY/microWeb/ksfInternal/{proxy+}"
        - PartnerApi: !Ref MicroWebApiId