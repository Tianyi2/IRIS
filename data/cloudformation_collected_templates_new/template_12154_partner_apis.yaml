AWSTemplateFormatVersion: "2010-09-09"
Description: Partner Requests Lambda API Gateway with Ironman Lambda Token Authorizer

Parameters:
  EnvironmentType:
    Type: String
    Description: Environment of Deployment
    AllowedValues: [ "dev", "qa", "qa2", "uat", "int", "int2", "production" ]
  IronManPartnerAuthorizerLambdaArn:
    Type: String
    Description: Iron Man partner authorizer
  PrivoPartnerApiLambdaArn:
    Type: String
    Description: Privo partner fast api proxy lambda
  PrivoPartnerWebhookApiArn:
    Type: String
    Description: Privo Partner Webhook lambda arn
  SblPartnerApiLambdaArn:
    Type: String
    Description: SBL partner fast api proxy lambda
  MicroWebServiceLambdaArn:
    Type: String
    Description: Micro Web Service fast api lambda
  MicroWebApiId:
    Type: String
    Description: Micro Web API gateway id
  MicroWebApiParentResourceId:
    Type: String
    Description: Micro Web partner resource id
  AntmanGatewayIronManAuthorizer:
    Type: String
    Description: Iron man authorizer of antman api gateway

Conditions:
  EnvironmentProd: !Equals [ !Ref EnvironmentType, "production" ]
  EnvironmentInt: !Equals [ !Ref EnvironmentType, "int" ]

Resources:
  PrivoPartnerIntegrationApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: Privo Partner Integration API
      BinaryMediaTypes:
        - multipart/form-data
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: Service
          Value: Morpheus
        - Key: Owner
          Value: Quarks
        - Key: Department
          Value: Tech
        - Key: Stage
          Value: None
        - Key: Sub-Department
          Value: Privo
  # Gateway authorizer which uses Ironman Partner auth lambda
  IronManPartnerAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: !Sub ${AWS::StackName}-Ironman-Partner-LambdaAuthorizer
      Type: REQUEST
      RestApiId: !Ref PrivoPartnerIntegrationApi
      AuthorizerUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${IronManPartnerAuthorizerLambdaArn}/invocations"
      AuthorizerResultTtlInSeconds: 0
      IdentitySource: "method.request.header.x-api-key,method.request.header.username"

  # Grant authorizer permission to invoke Ironman partner auth lambda
  IronManPartnerAuthorizerPermission:
    Type: "AWS::Lambda::Permission"
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref IronManPartnerAuthorizerLambdaArn
      Principal: "apigateway.amazonaws.com"
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PrivoPartnerIntegrationApi}/authorizers/${IronManPartnerAuthorizer}"

  PartnerResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref PrivoPartnerIntegrationApi
      ParentId: !GetAtt PrivoPartnerIntegrationApi.RootResourceId
      PathPart: 'partner'
  PartnerProxyResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref PrivoPartnerIntegrationApi
      ParentId: !Ref PartnerResource
      PathPart: '{proxy+}'

  SblPartnerResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref PrivoPartnerIntegrationApi
      ParentId: !GetAtt PrivoPartnerIntegrationApi.RootResourceId
      PathPart: 'business'
  SblPartnerProxyResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref PrivoPartnerIntegrationApi
      ParentId: !Ref SblPartnerResource
      PathPart: '{proxy+}'


