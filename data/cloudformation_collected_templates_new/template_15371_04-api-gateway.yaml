AWSTemplateFormatVersion: '2010-09-09'
Description: 'API Gateway with VPC Link for EKS backend'

Parameters:
  EnvironmentName:
    Type: String
    Default: claim-status-prod
    Description: Environment name prefix
  
  NLBArn:
    Type: String
    Description: Network Load Balancer ARN

  NLBHostname:
    Type: String
    Description: Network Load Balancer DNS name

Resources:
  # VPC Link for API Gateway to NLB
  VPCLink:
    Type: AWS::ApiGateway::VpcLink
    Properties:
      Name: !Sub ${EnvironmentName}-vpc-link
      TargetArns:
        - !Ref NLBArn

  # REST API Gateway
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub ${EnvironmentName}-api
      Description: Claim Status API with GenAI capabilities
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-api

  # API Gateway Request Validator
  RequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      Name: !Sub ${EnvironmentName}-request-validator
      RestApiId: !Ref RestApi
      ValidateRequestBody: true
      ValidateRequestParameters: true

  # CloudWatch Logs for API Gateway
  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/${EnvironmentName}-api
      RetentionInDays: 30

  # API Gateway CloudWatch Role
  ApiGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  # API Gateway Account
  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchRole.Arn

  # API Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - GetClaimMethod
      - SummarizeClaimMethod
      - HealthCheckMethod
    Properties:
      RestApiId: !Ref RestApi
      Description: !Sub ${EnvironmentName} API Deployment

  # API Stage
  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: prod
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      Description: Production stage
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayLogGroup.Arn
        Format: $context.requestId $context.extendedRequestId $context.identity.sourceIp $context.requestTime $context.routeKey $context.status
      MethodSettings:
        - ResourcePath: /*
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
      TracingEnabled: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-api-stage

  # Resources
  ClaimsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: claims

  ClaimIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref ClaimsResource
      PathPart: '{id}'

  SummarizeResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref ClaimIdResource
      PathPart: summarize

  HealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: health

  # Methods
  GetClaimMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ClaimIdResource
      HttpMethod: GET
      AuthorizationType: NONE
      RequestValidatorId: !Ref RequestValidator
      RequestParameters:
        method.request.path.id: true
      Integration:
        Type: HTTP_PROXY
        IntegrationHttpMethod: GET
        Uri: !Sub http://${NLBHostname}/claims/{id}
        ConnectionType: VPC_LINK
        ConnectionId: !Ref VPCLink
        RequestParameters:
          integration.request.path.id: method.request.path.id
      MethodResponses:
        - StatusCode: 200
        - StatusCode: 404
        - StatusCode: 500

  SummarizeClaimMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref SummarizeResource
      HttpMethod: POST
      AuthorizationType: NONE
      RequestValidatorId: !Ref RequestValidator
      RequestParameters:
        method.request.path.id: true
      Integration:
        Type: HTTP_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub http://${NLBHostname}/claims/{id}/summarize
        ConnectionType: VPC_LINK
        ConnectionId: !Ref VPCLink
        RequestParameters:
          integration.request.path.id: method.request.path.id
      MethodResponses:
        - StatusCode: 200
        - StatusCode: 404
        - StatusCode: 500

  HealthCheckMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref HealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: HTTP_PROXY
        IntegrationHttpMethod: GET
        Uri: !Sub http://${NLBHostname}/health
        ConnectionType: VPC_LINK
        ConnectionId: !Ref VPCLink
      MethodResponses:
        - StatusCode: 200

  # Usage Plan
  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ApiStage
    Properties:
      UsagePlanName: !Sub ${EnvironmentName}-usage-plan
      Description: Usage plan for Claim Status API
      ApiStages:
        - ApiId: !Ref RestApi
          Stage: !Ref ApiStage
      Throttle:
        BurstLimit: 100
        RateLimit: 50
      Quota:
        Limit: 10000
        Period: DAY

Outputs:
  ApiId:
    Description: API Gateway ID
    Value: !Ref RestApi
    Export:
      Name: !Sub ${EnvironmentName}-ApiId

  ApiEndpoint:
    Description: API Gateway Endpoint
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod
    Export:
      Name: !Sub ${EnvironmentName}-ApiEndpoint

  VPCLinkId:
    Description: VPC Link ID
    Value: !Ref VPCLink
    Export:
      Name: !Sub ${EnvironmentName}-VPCLinkId
