service: dynatrace-sample-app

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 256
  timeout: 30
  
  # Environment variables for all functions
  environment:
    STAGE: ${self:provider.stage}
    ORDERS_TABLE: ${self:service}-orders-${self:provider.stage}
    ORDERS_QUEUE_URL: !Ref OrdersQueue
    
    # Dynatrace configuration
    DT_TENANT: ${env:DT_TENANT}
    DT_CLUSTER_ID: "-1"
    DT_CONNECTION_BASE_URL: ${env:DT_CONNECTION_BASE_URL}
    DT_CONNECTION_AUTH_TOKEN: ${env:DT_PAAS_TOKEN}
    AWS_LAMBDA_EXEC_WRAPPER: /opt/dynatrace
    DT_OPEN_TELEMETRY_ENABLE_INTEGRATION: "true"
    DT_LOGLEVELCON: "info"
    DT_CUSTOM_PROP: "team=platform service=orders environment=${self:provider.stage}"
  
  # IAM permissions
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt OrdersTable.Arn
            - !Sub "${OrdersTable.Arn}/index/*"
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource:
            - !GetAtt OrdersQueue.Arn
  
  # API Gateway configuration
  httpApi:
    cors: true

# Custom variables
custom:
  # Dynatrace Lambda Layer ARN
  dynatraceLayer: arn:aws:lambda:${self:provider.region}:725887861453:layer:Dynatrace_OneAgent:1

# Lambda functions
functions:
  createOrder:
    handler: src/handlers/createOrder.handler
    description: Create a new order
    layers:
      - ${self:custom.dynatraceLayer}
    events:
      - httpApi:
          path: /orders
          method: POST
    tags:
      function: create-order
      criticality: high

  getOrder:
    handler: src/handlers/getOrder.handler
    description: Get order by ID
    layers:
      - ${self:custom.dynatraceLayer}
    events:
      - httpApi:
          path: /orders/{orderId}
          method: GET
    tags:
      function: get-order

  listOrders:
    handler: src/handlers/listOrders.handler
    description: List all orders
    layers:
      - ${self:custom.dynatraceLayer}
    events:
      - httpApi:
          path: /orders
          method: GET
    tags:
      function: list-orders

  processOrder:
    handler: src/handlers/processOrder.handler
    description: Process order from queue
    layers:
      - ${self:custom.dynatraceLayer}
    events:
      - sqs:
          arn: !GetAtt OrdersQueue.Arn
          batchSize: 10
    tags:
      function: process-order
      criticality: high

# AWS Resources
resources:
  Resources:
    # DynamoDB Table
    OrdersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.ORDERS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: orderId
            AttributeType: S
          - AttributeName: customerId
            AttributeType: S
        KeySchema:
          - AttributeName: orderId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: CustomerIndex
            KeySchema:
              - AttributeName: customerId
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Stage
            Value: ${self:provider.stage}

    # SQS Queue
    OrdersQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-orders-${self:provider.stage}
        VisibilityTimeout: 180
        MessageRetentionPeriod: 1209600
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt OrdersDLQ.Arn
          maxReceiveCount: 3
        Tags:
          - Key: Service
            Value: ${self:service}

    # Dead Letter Queue
    OrdersDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-orders-dlq-${self:provider.stage}
        MessageRetentionPeriod: 1209600
        Tags:
          - Key: Service
            Value: ${self:service}

  Outputs:
    ApiEndpoint:
      Description: API Gateway endpoint URL
      Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    OrdersTableName:
      Description: DynamoDB orders table name
      Value: !Ref OrdersTable
    OrdersQueueUrl:
      Description: SQS queue URL for orders
      Value: !Ref OrdersQueue

