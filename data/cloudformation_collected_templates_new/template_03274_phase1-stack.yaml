# infrastructure/phase1-stack.yaml
AWSTemplateFormatVersion: '2010-09-09'
Description: HDB Multi-Agent Advisor - Phase 1 Foundation Stack

Parameters:
  ProjectPrefix:
    Type: String
    Default: hdbma
    Description: The overall project prefix (e.g., hdbma).
  EnvironmentName:
    Type: String
    Default: dev
    Description: The environment tag (e.g., dev, prod, test).
  VersionTag:
    Type: String
    Default: v1
    Description: The version tag for the deployment (e.g., v1, v2).
  BedrockModelId:
    Type: String
    Default: amazon.nova-lite-v1:0
    Description: The Bedrock Model ID to use for the Strands AgentCore.
  AgentArn:
    Type: String
    Description: The AgentCore ARN from .bedrock_agentcore.yaml

# No mappings needed - using direct parameter substitution
      
Resources:
  # --- S3 Bucket for Static Website Hosting ---
  WebHostingBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub "${ProjectPrefix}-web-${EnvironmentName}-${VersionTag}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Version
          Value: !Ref VersionTag

  # S3 Bucket Policy
  WebHostingBucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref WebHostingBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${WebHostingBucket}/*'

  # --- DynamoDB Table for Agent Memory ---
  AgentMemoryTable:
    Type: 'AWS::DynamoDB::Table'
    Properties:
      TableName: !Sub "${ProjectPrefix}-memory-${EnvironmentName}-${VersionTag}"
      AttributeDefinitions:
        - AttributeName: SessionId
          AttributeType: S
      KeySchema:
        - AttributeName: SessionId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Version
          Value: !Ref VersionTag
  
  # --- IAM Role for Lambda Function ---
  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub "${ProjectPrefix}-lambda-role-${EnvironmentName}-${VersionTag}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: !Sub "${ProjectPrefix}-dynamodb-bedrock-policy-${EnvironmentName}-${VersionTag}"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                Resource: !GetAtt AgentMemoryTable.Arn
              - Effect: Allow
                Action: 
                  - bedrock:InvokeModel
                  - bedrock-agentcore:InvokeAgentRuntime
                Resource: '*' 
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Version
          Value: !Ref VersionTag
  
  # --- Lambda Function (Chat Handler) ---
  ChatHandlerLambda:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-chat-handler-${EnvironmentName}-${VersionTag}"
      Handler: handler.handler
      Runtime: python3.11 
      Role: !GetAtt LambdaExecutionRole.Arn
      Code: ../lambda/chat_handler/
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          DDB_TABLE_NAME: !Ref AgentMemoryTable
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          AGENT_ARN: !Ref AgentArn
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Version
          Value: !Ref VersionTag

  # --- API Gateway v2 (HTTP API) ---
  HttpApi:
    Type: 'AWS::ApiGatewayV2::Api'
    Properties:
      Name: !Sub "${ProjectPrefix}-api-${EnvironmentName}-${VersionTag}"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - '*'
        AllowOrigins:
          - '*' 
      Tags:
        Project: !Ref ProjectPrefix
        Environment: !Ref EnvironmentName
        Version: !Ref VersionTag

  # API Gateway Integration (Connects API to Lambda)
  ApiGatewayIntegration:
    Type: 'AWS::ApiGatewayV2::Integration'
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ChatHandlerLambda.Arn
      PayloadFormatVersion: '2.0'
  
  # API Gateway Route (The actual endpoint)
  ApiGatewayRoute:
    Type: 'AWS::ApiGatewayV2::Route'
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /chat' 
      Target: !Join [ '/', [ 'integrations', !Ref ApiGatewayIntegration ] ]
      AuthorizationType: NONE

  # API Gateway Stage (Deploys the API)
  ApiGatewayStage:
    Type: 'AWS::ApiGatewayV2::Stage'
    Properties:
      ApiId: !Ref HttpApi
      StageName: !Ref EnvironmentName
      AutoDeploy: true
      
  # Permission for API Gateway to invoke the Lambda Function
  LambdaInvokePermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !GetAtt ChatHandlerLambda.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/${EnvironmentName}/*'

# --- Outputs ---
Outputs:
  S3BucketName:
    Description: The S3 Bucket Name for website files.
    Value: !Ref WebHostingBucket
  WebsiteURL:
    Description: The URL of the HDB Assistant chat interface.
    Value: !GetAtt WebHostingBucket.WebsiteURL
  ApiGatewayEndpoint:
    Description: The Base URL for the API Gateway endpoint.
    Value: !GetAtt HttpApi.ApiEndpoint