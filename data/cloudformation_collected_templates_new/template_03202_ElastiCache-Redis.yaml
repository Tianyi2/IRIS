AWSTemplateFormatVersion: "2010-09-09"
Description: Simple ElastiCache Redis Cluster

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the cache will be deployed

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for the cache subnet group

  CacheNodeType:
    Type: String
    Default: cache.t3.micro
    AllowedValues:
      - cache.t3.micro
      - cache.t3.small
      - cache.t3.medium
    Description: ElastiCache node type

Resources:

  CacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow Redis access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: 10.0.0.0/16  # Adapter selon ton réseau

  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Subnet group for ElastiCache
      SubnetIds: !Ref SubnetIds

  RedisCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      Engine: redis
      CacheNodeType: !Ref CacheNodeType
      NumCacheNodes: 1
      VpcSecurityGroupIds:
        - !GetAtt CacheSecurityGroup.GroupId
      CacheSubnetGroupName: !Ref CacheSubnetGroup
      Port: 6379

Outputs:
  RedisEndpoint:
    Description: Redis endpoint address
    Value: !GetAtt RedisCluster.RedisEndpoint.Address

  RedisPort:
    Description: Redis port
    Value: !GetAtt RedisCluster.RedisEndpoint.Port
