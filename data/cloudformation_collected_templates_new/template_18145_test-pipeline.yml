Resources:
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      RoleArn: !GetAtt PipelineRole.Arn
      Stages:
        - Name: Source
          Actions:
            - Name: SourceAction
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeCommit
                Version: '1'
              Configuration:
                RepositoryName: '{{REPO_NAME}}'  # Replace with your CodeCommit repository name
                BranchName: main
        - Name: Test
          Actions:
            - Name: TestAction
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: '{{TEST_PROJECT_NAME}}'  # Replace with your CodeBuild test project name
        - Name: Deploy
          Actions:
            - Name: DeployAction
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: ECS
                Version: '1'
              Configuration:
                ClusterName: '{{ECS_CLUSTER_NAME}}'  # Replace with your ECS cluster name
                ServiceName: '{{ECS_SERVICE_NAME}}'  # Replace with your ECS service name
