AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Batch Environment for Inspect Evals

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Environment name
  MaxvCpus:
    Type: Number
    Default: 256
    Description: Maximum vCPUs for compute environments
  InstanceTypes:
    Type: CommaDelimitedList
    Default: r5.4xlarge,r5.8xlarge  # $1.184/hr (16 vCPUs, 128 GiB), $2.368/hr (32 vCPUs, 256 GiB)
    Description: Instance types to use for EC2 compute environment
  LargeInstanceTypes:
    Type: CommaDelimitedList
    Default: r5.4xlarge,r5.8xlarge,r5.12xlarge,r5.16xlarge  # Including larger instances for high-storage jobs
    Description: Instance types to use for large storage EC2 compute environment
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where resources will be created
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of subnet IDs where compute resources will be launched
  DiskSizeGB:
    Type: Number
    Default: 100
    Description: Size of the EBS volume in GB for EC2 instances
  LargeDiskSizeGB:
    Type: Number
    Default: 1000
    Description: Size of the EBS volume in GB for large storage EC2 instances

Resources:
  # IAM Roles
  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  BatchInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role

  BatchInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref BatchInstanceRole

  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for AWS Batch compute environment
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          # FromPort: -1  # ignored when IpProtocol is -1
          # ToPort: -1  # ignored when IpProtocol is -1
          CidrIp: 0.0.0.0/0

  # Fargate Compute Environment
  ComputeEnvironmentFargate:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      # Setting the name results in not being able to update the stack!
      # ComputeEnvironmentName: !Sub inspect-evals-fargate-${Environment}
      ComputeResources:
        Type: FARGATE
        MaxvCpus: !Ref MaxvCpus
        SecurityGroupIds:
          - !Ref BatchSecurityGroup
        Subnets: !Ref SubnetIds
      State: ENABLED
      Tags:
        ies:Environment: !Ref Environment
        ies:ComputeEnvironment: Fargate

  # EC2 Launch Template for specifying disk size
  EC2LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub inspect-evals-launch-template-${Environment}
      VersionDescription: Template for AWS Batch with increased disk space
      LaunchTemplateData:
        BlockDeviceMappings:
          - DeviceName:  '/dev/xvda'
            Ebs:
              Encrypted: true
              VolumeSize: !Ref DiskSizeGB
              VolumeType: gp2

  # EC2 Launch Template for large storage jobs (1TB)
  EC2LargeStorageLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub inspect-evals-large-storage-launch-template-${Environment}
      VersionDescription: Template for AWS Batch with 1TB disk space
      LaunchTemplateData:
        BlockDeviceMappings:
          - DeviceName:  '/dev/xvda'
            Ebs:
              Encrypted: true
              VolumeSize: !Ref LargeDiskSizeGB
              VolumeType: gp3

  # EC2 Compute Environment for Docker-in-Docker
  ComputeEnvironmentEC2:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      # Setting the name results in not being able to update the stack!
      # ComputeEnvironmentName: !Sub inspect-evals-ec2-${Environment}
      ComputeResources:
        Type: EC2
        MaxvCpus: !Ref MaxvCpus
        InstanceTypes: !Ref InstanceTypes
        Subnets: !Ref SubnetIds
        SecurityGroupIds:
          - !Ref BatchSecurityGroup
        InstanceRole: !Ref BatchInstanceProfile
        MinvCpus: 0
        DesiredvCpus: 0
        LaunchTemplate:
          LaunchTemplateId: !Ref EC2LaunchTemplate
          Version: !GetAtt EC2LaunchTemplate.LatestVersionNumber
      State: ENABLED
      Tags:
        ies:Environment: !Ref Environment
        ies:ComputeEnvironment: EC2

  # Job Queue for Fargate jobs
  JobQueueFargate:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: !Sub inspect-evals-queue-fargate-${Environment}
      Priority: 1
      State: ENABLED
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref ComputeEnvironmentFargate
      Tags:
        ies:Environment: !Ref Environment
        ies:ComputeEnvironment: Fargate

  # Job Queue for Docker-in-Docker (EC2) jobs
  JobQueueEC2:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: !Sub inspect-evals-queue-ec2-${Environment}
      Priority: 1
      State: ENABLED
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref ComputeEnvironmentEC2
      Tags:
        ies:Environment: !Ref Environment
        ies:ComputeEnvironment: EC2

  # EC2 Compute Environment for Large Storage Jobs (1TB)
  ComputeEnvironmentLargeStorage:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: EC2
        MaxvCpus: !Ref MaxvCpus
        InstanceTypes: !Ref LargeInstanceTypes
        Subnets: !Ref SubnetIds
        SecurityGroupIds:
          - !Ref BatchSecurityGroup
        InstanceRole: !Ref BatchInstanceProfile
        MinvCpus: 0
        DesiredvCpus: 0
        LaunchTemplate:
          LaunchTemplateId: !Ref EC2LargeStorageLaunchTemplate
          Version: !GetAtt EC2LargeStorageLaunchTemplate.LatestVersionNumber
      State: ENABLED
      Tags:
        ies:Environment: !Ref Environment
        ies:ComputeEnvironment: LargeStorage

  # Job Queue for Large Storage jobs
  JobQueueLargeStorage:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: !Sub inspect-evals-queue-large-storage-${Environment}
      Priority: 1
      State: ENABLED
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref ComputeEnvironmentLargeStorage
      Tags:
        ies:Environment: !Ref Environment
        ies:ComputeEnvironment: LargeStorage

Outputs:
  JobQueueArn:
    Description: ARN of the Fargate job queue
    Value: !Ref JobQueueFargate
    Export:
      Name: !Sub inspect-evals-job-queue-fargate-${Environment}

  JobQueueEC2Arn:
    Description: ARN of the job queue for Docker-in-Docker (EC2) jobs
    Value: !Ref JobQueueEC2
    Export:
      Name: !Sub inspect-evals-job-queue-ec2-${Environment}

  JobQueueLargeStorageArn:
    Description: ARN of the job queue for large storage jobs
    Value: !Ref JobQueueLargeStorage
    Export:
      Name: !Sub inspect-evals-job-queue-large-storage-${Environment}

  ComputeEnvironmentFargateArn:
    Description: ARN of the Fargate compute environment
    Value: !Ref ComputeEnvironmentFargate
    Export:
      Name: !Sub inspect-evals-compute-env-fargate-${Environment}

  ComputeEnvironmentEC2Arn:
    Description: ARN of the compute environment for Docker-in-Docker (EC2) jobs
    Value: !Ref ComputeEnvironmentEC2
    Export:
      Name: !Sub inspect-evals-compute-env-ec2-${Environment}

  ComputeEnvironmentLargeStorageArn:
    Description: ARN of the compute environment for large storage jobs
    Value: !Ref ComputeEnvironmentLargeStorage
    Export:
      Name: !Sub inspect-evals-compute-env-large-storage-${Environment}
