Description: RoboSystems Dagster Orchestration - ECS Fargate Only

Parameters:
  # Environment
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - prod
      - staging
    Description: Environment name (prod or staging)
    ConstraintDescription: Must be prod or staging

  # Infrastructure & Networking
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for ECS tasks
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnet IDs for ECS tasks (comma-separated)

  # Container & Application Configuration
  ECRRepositoryUrl:
    Type: String
    Description: Full ECR repository URL (e.g., 123456789.dkr.ecr.us-east-1.amazonaws.com/robosystems)
  ECRImageTag:
    Type: String
    Description: Docker image tag
    Default: latest

  # Fargate Configuration
  # Valid CPU/Memory combinations:
  # 512 CPU: 1024-4096 MB | 1024 CPU: 2048-8192 MB | 2048 CPU: 4096-16384 MB
  DaemonCpu:
    Type: String
    Default: "1024"
    Description: CPU units for Dagster daemon (1024 = 1 vCPU)
    AllowedValues: ["512", "1024", "2048"]
  DaemonMemory:
    Type: String
    Default: "2048"
    Description: Memory in MiB for Dagster daemon
    AllowedValues: ["2048", "4096", "8192"]
  WebserverCpu:
    Type: String
    Default: "512"
    Description: CPU units for Dagster webserver (512 = 0.5 vCPU)
    AllowedValues: ["512", "1024", "2048"]
  WebserverMemory:
    Type: String
    Default: "1024"
    Description: Memory in MiB for Dagster webserver
    AllowedValues: ["1024", "2048", "4096"]
  # Run Job Configuration (Fargate)
  # Default task definition provides base resources. Jobs override via Dagster tags:
  #   ecs/cpu, ecs/memory, ecs/ephemeral_storage, ecs/run_task_kwargs
  # See robosystems/dagster/jobs/*.py for job-specific resource configurations.
  RunJobCpu:
    Type: String
    Default: "512"
    Description: Default CPU units for run jobs (0.5 vCPU). Jobs can override via ecs/cpu tag.
  RunJobMemory:
    Type: String
    Default: "2048"
    Description: Default memory in MiB for run jobs (2 GB). Jobs can override via ecs/memory tag.

  MaxConcurrentRuns:
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 200
    Description: Maximum concurrent Dagster runs (QueuedRunCoordinator)

  # Capacity Provider Configuration (Spot vs On-Demand)
  # Daemon: Orchestration process - interruption causes brief delay in job scheduling
  DaemonFargateWeight:
    Type: Number
    Default: 20
    MinValue: 0
    MaxValue: 100
    Description: Weight for FARGATE (On-Demand) capacity provider for daemon
  DaemonFargateSpotWeight:
    Type: Number
    Default: 80
    MinValue: 0
    MaxValue: 100
    Description: Weight for FARGATE_SPOT capacity provider for daemon
  # Webserver: UI and bastion tunnel access - configurable Spot ratio
  WebserverFargateWeight:
    Type: Number
    Default: 20
    MinValue: 0
    MaxValue: 100
    Description: Weight for FARGATE (On-Demand) capacity provider for webserver
  WebserverFargateSpotWeight:
    Type: Number
    Default: 80
    MinValue: 0
    MaxValue: 100
    Description: Weight for FARGATE_SPOT capacity provider for webserver

  # Base (minimum guaranteed On-Demand tasks) - set to 1+ for guaranteed availability
  DaemonFargateBase:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 5
    Description: Minimum daemon tasks guaranteed on FARGATE (On-Demand)
  WebserverFargateBase:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 5
    Description: Minimum webserver tasks guaranteed on FARGATE (On-Demand)

  # Cache Configuration
  ValkeyUrl:
    Type: String
    Description: Valkey ElastiCache endpoint URL
    AllowedPattern: ^rediss?://.*:[0-9]+$
  ValkeyClientSecurityGroupId:
    Type: String
    Description: Security group ID for applications connecting to Valkey
    AllowedPattern: ^sg-[0-9a-f]+$

  # Database Configuration (uses existing RDS)
  DatabaseEndpoint:
    Type: String
    Description: "PostgreSQL database endpoint hostname"
  DatabasePort:
    Type: String
    Description: "PostgreSQL database port"
    Default: "5432"
  DatabaseSecurityGroupId:
    Type: String
    Description: Security group ID for PostgreSQL access
    AllowedPattern: ^sg-[0-9a-f]+$

  # Bastion Access (for port forwarding)
  BastionSecurityGroupId:
    Type: String
    Description: Security group ID for bastion host access
    AllowedPattern: ^(sg-[0-9a-f]+)?$
    Default: ""

  # API Access (for job submission via GraphQL)
  ApiSecurityGroupId:
    Type: String
    Description: Security group ID for API service to submit Dagster jobs
    AllowedPattern: ^(sg-[0-9a-f]+)?$
    Default: ""

  # Monitoring
  LogRetentionDays:
    Type: Number
    Default: 14
    MinValue: 1
    MaxValue: 365
    Description: CloudWatch log retention in days
  ContainerInsightsEnabled:
    Type: String
    Default: disabled
    AllowedValues: ["enabled", "disabled"]
    Description: Enable/disable ECS Container Insights

  # Tagging Configuration
  ServiceTag:
    Type: String
    Default: RoboSystems
    Description: Service tag for resource identification and billing
  ComponentTag:
    Type: String
    Default: Dagster
    Description: Component tag for resource identification and billing

  # S3 Bucket Configuration (from S3 stack outputs)
  SharedRawBucketArn:
    Type: String
    Description: ARN of shared raw data bucket (from S3 stack output)
  SharedProcessedBucketArn:
    Type: String
    Description: ARN of shared processed data bucket (from S3 stack output)
  DeploymentBucketArn:
    Type: String
    Description: ARN of deployment bucket (from S3 stack output)
  UserDataBucketArn:
    Type: String
    Description: ARN of user data bucket (from S3 stack output)
  PublicDataBucketArn:
    Type: String
    Description: ARN of public data bucket (from S3 stack output)
  LogsBucketArn:
    Type: String
    Description: ARN of logs bucket for Dagster compute logs (from S3 stack output)
  PublicDataCDNURL:
    Type: String
    Description: CloudFront CDN URL for public data (from S3 stack output)

Conditions:
  HasBastionAccess: !Not [!Equals [!Ref BastionSecurityGroupId, ""]]
  HasApiAccess: !Not [!Equals [!Ref ApiSecurityGroupId, ""]]

Resources:
  # ========================================
  # SERVICE DISCOVERY (Internal DNS)
  # ========================================
  DagsterNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: !Sub dagster.${Environment}.robosystems.local
      Vpc: !Ref VpcId
      Description: !Sub Private DNS namespace for Dagster services (${Environment})
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag

  WebserverServiceDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: webserver
      NamespaceId: !Ref DagsterNamespace
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
        RoutingPolicy: MULTIVALUE
      HealthCheckCustomConfig:
        FailureThreshold: 1
      Description: Dagster webserver service discovery
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation

  # ========================================
  # ECS CLUSTER (Fargate Only)
  # ========================================
  DagsterCluster:
    Type: AWS::ECS::Cluster
    DeletionPolicy: Delete
    UpdateReplacePolicy: Retain
    Properties:
      ClusterName: !Sub robosystems-dagster-${Environment}-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: !Ref ContainerInsightsEnabled
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE_SPOT
          Weight: 80
        - CapacityProvider: FARGATE
          Weight: 20
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation

  # ========================================
  # SECURITY GROUPS
  # ========================================
  DagsterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Dagster ECS tasks
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub sg-robosystems-dagster-${Environment}
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag

  # Allow internal communication between Dagster components
  DagsterInternalIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DagsterSecurityGroup
      IpProtocol: -1
      SourceSecurityGroupId: !Ref DagsterSecurityGroup
      Description: Allow internal Dagster component communication

  # Allow bastion to access webserver (for port forwarding)
  BastionToDagsterIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasBastionAccess
    Properties:
      GroupId: !Ref DagsterSecurityGroup
      IpProtocol: tcp
      FromPort: 3000
      ToPort: 3000
      SourceSecurityGroupId: !Ref BastionSecurityGroupId
      Description: Allow bastion host to access Dagster webserver

  # Allow API to submit jobs to Dagster webserver (GraphQL)
  ApiToDagsterIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasApiAccess
    Properties:
      GroupId: !Ref DagsterSecurityGroup
      IpProtocol: tcp
      FromPort: 3000
      ToPort: 3000
      SourceSecurityGroupId: !Ref ApiSecurityGroupId
      Description: Allow API service to submit Dagster jobs via GraphQL

  # ========================================
  # LOG GROUPS
  # ========================================
  DagsterLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    Properties:
      LogGroupName: !Sub /robosystems/${Environment}/dagster
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag

  # ========================================
  # IAM ROLES
  # ========================================
  DagsterTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub robosystems-dagster-task-role-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DagsterTaskPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Secrets Manager - GetSecretValue with resource restrictions
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:robosystems/${Environment}-*"
                  - !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:robosystems/${Environment}/*"
              # SSM Parameter Store permissions for feature flags and tuning parameters
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/robosystems/${Environment}/features/*"
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/robosystems/${Environment}/tuning/*"
              # Secrets Manager - ListSecrets for ECS run launcher tag-based discovery
              # Note: ListSecrets doesn't support resource-level permissions
              - Effect: Allow
                Action:
                  - secretsmanager:ListSecrets
                Resource: "*"
              # KMS for secrets
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                Resource:
                  - !Sub "arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/secretsmanager"
                Condition:
                  StringEquals:
                    "kms:ViaService":
                      - !Sub "secretsmanager.${AWS::Region}.amazonaws.com"
              # S3 for shared data pipelines and deployments
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !Ref SharedRawBucketArn
                  - !Sub "${SharedRawBucketArn}/*"
                  - !Ref SharedProcessedBucketArn
                  - !Sub "${SharedProcessedBucketArn}/*"
                  - !Ref DeploymentBucketArn
                  - !Sub "${DeploymentBucketArn}/*"
                  - !Ref UserDataBucketArn
                  - !Sub "${UserDataBucketArn}/*"
                  - !Ref PublicDataBucketArn
                  - !Sub "${PublicDataBucketArn}/*"
                  - !Ref LogsBucketArn
                  - !Sub "${LogsBucketArn}/*"
              # DynamoDB for graph registries (needed for shared master discovery)
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:Query
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:DescribeTable
                Resource:
                  - !Sub "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/robosystems-graph-${Environment}-*"
                  - !Sub "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/robosystems-graph-${Environment}-*/index/*"
              # EC2 for snapshot management and ECS run launcher
              - Effect: Allow
                Action:
                  - ec2:CreateSnapshot
                  - ec2:DescribeSnapshots
                  - ec2:CreateTags
                  - ec2:DescribeVolumes
                  - ec2:DescribeInstances
                  - ec2:DescribeNetworkInterfaces
                Resource: "*"
              # EC2 Launch Template management (for replica updates)
              - Effect: Allow
                Action:
                  - ec2:CreateLaunchTemplateVersion
                  - ec2:ModifyLaunchTemplate
                  - ec2:DescribeLaunchTemplates
                  - ec2:DescribeLaunchTemplateVersions
                Resource:
                  - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:launch-template/*"
              # Auto Scaling for replica refresh
              - Effect: Allow
                Action:
                  - autoscaling:DescribeAutoScalingGroups
                  - autoscaling:DescribeInstanceRefreshes
                Resource: "*"
              - Effect: Allow
                Action:
                  - autoscaling:UpdateAutoScalingGroup
                  - autoscaling:StartInstanceRefresh
                Resource:
                  - !Sub "arn:${AWS::Partition}:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup:*:autoScalingGroupName/robosystems-*-${Environment}-asg"
              # CloudFormation for shared replica ALB discovery
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: "*"
              # ECS for run launcher
              - Effect: Allow
                Action:
                  - ecs:RunTask
                  - ecs:DescribeTasks
                  - ecs:StopTask
                  - ecs:ListTasks
                  - ecs:DescribeTaskDefinition
                  - ecs:RegisterTaskDefinition
                  - ecs:DeregisterTaskDefinition
                  - ecs:DescribeServices
                  - ecs:TagResource
                Resource: "*"
              # IAM pass role for task execution
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !GetAtt DagsterTaskExecutionRole.Arn
                  - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/robosystems-dagster-task-role-${Environment}"
                Condition:
                  StringEquals:
                    "iam:PassedToService": "ecs-tasks.amazonaws.com"
              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/robosystems/${Environment}/dagster:*"
              # CloudWatch Metrics for instance monitoring and auto-scaling
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: "*"
                Condition:
                  StringEquals:
                    "cloudwatch:namespace": !Sub "RoboSystems/Graph/${Environment}"
              # SES for transactional emails (verification, password reset, welcome)
              - Effect: Allow
                Action:
                  - ses:SendEmail
                Resource:
                  - !Sub "arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/robosystems.ai"
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag

  DagsterTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub robosystems-dagster-execution-role-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ExecutionRoleSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:robosystems/${Environment}-*"
                  - !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:robosystems/${Environment}/*"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                Resource:
                  - !Sub "arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/secretsmanager"
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation

  # ========================================
  # TASK DEFINITIONS
  # ========================================
  DaemonTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub robosystems-dagster-daemon-${Environment}
      Cpu: !Ref DaemonCpu
      Memory: !Ref DaemonMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt DagsterTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt DagsterTaskRole.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation
      ContainerDefinitions:
        - Name: dagster-daemon
          Image: !Sub ${ECRRepositoryUrl}:${ECRImageTag}
          Essential: true
          Command: ["/app/bin/entrypoint.sh"]
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref DagsterLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: daemon
          Environment:
            - Name: ENVIRONMENT
              Value: !Ref Environment
            - Name: DOCKER_PROFILE
              Value: dagster-daemon
            - Name: DAGSTER_HOME
              Value: /app/dagster_home
            # Database Configuration (URL constructed at runtime from components + secret)
            - Name: DATABASE_ENDPOINT
              Value: !Ref DatabaseEndpoint
            - Name: DATABASE_PORT
              Value: !Ref DatabasePort
            - Name: DAGSTER_POSTGRES_HOST
              Value: !Ref DatabaseEndpoint
            - Name: DAGSTER_POSTGRES_PORT
              Value: !Ref DatabasePort
            - Name: DAGSTER_POSTGRES_USER
              Value: "postgres"
            - Name: DAGSTER_POSTGRES_DB
              Value: dagster
            - Name: VALKEY_URL
              Value: !Ref ValkeyUrl
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            # Run database migrations on daemon startup (singleton pattern)
            - Name: RUN_MIGRATIONS
              Value: "true"
            # EcsRunLauncher configuration - Fargate only
            # Jobs override resources via ecs/cpu, ecs/memory, ecs/ephemeral_storage tags
            - Name: DAGSTER_ECS_RUN_TASK_DEFINITION
              Value: !GetAtt RunJobTaskDefinition.TaskDefinitionArn
            - Name: DAGSTER_ECS_CLUSTER
              Value: !Ref DagsterCluster
            - Name: DAGSTER_ECS_LAUNCH_TYPE
              Value: FARGATE
            # S3 Bucket Configuration (derived from ARN parameters)
            - Name: SHARED_RAW_BUCKET
              Value: !Select [5, !Split [":", !Ref SharedRawBucketArn]]
            - Name: SHARED_PROCESSED_BUCKET
              Value: !Select [5, !Split [":", !Ref SharedProcessedBucketArn]]
            - Name: USER_DATA_BUCKET
              Value: !Select [5, !Split [":", !Ref UserDataBucketArn]]
            - Name: PUBLIC_DATA_BUCKET
              Value: !Select [5, !Split [":", !Ref PublicDataBucketArn]]
            - Name: DEPLOYMENT_BUCKET
              Value: !Select [5, !Split [":", !Ref DeploymentBucketArn]]
            - Name: LOGS_BUCKET
              Value: !Select [5, !Split [":", !Ref LogsBucketArn]]
            - Name: DAGSTER_COMPUTE_LOGS_BUCKET
              Value: !Select [5, !Split [":", !Ref LogsBucketArn]]
            - Name: PUBLIC_DATA_CDN_URL
              Value: !Ref PublicDataCDNURL
            # Run coordinator configuration
            - Name: DAGSTER_MAX_CONCURRENT_RUNS
              Value: !Ref MaxConcurrentRuns
          Secrets:
            - Name: POSTGRES_PASSWORD
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:robosystems/${Environment}/postgres:POSTGRES_PASSWORD::"
            - Name: DAGSTER_POSTGRES_PASSWORD
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:robosystems/${Environment}/postgres:POSTGRES_PASSWORD::"

  WebserverTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub robosystems-dagster-webserver-${Environment}
      Cpu: !Ref WebserverCpu
      Memory: !Ref WebserverMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt DagsterTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt DagsterTaskRole.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation
      ContainerDefinitions:
        - Name: dagster-webserver
          Image: !Sub ${ECRRepositoryUrl}:${ECRImageTag}
          Essential: true
          Command: ["/app/bin/entrypoint.sh"]
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref DagsterLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: webserver
          Environment:
            - Name: ENVIRONMENT
              Value: !Ref Environment
            - Name: DOCKER_PROFILE
              Value: dagster
            - Name: DAGSTER_HOME
              Value: /app/dagster_home
            - Name: DAGSTER_PORT
              Value: "3000"
            # Database Configuration (URL constructed at runtime from components + secret)
            - Name: DATABASE_ENDPOINT
              Value: !Ref DatabaseEndpoint
            - Name: DATABASE_PORT
              Value: !Ref DatabasePort
            - Name: DAGSTER_POSTGRES_HOST
              Value: !Ref DatabaseEndpoint
            - Name: DAGSTER_POSTGRES_PORT
              Value: !Ref DatabasePort
            - Name: DAGSTER_POSTGRES_USER
              Value: "postgres"
            - Name: DAGSTER_POSTGRES_DB
              Value: dagster
            - Name: VALKEY_URL
              Value: !Ref ValkeyUrl
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            # EcsRunLauncher configuration - needed for webserver to understand run launcher
            # Jobs override resources via ecs/cpu, ecs/memory, ecs/ephemeral_storage tags
            - Name: DAGSTER_ECS_RUN_TASK_DEFINITION
              Value: !GetAtt RunJobTaskDefinition.TaskDefinitionArn
            - Name: DAGSTER_ECS_CLUSTER
              Value: !Ref DagsterCluster
            - Name: DAGSTER_ECS_LAUNCH_TYPE
              Value: FARGATE
            # S3 Bucket Configuration (derived from ARN parameters)
            - Name: SHARED_RAW_BUCKET
              Value: !Select [5, !Split [":", !Ref SharedRawBucketArn]]
            - Name: SHARED_PROCESSED_BUCKET
              Value: !Select [5, !Split [":", !Ref SharedProcessedBucketArn]]
            - Name: USER_DATA_BUCKET
              Value: !Select [5, !Split [":", !Ref UserDataBucketArn]]
            - Name: PUBLIC_DATA_BUCKET
              Value: !Select [5, !Split [":", !Ref PublicDataBucketArn]]
            - Name: DEPLOYMENT_BUCKET
              Value: !Select [5, !Split [":", !Ref DeploymentBucketArn]]
            - Name: LOGS_BUCKET
              Value: !Select [5, !Split [":", !Ref LogsBucketArn]]
            - Name: DAGSTER_COMPUTE_LOGS_BUCKET
              Value: !Select [5, !Split [":", !Ref LogsBucketArn]]
            - Name: PUBLIC_DATA_CDN_URL
              Value: !Ref PublicDataCDNURL
            # Run coordinator configuration (shared config with daemon)
            - Name: DAGSTER_MAX_CONCURRENT_RUNS
              Value: !Ref MaxConcurrentRuns
          Secrets:
            - Name: POSTGRES_PASSWORD
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:robosystems/${Environment}/postgres:POSTGRES_PASSWORD::"
            - Name: DAGSTER_POSTGRES_PASSWORD
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:robosystems/${Environment}/postgres:POSTGRES_PASSWORD::"
          HealthCheck:
            Command:
              [
                "CMD-SHELL",
                "curl -f http://localhost:3000/server_info || exit 1",
              ]
            Interval: 30
            Timeout: 10
            Retries: 3
            StartPeriod: 60

  # ========================================
  # RUN JOB TASK DEFINITION
  # ========================================
  # Single default task definition. Jobs override resources via Dagster tags:
  #   ecs/cpu, ecs/memory, ecs/ephemeral_storage, ecs/run_task_kwargs
  # See robosystems/dagster/jobs/*.py for job-specific configurations.

  # Default run job task definition (0.5 vCPU, 2 GB, 21 GB storage)
  RunJobTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub robosystems-dagster-run-${Environment}
      Cpu: !Ref RunJobCpu
      Memory: !Ref RunJobMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt DagsterTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt DagsterTaskRole.Arn
      # Default 21GB ephemeral storage. Jobs can override via ecs/ephemeral_storage tag.
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation
      ContainerDefinitions:
        - Name: dagster-run
          Image: !Sub ${ECRRepositoryUrl}:${ECRImageTag}
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref DagsterLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: run
          Environment:
            - Name: ENVIRONMENT
              Value: !Ref Environment
            # Database Configuration (URL constructed at runtime from components + secret)
            - Name: DATABASE_ENDPOINT
              Value: !Ref DatabaseEndpoint
            - Name: DATABASE_PORT
              Value: !Ref DatabasePort
            - Name: DAGSTER_HOME
              Value: /app/dagster_home
            - Name: DAGSTER_POSTGRES_HOST
              Value: !Ref DatabaseEndpoint
            - Name: DAGSTER_POSTGRES_PORT
              Value: !Ref DatabasePort
            - Name: DAGSTER_POSTGRES_USER
              Value: "postgres"
            - Name: DAGSTER_POSTGRES_DB
              Value: dagster
            - Name: VALKEY_URL
              Value: !Ref ValkeyUrl
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: SHARED_RAW_BUCKET
              Value: !Select [5, !Split [":", !Ref SharedRawBucketArn]]
            - Name: SHARED_PROCESSED_BUCKET
              Value: !Select [5, !Split [":", !Ref SharedProcessedBucketArn]]
            - Name: USER_DATA_BUCKET
              Value: !Select [5, !Split [":", !Ref UserDataBucketArn]]
            - Name: PUBLIC_DATA_BUCKET
              Value: !Select [5, !Split [":", !Ref PublicDataBucketArn]]
            - Name: DEPLOYMENT_BUCKET
              Value: !Select [5, !Split [":", !Ref DeploymentBucketArn]]
            - Name: LOGS_BUCKET
              Value: !Select [5, !Split [":", !Ref LogsBucketArn]]
            - Name: DAGSTER_COMPUTE_LOGS_BUCKET
              Value: !Select [5, !Split [":", !Ref LogsBucketArn]]
            - Name: PUBLIC_DATA_CDN_URL
              Value: !Ref PublicDataCDNURL
            - Name: DAGSTER_MAX_CONCURRENT_RUNS
              Value: !Ref MaxConcurrentRuns
          Secrets:
            - Name: POSTGRES_PASSWORD
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:robosystems/${Environment}/postgres:POSTGRES_PASSWORD::"
            - Name: DAGSTER_POSTGRES_PASSWORD
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:robosystems/${Environment}/postgres:POSTGRES_PASSWORD::"

  # ========================================
  # ECS SERVICES
  # ========================================
  DaemonService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub robosystems-dagster-daemon-${Environment}
      Cluster: !Ref DagsterCluster
      DesiredCount: 1
      CapacityProviderStrategy:
        - CapacityProvider: FARGATE_SPOT
          Weight: !Ref DaemonFargateSpotWeight
        - CapacityProvider: FARGATE
          Weight: !Ref DaemonFargateWeight
          Base: !Ref DaemonFargateBase
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref DagsterSecurityGroup
            - !Ref ValkeyClientSecurityGroupId
            - !Ref DatabaseSecurityGroupId
      TaskDefinition: !Ref DaemonTaskDefinition
      EnableExecuteCommand: true
      PropagateTags: SERVICE
      DeploymentConfiguration:
        MaximumPercent: 100
        MinimumHealthyPercent: 0
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation

  WebserverService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub robosystems-dagster-webserver-${Environment}
      Cluster: !Ref DagsterCluster
      DesiredCount: 1 # Always 1 - no ALB for load distribution
      CapacityProviderStrategy:
        - CapacityProvider: FARGATE_SPOT
          Weight: !Ref WebserverFargateSpotWeight
        - CapacityProvider: FARGATE
          Weight: !Ref WebserverFargateWeight
          Base: !Ref WebserverFargateBase
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref DagsterSecurityGroup
            - !Ref ValkeyClientSecurityGroupId
            - !Ref DatabaseSecurityGroupId
      TaskDefinition: !Ref WebserverTaskDefinition
      # Service Discovery registration
      ServiceRegistries:
        - RegistryArn: !GetAtt WebserverServiceDiscovery.Arn
      EnableExecuteCommand: true
      PropagateTags: SERVICE
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
        MaximumPercent: 200
        MinimumHealthyPercent: 50
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceTag
        - Key: Component
          Value: !Ref ComponentTag
        - Key: CreatedBy
          Value: CloudFormation

Outputs:
  ClusterName:
    Description: Name of the ECS Cluster
    Value: !Ref DagsterCluster
    Export:
      Name: !Sub ${AWS::StackName}-ClusterName

  ClusterArn:
    Description: ARN of the ECS Cluster
    Value: !GetAtt DagsterCluster.Arn
    Export:
      Name: !Sub ${AWS::StackName}-ClusterArn

  # Internal access endpoint (use with bastion port forwarding)
  DagsterInternalEndpoint:
    Description: Internal DNS endpoint for Dagster webserver (use with bastion tunnel)
    Value: !Sub webserver.dagster.${Environment}.robosystems.local
    Export:
      Name: !Sub ${AWS::StackName}-InternalEndpoint

  DagsterSecurityGroupId:
    Description: Security group ID for Dagster services
    Value: !Ref DagsterSecurityGroup
    Export:
      Name: !Sub ${AWS::StackName}-SecurityGroupId

  # Run Job Task Definition
  RunJobTaskDefinitionArn:
    Description: ARN of the default run job task definition. Jobs override via ecs/cpu, ecs/memory, ecs/ephemeral_storage tags.
    Value: !GetAtt RunJobTaskDefinition.TaskDefinitionArn
    Export:
      Name: !Sub ${AWS::StackName}-RunJobTaskDefinition

  DaemonServiceArn:
    Description: ARN of the Dagster daemon ECS service
    Value: !Ref DaemonService
    Export:
      Name: !Sub ${AWS::StackName}-DaemonServiceArn

  WebserverServiceArn:
    Description: ARN of the Dagster webserver ECS service
    Value: !Ref WebserverService
    Export:
      Name: !Sub ${AWS::StackName}-WebserverServiceArn

  DagsterUrl:
    Description: Internal URL for Dagster webserver
    Value: !Sub http://webserver.dagster.${Environment}.robosystems.local:3000
    Export:
      Name: !Sub ${AWS::StackName}-DagsterUrl

  TunnelCommand:
    Description: Command to access Dagster UI via bastion tunnel
    Value: !Sub "./bin/tools/tunnels.sh ${Environment} dagster"
