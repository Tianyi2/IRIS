AWSTemplateFormatVersion: 2010-09-09
Description: Partner Stack with Lambda , API Gateway, SQS, Dynamo DB and SSM Parameter

Parameters:
  EnvironmentType: # from eitri pipeline
    Type: String
    Description: Environment of Deployment
    AllowedValues: [ "dev", "qa", "qa2", "uat", "int", "int2", "production" ]
    Default: "dev"
  BucketName: # from eitri pipeline
    Description: Bucket name to Upload Lambda Zips, Ste
    Type: String
  PackageLayerObjectKey: # takes default value
    Description: Python Packages S3 Zip Object key
    Type: String
    Default: "morpheusCfnLambdaPackageLayer.zip"
  ClientLayerObjectKey: # takes default value
    Description: Client Layer S3 Xip Object Key
    Type: String
    Default: "morpheusCfnLambdaClientLayer.zip"
  LayerDescription: # from eitri pipeline
    Description: 'Dynamic layer description passed form eitri to enforce version change'
    Type: String
    Default: "morpheusCfnLayer"

Conditions:
  EnvironmentProd: !Equals [ !Ref EnvironmentType, "production" ]
  EnvironmentNotProd: !Not [ !Equals [ !Ref EnvironmentType, "production" ] ]

Resources:
  SqsResourceStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        EnvironmentType: !Ref EnvironmentType
      TemplateURL: sqs_resources.yaml

  DynamoDbResourceStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        EnvironmentType: !Ref EnvironmentType
      TemplateURL: dynamodb_resources.yaml

  SsmParameterStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        EnvironmentType: !Ref EnvironmentType
      TemplateURL: ssm_params.yaml

  PackageLayer:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        EnvironmentType: !Ref EnvironmentType
        S3Bucket: !Ref BucketName
        S3Key: !Ref PackageLayerObjectKey
        LayerDescription: !Ref LayerDescription # added dynamic layer description to enforce version change
        LayerName: !Sub "${AWS::StackName}-PackageLayer"
        VersionNumber: 1
      TemplateURL: Common/04_lambda_layer.yaml

  ClientLayer:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        EnvironmentType: !Ref EnvironmentType
        S3Bucket: !Ref BucketName
        S3Key: !Ref ClientLayerObjectKey
        LayerDescription: !Ref LayerDescription # added dynamic layer description to enforce version change
        LayerName: !Sub "${AWS::StackName}-ClientLayer"
        VersionNumber: 1
      TemplateURL: Common/04_lambda_layer.yaml

  LambdaRole:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        EnvironmentType: !Ref EnvironmentType
        UnOrganizedBucket: !ImportValue unorganizedbucket
        OrganizedBucket: !ImportValue organizedbucket
        EventsTopicSnsArn: !ImportValue snseventsfifo-Arn
        BucketDecryptionKey: !ImportValue s3-encryption-key
        SnsEncryptionKey: !ImportValue Sns-encryption-key
        PrivoUserPoolArn: "{{resolve:ssm:/privo/USER-POOL-ARN}}"
      TemplateURL: Lambdas/lambda_role.yaml

  StateMachineRole:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        EnvironmentType: !Ref EnvironmentType
      TemplateURL: StepFunctions/state_machine_role.yaml

  PrivoPartnerApiLambda:
    DependsOn: [ SqsResourceStack, SsmParameterStack ]
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        LambdaRoleArn: !GetAtt [ "LambdaRole", "Outputs.PartnerLambdaRoleArn" ]
        PackageLayer: !GetAtt [ "PackageLayer", "Outputs.LambdaLayer" ]
        ClientLayer: !GetAtt [ "ClientLayer", "Outputs.LambdaLayer" ]
        EnvironmentType: !Ref EnvironmentType
      TemplateURL: Lambdas/PrivoPartnerApiLambda/package.yaml

  PrivoPartnerWebhookApi:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        # machine role to push VKYC data CLP
        LambdaRoleArn: !ImportValue aquaflow-machine-access-role
        PackageLayer: !GetAtt [ "PackageLayer", "Outputs.LambdaLayer" ]
        ClientLayer: !GetAtt [ "ClientLayer", "Outputs.LambdaLayer" ]
        OrganizedBucket: !ImportValue organizedbucket
      TemplateURL: Lambdas/PrivoPartnerWebhookApi/package.yaml

  PrivoPartnerCpcEventConsumer:
    DependsOn: [ SqsResourceStack, SsmParameterStack ]
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        # machine role to push bureau data for CLP
        LambdaRoleArn: !ImportValue aquaflow-machine-access-role
        PackageLayer: !GetAtt [ "PackageLayer", "Outputs.LambdaLayer" ]
        ClientLayer: !GetAtt [ "ClientLayer", "Outputs.LambdaLayer" ]
        EnvironmentType: !Ref EnvironmentType
      TemplateURL: Lambdas/PrivoPartnerCpcEventConsumer/package.yaml

  PrivoPartnerPqOfferConsumer:
    DependsOn: [ SqsResourceStack, SsmParameterStack ]
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
         # machine role to get PQ offer for CLP
        LambdaRoleArn: !ImportValue aquaflow-machine-access-role
        PackageLayer: !GetAtt [ "PackageLayer", "Outputs.LambdaLayer" ]
        ClientLayer: !GetAtt [ "ClientLayer", "Outputs.LambdaLayer" ]
        EventsTopicSnsArn: !ImportValue snseventsfifo-Arn
        EnvironmentType: !Ref EnvironmentType
      TemplateURL: Lambdas/PartnerPqOfferConsumer/package.yaml

  PrivoPartnerMachineOfferConsumer:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        LambdaRoleArn: !GetAtt [ "LambdaRole", "Outputs.PartnerLambdaRoleArn" ]
        PackageLayer: !GetAtt [ "PackageLayer", "Outputs.LambdaLayer" ]
        ClientLayer: !GetAtt [ "ClientLayer", "Outputs.LambdaLayer" ]
        EventsTopicSnsArn: !ImportValue snseventsfifo-Arn
      TemplateURL: Lambdas/PartnerMachineOfferConsumer/package.yaml

  SblLeadPushPartnerApiLambda:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        LambdaRoleArn: !GetAtt [ "LambdaRole", "Outputs.PartnerLambdaRoleArn" ]
        PackageLayer: !GetAtt [ "PackageLayer", "Outputs.LambdaLayer" ]
        ClientLayer: !GetAtt [ "ClientLayer", "Outputs.LambdaLayer" ]
        LeadPushCpcStateMachineArn: !GetAtt [ "LeadPushCpcEventHandlerStateMachine", "Outputs.StepFunctionArn" ]
        EnvironmentType: !Ref EnvironmentType
      TemplateURL: Lambdas/SblPartnerApiLambda/package.yaml

  LeadPushCpcEventHandlerLambda:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        LambdaRoleArn: !GetAtt [ "LambdaRole", "Outputs.PartnerLambdaRoleArn" ]
        PackageLayer: !GetAtt [ "PackageLayer", "Outputs.LambdaLayer" ]
        ClientLayer: !GetAtt [ "ClientLayer", "Outputs.LambdaLayer" ]
        EnvironmentType: !Ref EnvironmentType
        OrganizedBucket: !ImportValue organizedbucket
      TemplateURL: Lambdas/CpcEventHandler/package.yaml

  SalesforceLeadPushLambda:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        LambdaRoleArn: !GetAtt [ "LambdaRole", "Outputs.PartnerLambdaRoleArn" ]
        PackageLayer: !GetAtt [ "PackageLayer", "Outputs.LambdaLayer" ]
        ClientLayer: !GetAtt [ "ClientLayer", "Outputs.LambdaLayer" ]
        EnvironmentType: !Ref EnvironmentType
      TemplateURL: Lambdas/SalesforceLeadPushLambda/package.yaml

  LeadPushCpcEventHandlerStateMachine:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        CpcEventHandlerLambdaArn: !GetAtt [ "LeadPushCpcEventHandlerLambda", "Outputs.LambdaFunction" ]
        SalesforceLambdaArn: !GetAtt ["SalesforceLeadPushLambda", "Outputs.LambdaFunction"]
        StateMachineExecutionRoleArn: !GetAtt [ "StateMachineRole", "Outputs.StateMachineExecutionRoleArn" ]
        CfnBucket: !Ref BucketName
        EnvironmentType: !Ref EnvironmentType
      TemplateURL: StepFunctions/CpcHandlerStateMachine/template.yaml

  ApiGatewayLayer:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        EnvironmentType: !Ref EnvironmentType
        PrivoPartnerApiLambdaArn: !GetAtt [ "PrivoPartnerApiLambda", "Outputs.LambdaFunction" ]
        SblPartnerApiLambdaArn: !GetAtt [ "SblLeadPushPartnerApiLambda", "Outputs.LambdaFunction" ]
        PrivoPartnerWebhookApiArn: !GetAtt [ "PrivoPartnerWebhookApi", "Outputs.LambdaFunction" ]
        MicroWebServiceLambdaArn: !GetAtt [ "MicroWebServiceLambda", "Outputs.LambdaFunction" ]
        MicroWebAuthLambdaArn: !GetAtt [ "MicroWebAuthLambda", "Outputs.LambdaFunction" ]
      TemplateURL: ApiLayer/master.yaml

  PrivoLendingKartCallbackConsumer:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        LambdaRoleArn: !GetAtt [ "LambdaRole", "Outputs.PartnerLambdaRoleArn" ]
        PackageLayer: !GetAtt [ "PackageLayer", "Outputs.LambdaLayer" ]
        ClientLayer: !GetAtt [ "ClientLayer", "Outputs.LambdaLayer" ]
        EventsTopicSnsArn: !ImportValue snseventsfifo-Arn
      TemplateURL: Lambdas/LendingKartCallbackEventHandler/package.yaml

  PrivoCallbackWebhookConsumer:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        LambdaRoleArn: !GetAtt [ "LambdaRole", "Outputs.PartnerLambdaRoleArn" ]
        PackageLayer: !GetAtt [ "PackageLayer", "Outputs.LambdaLayer" ]
        ClientLayer: !GetAtt [ "ClientLayer", "Outputs.LambdaLayer" ]
        EventsTopicSnsArn: !ImportValue snseventsfifo-Arn
        EnvironmentType: !Ref EnvironmentType
      TemplateURL: Lambdas/PartnerCallbackWebhookLambda/package.yaml

  MicroWebServiceLambda:
    DependsOn: [ SqsResourceStack, SsmParameterStack ]
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        LambdaRoleArn: !GetAtt [ "LambdaRole", "Outputs.PartnerLambdaRoleArn" ]
        PackageLayer: !GetAtt [ "PackageLayer", "Outputs.LambdaLayer" ]
        ClientLayer: !GetAtt [ "ClientLayer", "Outputs.LambdaLayer" ]
        EnvironmentType: !Ref EnvironmentType
      TemplateURL: Lambdas/MicroWebServiceLambda/package.yaml

  MicroWebAuthLambda:
    DependsOn: [ SqsResourceStack, SsmParameterStack ]
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        LambdaRoleArn: !GetAtt [ "LambdaRole", "Outputs.PartnerLambdaRoleArn" ]
        PackageLayer: !GetAtt [ "PackageLayer", "Outputs.LambdaLayer" ]
        ClientLayer: !GetAtt [ "ClientLayer", "Outputs.LambdaLayer" ]
        EnvironmentType: !Ref EnvironmentType
      TemplateURL: Lambdas/MicroWebAuthLambda/package.yaml
