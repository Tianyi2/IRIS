AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for Inspect Evals AWS Batch Jobs

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment (dev, staging, prod)

Resources:
  InspectEvalsBatchRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: InspectEvalsBatchJobRole
      Description: IAM role for Inspect Evals Batch jobs to upload logs to S3
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
                - batch.amazonaws.com
            Action: sts:AssumeRole
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSBatchServiceRole'
      Policies:
        - PolicyName: InspectEvalsS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:HeadObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - Fn::ImportValue: !Sub 'InspectEvalsS3BucketArn-${Environment}'
                  - !Sub
                    - '${BucketArn}/*'
                    - BucketArn:
                        Fn::ImportValue: !Sub 'InspectEvalsS3BucketArn-${Environment}'

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ecsTaskExecutionRole
      Description: Execution role for ECS tasks to pull secrets and images
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:inspect-evals/*'

Outputs:
  BatchRoleArn:
    Description: ARN of the IAM Role for Batch Jobs
    Value: !GetAtt InspectEvalsBatchRole.Arn
    Export:
      Name: !Sub 'InspectEvalsBatchRoleArn-${Environment}'

  ECSTaskExecutionRoleArn:
    Description: ARN of the ECS Task Execution Role
    Value: !GetAtt ECSTaskExecutionRole.Arn
    Export:
      Name: ECSTaskExecutionRoleArn
