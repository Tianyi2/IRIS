AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Roles for lambda functions

Parameters:
  EnvironmentType:
    Type: String
    Description: Environment of Deployment
    AllowedValues: ['dev', 'qa', 'qa2', 'uat', 'int', 'int2', 'production']
    Default: 'dev'

Resources:
  StateMachineExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'morpheus-partner-cfn-${EnvironmentType}-statemachine-role'
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service:
                - !Sub states.${AWS::Region}.amazonaws.com
            Action: "sts:AssumeRole"
      Path: "/"
      Policies:
        - PolicyName: StatesExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "lambda:InvokeFunction"
                Resource: "*"
        - PolicyName: StatesLoggingPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:*'
                Resource: "*"
        - PolicyName: ContainerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:RunTask
                Resource: "*"
        - PolicyName: NestedExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - states:StartExecution
                Resource: "*"

Outputs:
  StateMachineExecutionRoleArn:
    Description: 'State machine execution IAM Role'
    Value: !GetAtt StateMachineExecutionRole.Arn