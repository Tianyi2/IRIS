AWSTemplateFormatVersion: '2010-09-09'
Description: 'HDB Agent - Phase 2 Athena Data Pipeline'

Parameters:
  ProjectPrefix:
    Type: String
    Default: hdbma
    Description: Project prefix for resource naming
  
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod
    Description: Environment name
  
  VersionTag:
    Type: String
    Default: v1
    Description: Version identifier for resources

Resources:
  # Reference to existing S3 Bucket for raw HDB data
  # Note: Using existing bucket hdbma-rawdata-dev-v1 (not creating new one)

  # S3 Bucket for Athena query results
  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub '${ProjectPrefix}-athenaresults-${EnvironmentName}-${VersionTag}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldQueryResults
            Status: Enabled
            ExpirationInDays: 7
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Version
          Value: !Ref VersionTag

  # Glue Database for HDB data
  HDBGlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub '${ProjectPrefix}_data_${EnvironmentName}_${VersionTag}'
        Description: 'HDB resale data for price prediction and analytics'

  # Glue Table for HDB resale data
  HDBGlueTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref HDBGlueDatabase
      TableInput:
        Name: 'resale_transactions'
        Description: 'HDB resale transactions from data.gov.sg'
        TableType: 'EXTERNAL_TABLE'
        Parameters:
          'classification': 'csv'
          'delimiter': ','
          'skip.header.line.count': '1'
        StorageDescriptor:
          Columns:
            - Name: 'month'
              Type: 'string'
            - Name: 'town'
              Type: 'string'
            - Name: 'flat_type'
              Type: 'string'
            - Name: 'block'
              Type: 'string'
            - Name: 'street_name'
              Type: 'string'
            - Name: 'storey_range'
              Type: 'string'
            - Name: 'floor_area_sqm'
              Type: 'double'
            - Name: 'flat_model'
              Type: 'string'
            - Name: 'lease_commence_date'
              Type: 'int'
            - Name: 'remaining_lease'
              Type: 'string'
            - Name: 'resale_price'
              Type: 'double'
          Location: !Sub 's3://${ProjectPrefix}-rawdata-${EnvironmentName}-${VersionTag}/'
          InputFormat: 'org.apache.hadoop.mapred.TextInputFormat'
          OutputFormat: 'org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat'
          SerdeInfo:
            SerializationLibrary: 'org.apache.hadoop.hive.serde2.lazy.LazySimpleSerDe'
            Parameters:
              'field.delim': ','
              'skip.header.line.count': '1'

  # Athena Workgroup for organized queries
  HDBWorkgroup:
    Type: AWS::Athena::WorkGroup
    DependsOn: AthenaResultsBucket
    DeletionPolicy: Delete
    Properties:
      Name: !Sub "${ProjectPrefix}-${EnvironmentName}-${VersionTag}"
      Description: !Sub "Workgroup for HDB data analytics - ${EnvironmentName} ${VersionTag}"
      State: ENABLED
      WorkGroupConfiguration:
        ResultConfiguration:
          OutputLocation: !Sub 's3://${AthenaResultsBucket}/query-results/'
          EncryptionConfiguration:
            EncryptionOption: SSE_S3
        EnforceWorkGroupConfiguration: false
        PublishCloudWatchMetricsEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Version
          Value: !Ref VersionTag

  # IAM Role for Athena Lambda functions
  AthenaLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectPrefix}-athena-lambda-role-${EnvironmentName}-${VersionTag}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AthenaAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                  - athena:StopQueryExecution
                  - athena:GetWorkGroup
                  - athena:ListWorkGroups
                  - athena:GetDataCatalog
                  - athena:ListDataCatalogs
                Resource:
                  - !Sub 'arn:aws:athena:${AWS::Region}:${AWS::AccountId}:workgroup/${HDBWorkgroup}'
                  - !Sub 'arn:aws:athena:${AWS::Region}:${AWS::AccountId}:datacatalog/*'
              - Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                  - athena:StopQueryExecution
                Resource: "*"
              - Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:GetTable
                  - glue:GetPartitions
                Resource:
                  - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog'
                  - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/${HDBGlueDatabase}'
                  - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/${HDBGlueDatabase}/*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectPrefix}-rawdata-${EnvironmentName}-${VersionTag}/*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectPrefix}-rawdata-${EnvironmentName}-${VersionTag}'
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource:
                  - !Sub '${AthenaResultsBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt AthenaResultsBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetBucketLocation
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectPrefix}-rawdata-${EnvironmentName}-${VersionTag}'
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Version
          Value: !Ref VersionTag

  # Lambda Function for Athena API
  HDBAthenAPIFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectPrefix}-athena-api-${EnvironmentName}-${VersionTag}'
      Runtime: python3.13
      Handler: lambda_function.lambda_handler
      Timeout: 60
      MemorySize: 1024
      Role: !GetAtt AthenaLambdaRole.Arn
      Environment:
        Variables:
          ATHENA_DATABASE: !Ref HDBGlueDatabase
          ATHENA_WORKGROUP: !Ref HDBWorkgroup
          ATHENA_OUTPUT_LOCATION: !Sub 's3://${AthenaResultsBucket}/query-results/'
          DATA_BUCKET: !Sub '${ProjectPrefix}-rawdata-${EnvironmentName}-${VersionTag}'
      Code: ../lambda/athena_complex_query/
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Version
          Value: !Ref VersionTag

  # API Gateway for the Lambda function
  AthenaAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${ProjectPrefix}-athena-api-${EnvironmentName}-${VersionTag}'
      Description: 'API for HDB Athena queries'
      EndpointConfiguration:
        Types:
          - REGIONAL

  # API Gateway Resource (catch-all)
  AthenaAPIResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AthenaAPI
      ParentId: !GetAtt AthenaAPI.RootResourceId
      PathPart: '{proxy+}'

  # API Gateway Method for all HTTP methods
  AthenaAPIMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AthenaAPI
      ResourceId: !Ref AthenaAPIResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${HDBAthenAPIFunction.Arn}/invocations'

  # Root resource method for health check
  AthenaAPIRootMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AthenaAPI
      ResourceId: !GetAtt AthenaAPI.RootResourceId
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${HDBAthenAPIFunction.Arn}/invocations'

  # Lambda permissions for API Gateway
  AthenaAPILambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref HDBAthenAPIFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${AthenaAPI}/*/*'

  AthenaAPIRootLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref HDBAthenAPIFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${AthenaAPI}/*'

  # API Gateway Deployment
  AthenaAPIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: AthenaAPIMethod
    Properties:
      RestApiId: !Ref AthenaAPI
      StageName: !Ref EnvironmentName

Outputs:
  RawDataBucket:
    Description: S3 bucket for raw HDB data uploads (existing bucket)
    Value: !Sub '${ProjectPrefix}-rawdata-${EnvironmentName}-${VersionTag}'
    Export:
      Name: !Sub '${AWS::StackName}-RawDataBucket'

  AthenaResultsBucket:
    Description: S3 bucket for Athena query results
    Value: !Ref AthenaResultsBucket
    Export:
      Name: !Sub '${AWS::StackName}-AthenaResultsBucket'

  AthenaDatabase:
    Description: Glue database for HDB data
    Value: !Ref HDBGlueDatabase
    Export:
      Name: !Sub '${AWS::StackName}-AthenaDatabase'

  AthenaWorkgroup:
    Description: Athena workgroup for queries
    Value: !Ref HDBWorkgroup
    Export:
      Name: !Sub '${AWS::StackName}-AthenaWorkgroup'

  AthenaAPIEndpoint:
    Description: API Gateway endpoint for Athena queries
    Value: !Sub 'https://${AthenaAPI}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}'
    Export:
      Name: !Sub '${AWS::StackName}-AthenaAPIEndpoint'

  AthenaConsoleURL:
    Description: Athena console URL for manual queries
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/athena/home?region=${AWS::Region}#/query-editor'
    Export:
      Name: !Sub '${AWS::StackName}-AthenaConsole'

  SampleQuery:
    Description: Sample Athena query to test the setup
    Value: !Sub |
      SELECT town, flat_type, AVG(resale_price) as avg_price, COUNT(*) as transactions
      FROM "${HDBGlueDatabase}"."resale_transactions"
      WHERE month >= '2023-01'
      GROUP BY town, flat_type
      ORDER BY avg_price DESC
      LIMIT 10;
    Export:
      Name: !Sub '${AWS::StackName}-SampleQuery'