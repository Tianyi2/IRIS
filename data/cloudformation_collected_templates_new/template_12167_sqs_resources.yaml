AWSTemplateFormatVersion: 2010-09-09
Description: Stack for SQS resources

Parameters:
  EnvironmentType:
    Type: String
    Description: Environment of Deployment
    AllowedValues: [ "dev", "qa", "qa2", "uat", "int", "int2", "production" ]
    Default: "dev"

Resources:
  PrivoPartnerCpcEventQueue:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        QueueName: 'morpheus-partner-cpc-event-queue'
        UseDeadLetterQueue: 'true'
        VisTimeout: '480'
        ServiceTags: !Join [ ',', [ morpheus-partner, Quark, Tech, LMS-LOS ] ]
      TemplateURL: Common/01_sqs.yaml

  PartnerPqOfferQueue:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        QueueName: 'morpheus-partner-pq-offer-queue'
        UseDeadLetterQueue: 'true'
        VisTimeout: '120'
        ServiceTags: !Join [ ',', [ morpheus-partner, Quark, Tech, LMS-LOS ] ]
      TemplateURL: Common/01_sqs.yaml


