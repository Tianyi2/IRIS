AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket for Inspect Evals AWS Batch Jobs

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket where evaluation logs will be stored

  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment (dev, staging, prod)

  EnableVersioning:
    Type: String
    Default: true
    AllowedValues:
      - true
      - false
    Description: Enable versioning on the S3 bucket

Resources:
  InspectEvalsS3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain  # Prevents accidental deletion of the bucket and its contents
    UpdateReplacePolicy: Retain  # Prevents replacement during updates
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: !If [EnableVersioningCondition, 'Enabled', 'Suspended']
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: InspectEvals

Conditions:
  EnableVersioningCondition: !Equals [!Ref EnableVersioning, 'true']

Outputs:
  S3BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref InspectEvalsS3Bucket
    Export:
      Name: !Sub InspectEvalsS3BucketName-${Environment}

  S3BucketArn:
    Description: ARN of the created S3 bucket
    Value: !GetAtt InspectEvalsS3Bucket.Arn
    Export:
      Name: !Sub InspectEvalsS3BucketArn-${Environment}
