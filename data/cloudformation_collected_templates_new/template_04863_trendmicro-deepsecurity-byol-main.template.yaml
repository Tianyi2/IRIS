AWSTemplateFormatVersion: "2010-09-09"

Description: 'QS(0011) - Quick Start that deploys Trend Micro Deep Security into an existing VPC with a Multi-AZ RDS instance  **WARNING** This template uses images from the AWS Marketplace and an active subscription is required - Please see the Quick Start documentation for more details. You will be billed for the AWS resources used if you create a stack from this template. (qs-1ngr590k9)'

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W8001

  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: AWS Marketplace Parameters
        Parameters:
          - ImageId
          - MPS3BucketName
          - MPS3BucketRegion
          - MPS3KeyPrefix
      - Label:
          default: Deep Security Manager Configuration
        Parameters:
          - DeepSecurityAdminName
          - DeepSecurityAdminPass
          - AWSKeyPairName
          - LicenseKey
      - Label:
          default: Network Configuration
        Parameters:
          - AWSVPC
          - DeepSecuritySubnet
          - DatabaseSubnet1
          - DatabaseSubnet2
      - Label:
          default: RDS Configuration
        Parameters:
          - DatabaseEngine
          - DatabaseAdminName
          - DatabaseAdminPassword
    ParameterLabels:
      AWSKeyPairName:
        default: EC2 Key Pair for SSH access
      AWSVPC:
        default: VPC for Deep Security Components
      DatabaseEngine:
        default: Choose the backend database
      DatabaseSubnet1:
        default: Primary private subnet for RDS
      DatabaseSubnet2:
        default: Secondary private subnet for RDS
      DatabaseAdminName:
        default: Administrator username for RDS Instance
      DatabaseAdminPassword:
        default: Administrator password for RDS Instance
      DeepSecuritySubnet:
        default: Public Subnet for Deep Security Managers
      DeepSecurityAdminName:
        default: Administrator username for Deep Security
      DeepSecurityAdminPass:
        default: Administrator password for Deep Security
      LicenseKey:
        default: Deep Security License Key. May be left default to enter key after deployment

Parameters:
  AWSKeyPairName:
    Description: Select an existing key pair to use for connecting to your Deep Security Manager Instance.
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Select an existing EC2 Key Pair.

  AWSVPC:
    Description: Select an existing VPC to deploy Deep Security Manager.
    Type: AWS::EC2::VPC::Id
    AllowedPattern: '[-_a-zA-Z0-9]*'

  DatabaseEngine:
    Description: Choose PostgreSQL, Microsoft SQL, Oracle or Aurora PostgreSQL for Deep Security database engine.
    Type: String
    AllowedValues:
      - Oracle
      - MSSQL
      - PostgreSQL
      - AuroraPostgreSQL
    Default: PostgreSQL

  DatabaseSubnet1:
    Description: Select a private subnet for the RDS database.  Must be a private subnet contained in the VPC chosen above.
    Type: AWS::EC2::Subnet::Id
    ConstraintDescription: RDS Subnet Groups must be comprised of 2 subnets in seperate availability zones within the specified VPC for deploying this template

  DatabaseSubnet2:
    Description: Select a second private subnet for the RDS database.  Must be a private subnet contained in the VPC chosen above.
    Type: AWS::EC2::Subnet::Id
    ConstraintDescription: RDS Subnet Groups must be comprised of 2 subnets in seperate availability zones within the specified VPC for deploying this template

  DatabaseAdminName:
    Description: The RDS Database administrator username to be used for the database instance.
    Type: String
    Default: dsadmin
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: Must begin with a letter and contain only alphanumeric characters. Min length 1, max length 16

  DatabaseAdminPassword:
    Description: The RDS Database administrator password. Must be 8-41 characters long and can only contain alphanumeric characters or the following special characters !^*-_+
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 41
    AllowedPattern: '[a-zA-Z0-9!^*\-_+]*'
    ConstraintDescription: Can only contain alphanumeric characters or the following special characters !^*-_+ Min length 8, max length 41

  DeepSecuritySubnet:
    Description: Select an existing Subnet for Deep Security Manager. Must be a public subnet contained in the VPC chosen above.
    Type: AWS::EC2::Subnet::Id
    AllowedPattern: '[-_a-zA-Z0-9]*'
    ConstraintDescription: Subnet ID must exist in the chosen VPC

  DeepSecurityAdminName:
    Description: The Deep Security Manager administrator username for Web Console Access.
    Type: String
    Default: admin
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: Must begin with a letter and contain only alphanumeric characters. Min length 1, max length 16

  DeepSecurityAdminPass:
    Description: The Deep Security Manager administrator password. Must be 8-41 characters long and can only contain alphanumeric characters or the following special characters !^*-_+
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 41
    AllowedPattern: '[a-zA-Z0-9!^*\-_+]*'
    ConstraintDescription: Can only contain alphanumeric characters or the following special characters !^*-_+ Min length 8, max length 41

  LicenseKey:
    Description: If you have a Deep Security Enterprise license key, enter it here. Including dashes (e.g. AP-E9RM-99WHE-B5UR5-BV8YB-HVYM8-HYYVG). If you did not purchase all modules please leave blank and enter your key in the console after launch.
    Type: String
    MinLength: 0
    MaxLength: 37
    AllowedPattern: (?:[A-Z0-9]{2}-[A-Z0-9]{4}-[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5})?
    ConstraintDescription: Key can only contain ASCII characters.

  ImageId:
    Description: The AMI that will be used to launch EC2 resources.
    Type: AWS::EC2::Image::Id

  MPS3BucketName:
    Description: Name of the S3 bucket for the copy of the nested templates.
    Type: String
    Default: deepsecurity-cloudformation

  MPS3BucketRegion:
    Description: AWS Region where the S3 bucket for the copy of the nested templates is hosted.
    Type: String
    Default: us-east-1

  MPS3KeyPrefix:
    Description: S3 key prefix that is used to simulate a folder for the copy of the nested templates.
    Type: String
    Default: main/

