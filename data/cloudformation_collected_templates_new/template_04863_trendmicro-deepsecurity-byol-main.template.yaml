Conditions:
  NoLicenseKey: !Equals
    - !Ref LicenseKey
    - ""

  IsMSSQL: !Equals
    - !Ref DatabaseEngine
    - MSSQL

  GovCloudCondition: !Or
    - !Equals
      - !Ref AWS::Region
      - us-gov-west-1
    - !Equals
      - !Ref AWS::Region
      - us-gov-east-1

Resources:
  MainMP:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}templates/marketplace/main-mp.template.yaml
      Parameters:
        AWSIKeyPairName: !Ref AWSKeyPairName
        AWSIVPC: !Ref AWSVPC
        DSISubnetID: !Ref DeepSecuritySubnet
        DBIRDSInstanceSize: !FindInMap
          - RDSInstanceSize
          - !Ref AWS::Region
          - !Ref DatabaseEngine
        DBIStorageAllocation: "250"
        DBPBackupDays: "5"
        DBPCreateDbInstance: Yes
        DBICAdminName: !Ref DatabaseAdminName
        DBICAdminPassword: !Ref DatabaseAdminPassword
        DBPEngine: !If
          - IsMSSQL
          - SQL
          - !Ref DatabaseEngine
        DBPEndpoint: ""
        DBPName: dsm
        DSCAdminName: !Ref DeepSecurityAdminName
        DSCAdminPassword: !Ref DeepSecurityAdminPass
        DSIMultiNode: "2"
        DSIPLicenseKey: !If
          - NoLicenseKey
          - XX-XXXX-XXXXX-XXXXX-XXXXX-XXXXX-XXXXX
          - !Ref LicenseKey
        DSIPHeartbeatPort: "4120"
        DSIPGUIPort: "443"
        DSIPInstanceType: !FindInMap
          - DSMSIZE
          - !Ref AWS::Region
          - BYOL
        DBISubnet1: !Ref DatabaseSubnet1
        DBISubnet2: !Ref DatabaseSubnet2
        DSIPLicense: BYOL
        DBPMultiAZ: !FindInMap
          - RDSMultiAZ
          - !Ref AWS::Region
          - !Ref DatabaseEngine
        ImageId: !Ref ImageId
        MPS3BucketName: !Ref MPS3BucketName
        MPS3BucketRegion: !Ref MPS3BucketRegion
        MPS3KeyPrefix: !Ref MPS3KeyPrefix

Outputs:
  DeepSecurityConsole:
    Value: !GetAtt MainMP.Outputs.DeepSecurityConsole
