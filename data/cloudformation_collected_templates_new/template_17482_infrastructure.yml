AWSTemplateFormatVersion: '2010-09-09'
Description: 'SageMaker Endpoint A/B Testing Infrastructure - LocalStack Compatible'

Resources:
  # SQS Dead Letter Queue for failed messages
  ApplicationProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: application-processing-dlq
      MessageRetentionPeriod: 1209600  # 14 days

  # SQS Queue for Application Processing
  ApplicationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: application-processing-queue
      VisibilityTimeout: 300  # 5 minutes
      MessageRetentionPeriod: 345600  # 4 days
      ReceiveMessageWaitTimeSeconds: 20  # Long polling
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ApplicationProcessingDLQ.Arn
        maxReceiveCount: 3

  # DynamoDB Table for Processing Results
  ProcessingResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ProcessingResults
      AttributeDefinitions:
        - AttributeName: application_id
          AttributeType: S
        - AttributeName: processed_at
          AttributeType: S
      KeySchema:
        - AttributeName: application_id
          KeyType: HASH
        - AttributeName: processed_at
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # IAM Role for Lambda Function
  ABProcessorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ABProcessorLambdaRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ABProcessorPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt ApplicationQueue.Arn
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                Resource: !GetAtt ProcessingResultsTable.Arn
              - Effect: Allow
                Action:
                  - sagemaker:InvokeEndpoint
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: "*"

  # Lambda Function for A/B Processing
  ABProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ab-processor
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt ABProcessorLambdaRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          SAGEMAKER_ENDPOINT_NAME: credit-scoring-endpoint
          DYNAMODB_TABLE_NAME: !Ref ProcessingResultsTable
          AWS_REGION: us-east-1
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {"statusCode": 200, "body": "Placeholder - deploy actual code"}
      Description: "Processes SQS messages, assigns A/B variants, calls SageMaker, stores results in DynamoDB"

  # SQS Event Source Mapping for Lambda
  ABProcessorEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt ApplicationQueue.Arn
      FunctionName: !Ref ABProcessorFunction
      BatchSize: 10
      MaximumBatchingWindowInSeconds: 5
      Enabled: true

Outputs:
  ApplicationQueueUrl:
    Description: URL of the SQS queue for application processing
    Value: !Ref ApplicationQueue
    Export:
      Name: ApplicationQueueUrl

  ApplicationQueueArn:
    Description: ARN of the SQS queue
    Value: !GetAtt ApplicationQueue.Arn
    Export:
      Name: ApplicationQueueArn

  DLQUrl:
    Description: URL of the Dead Letter Queue
    Value: !Ref ApplicationProcessingDLQ
    Export:
      Name: ApplicationProcessingDLQUrl

  ProcessingResultsTableName:
    Description: Name of the DynamoDB table for processing results
    Value: !Ref ProcessingResultsTable
    Export:
      Name: ProcessingResultsTableName

  ProcessingResultsTableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt ProcessingResultsTable.Arn
    Export:
      Name: ProcessingResultsTableArn

  ABProcessorFunctionArn:
    Description: ARN of the A/B Processor Lambda function
    Value: !GetAtt ABProcessorFunction.Arn
    Export:
      Name: ABProcessorFunctionArn

  ABProcessorFunctionName:
    Description: Name of the A/B Processor Lambda function
    Value: !Ref ABProcessorFunction
    Export:
      Name: ABProcessorFunctionName
