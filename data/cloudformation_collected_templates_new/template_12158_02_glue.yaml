---
AWSTemplateFormatVersion: 2010-09-09

Parameters:
  DataLakeBucket:
    Type: String
    Description: Data Lake Bucket
  GlueDataBase:
    Type: String
    Description: Glue Data Base
  Location:
    Type: String
    Description: S3 Storage location for the Glue Table
  TableName:
    Type: String
    Description: Name of Glue Table


Resources:

  GlueTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref GlueDataBase
      TableInput:
        Name: !Ref TableName
        StorageDescriptor:
          Location: !Sub s3://${DataLakeBucket}/${Location}
          Columns:
          - Name: uuid
            Type: string
          - Name: op
            Type: string
          - Name: time_stamp
            Type: timestamp
          - Name: data
            Type: string
          InputFormat: org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat
          Compressed: false
          SerdeInfo:
            SerializationLibrary: org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe
            Parameters:
              serialization.format: '1'
#              parquet.compression: SNAPPY
          BucketColumns: []
          SortColumns: []
          StoredAsSubDirectories: false
        PartitionKeys:
        - Name: year
          Type: string
        - Name: month
          Type: string
        - Name: day
          Type: string
        TableType: EXTERNAL_TABLE


Outputs:
  GlueTable:
    Value: !Ref GlueTable
  GlueDataBase:
    Value: !Ref GlueDataBase