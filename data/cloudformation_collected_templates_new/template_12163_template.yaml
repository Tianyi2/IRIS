AWSTemplateFormatVersion: 2010-09-09
Description: Lead Push Step Function
Parameters:
  CpcEventHandlerLambdaArn:
    Description: Lambda for service call
    Type: String
  EnvironmentType:
    Description: Environment Type
    Type: String
  StateMachineExecutionRoleArn:
    Description: Basic execution role Arn
    Type: String
  CfnBucket:
    Description: Bucket for Cfn Templates
    Type: String
  SalesforceLambdaArn:
    Description: Lambda for salesforce call
    Type: String


Resources:
  CpcEventHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Join [ '', [ '/aws/vendedlogs/states/', !Ref 'AWS::StackName', '/morpheuspartnercpchandler' ] ]

  LeadPushCpcEventHandlerStepFunction:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: !Sub "morpheusCfnPartner-${EnvironmentType}-${AWS::Region}-LeadPushCpcEventHandler-StateMachine2"
      LoggingConfiguration:
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt CpcEventHandlerLogGroup.Arn
        IncludeExecutionData: True
        Level: ALL
      DefinitionS3Location:
        Bucket: !Ref CfnBucket
        Key: cpc_event_handler_v2.json
      DefinitionSubstitutions:
        CpcEventHandlerLambdaArn: !Ref CpcEventHandlerLambdaArn
        SalesforceLambdaArn: !Ref SalesforceLambdaArn
      RoleArn: !Ref StateMachineExecutionRoleArn
      Tags:
        - Key: "version"
          Value: "1"
Outputs:
  StepFunctionArn:
    Description: Step Function Arn
    Value: !Ref LeadPushCpcEventHandlerStepFunction
