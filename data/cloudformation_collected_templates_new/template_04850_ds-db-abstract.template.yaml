AWSTemplateFormatVersion: "2010-09-09"

Description: 'This template is an abstraction layer for choosing PostgreSQL, Oracle or MSSQL when deploying Deep Security Manager. (qs-1ngr590i4)'

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W1028
        - W8001

Parameters:
  DBIRDSInstanceSize:
    Description: Trend Micro Deep Security Database instance class
    Type: String
    AllowedValues:
      - db.m5.large
      - db.m5.xlarge
      - db.m5.2xlarge
      - db.m5.4xlarge
      - db.m5.8xlarge
      - db.m6g.large
      - db.m6g.xlarge
      - db.m6g.2xlarge
      - db.m6g.4xlarge
      - db.m6g.8xlarge
      - db.m6i.large
      - db.m6i.xlarge
      - db.m6i.2xlarge
      - db.m6i.4xlarge
      - db.m6i.8xlarge
      - db.r3.large
      - db.r3.xlarge
      - db.r3.2xlarge
      - db.r3.4xlarge
      - db.r3.8xlarge
      - db.r4.large
      - db.r4.xlarge
      - db.r4.2xlarge
      - db.r4.4xlarge
      - db.r4.8xlarge
      - db.r5.large
      - db.r5.xlarge
      - db.r5.2xlarge
      - db.r5.4xlarge
      - db.r5.8xlarge
      - db.r6g.large
      - db.r6g.xlarge
      - db.r6g.2xlarge
      - db.r6g.4xlarge
      - db.r6g.8xlarge
      - db.r6i.large
      - db.r6i.xlarge
      - db.r6i.2xlarge
      - db.r6i.4xlarge
      - db.r6i.8xlarge
    Default: db.m5.large
    ConstraintDescription: must select a valid database instance type.

  DBIStorageAllocation:
    Description: The Storage Allocated to Database Instance (in GB). Minimum 200 for SQL Server, 20 for Oracle.
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 3072
    ConstraintDescription: must be between 20 and 3072Gb.

  DBPBackupDays:
    Description: Days to keep automatic RDS backups (0-35)
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 35
    ConstraintDescription: must be between 0 and 35 days.

  DBICAdminName:
    Description: Admin account username to be used for the database instance
    Type: String
    Default: dsadmin
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: must begin with a letter and contain only alphanumeric characters.

  DBICAdminPassword:
    Description: Password to be used for the database admin account. 8-41 alphanumeric characters
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 41
    AllowedPattern: '[a-zA-Z0-9!^*\-_+]*'
    ConstraintDescription: Can only contain alphanumeric characters or the following special characters !^*-_+ Min length 8, max length 41

  DBPName:
    Description: Name to be assigned to the database
    Type: String
    Default: dsm
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: must begin with a letter and contain only alphanumeric characters.

  StorageType:
    Type: String
    Default: gp3

  RDSSG:
    Type: AWS::EC2::SecurityGroup::Id

  DBPEngine:
    Description: Choose PostgreSQL, MSSSQL, Oracle or Aurora PostgreSQL for DSM database Engine
    Type: String
    AllowedValues:
      - SQL
      - Oracle
      - PostgreSQL
      - AuroraPostgreSQL
    Default: PostgreSQL

  MultiAZ:
    Description: Use Multi-AZ or SQL Mirroring Option Group for RDS Instance
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "false"

  DBISubnetGroupName:
    Type: String
    Default: ""

  DBISubnet1:
    Description: Choose a private subnets in the same VPC for the RDS instance
    Type: AWS::EC2::Subnet::Id
    ConstraintDescription: RDS Subnet Groups must be comprised of 2 subnets in separate availability zones with the specified VPC for deploying this template

  DBISubnet2:
    Description: Choose private subnets in the same VPC for this RDS instance
    Type: AWS::EC2::Subnet::Id
    ConstraintDescription: RDS Subnet Groups must be comprised of 2 subnets in separate availability zones with the specified VPC for deploying this template

  MPS3BucketName:
    Description: Name of the S3 bucket for the copy of the nested templates.
    Type: String

  MPS3BucketRegion:
    Description: AWS Region where the S3 bucket for the copy of the nested templates is hosted.
    Type: String

  MPS3KeyPrefix:
    Description: S3 key prefix that is used to simulate a folder for the copy of the nested templates.
    Type: String

Conditions:
  DBTypeIsOracle: !Equals
    - !Ref DBPEngine
    - Oracle

  DBTypeIsSQL: !Equals
    - !Ref DBPEngine
    - SQL

  DBTypeIsPostgreSQL: !Equals
    - !Ref DBPEngine
    - PostgreSQL

  DBTypeIsAuroraPostgreSQL: !Equals
    - !Ref DBPEngine
    - AuroraPostgreSQL

  GovCloudCondition: !Or
    - !Equals
      - !Ref AWS::Region
      - us-gov-west-1
    - !Equals
      - !Ref AWS::Region
      - us-gov-east-1

Resources:
  DSOracleRDS:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}templates/common/db/ds-db-oracle-rds.template.yaml
      TimeoutInMinutes: 120
      Parameters:
        DBIRDSInstanceSize: !Ref DBIRDSInstanceSize
        DBIStorageAllocation: !Ref DBIStorageAllocation
        DBPBackupDays: !Ref DBPBackupDays
        DBICAdminName: !Ref DBICAdminName
        DBICAdminPassword: !Ref DBICAdminPassword
        DBPName: !Ref DBPName
        RDSSG: !Ref RDSSG
        DBISubnetGroupName: !Ref DBISubnetGroup
        MultiAZ: !Ref MultiAZ
    Condition: DBTypeIsOracle

  DSSQLRDS:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}templates/common/db/ds-db-mssql-rds.template.yaml
      TimeoutInMinutes: 120
      Parameters:
        DBIRDSInstanceSize: !Ref DBIRDSInstanceSize
        DBIStorageAllocation: !Ref DBIStorageAllocation
        DBPBackupDays: !Ref DBPBackupDays
        DBICAdminName: !Ref DBICAdminName
        DBICAdminPassword: !Ref DBICAdminPassword
        DBPName: !Ref DBPName
        RDSSG: !Ref RDSSG
        DBISubnetGroupName: !Ref DBISubnetGroup
        MultiAZ: !Ref MultiAZ
    Condition: DBTypeIsSQL

  DSPostgreSQLRDS:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}templates/common/db/ds-db-postgresql-rds.template.yaml
      TimeoutInMinutes: 120
      Parameters:
        DBIRDSInstanceSize: !Ref DBIRDSInstanceSize
        DBIStorageAllocation: !Ref DBIStorageAllocation
        DBPBackupDays: !Ref DBPBackupDays
        DBICAdminName: !Ref DBICAdminName
        DBICAdminPassword: !Ref DBICAdminPassword
        DBPName: !Ref DBPName
        RDSSG: !Ref RDSSG
        DBISubnetGroupName: !Ref DBISubnetGroup
        MultiAZ: !Ref MultiAZ
    Condition: DBTypeIsPostgreSQL

  DSAuroraPostgreSQLRDS:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}templates/common/db/ds-db-postgresql-rds-aurora.template.yaml
      TimeoutInMinutes: 65
      Parameters:
        DBIRDSInstanceSize: !Ref DBIRDSInstanceSize
        DBPBackupDays: !Ref DBPBackupDays
        DBICAdminName: !Ref DBICAdminName
        DBICAdminPassword: !Ref DBICAdminPassword
        DBPName: !Ref DBPName
        RDSSG: !Ref RDSSG
        DBISubnetGroupName: !Ref DBISubnetGroup
    Condition: DBTypeIsAuroraPostgreSQL

  DBISubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: DeepSecurityRDSSubnetGroup
      SubnetIds:
        - !Ref DBISubnet1
        - !Ref DBISubnet2

Outputs:
  DSDBEndpoint:
    Value: !If
      - DBTypeIsOracle
      - !GetAtt DSOracleRDS.Outputs.DSDBEndpoint
      - !If
        - DBTypeIsPostgreSQL
        - !GetAtt DSPostgreSQLRDS.Outputs.DSDBEndpoint
        - !If
          - DBTypeIsSQL
          - !GetAtt DSSQLRDS.Outputs.DSDBEndpoint
          - !If
            - DBTypeIsAuroraPostgreSQL
            - !GetAtt DSAuroraPostgreSQLRDS.Outputs.DSDBEndpoint
            - ""

  DSDBPort:
    Value: !If
      - DBTypeIsOracle
      - !GetAtt DSOracleRDS.Outputs.DSDBPort
      - !If
        - DBTypeIsPostgreSQL
        - !GetAtt DSPostgreSQLRDS.Outputs.DSDBPort
        - !If
          - DBTypeIsSQL
          - !GetAtt DSSQLRDS.Outputs.DSDBPort
          - !If
            - DBTypeIsAuroraPostgreSQL
            - !GetAtt DSAuroraPostgreSQLRDS.Outputs.DSDBPort
            - ""

  StorageType:
    Value: !Ref StorageType

  DBISubnetGroupName:
    Value: !Ref DBISubnetGroupName
