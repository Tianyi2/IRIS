AWSTemplateFormatVersion: 2010-09-09
Description: AWS CloudFormation Template for Lambda Layer

Parameters:
  EnvironmentType:
    Description: 'Environment Type'
    Type: String
    AllowedValues: [ 'dev', 'qa', 'qa2', 'uat', 'int', 'int2', 'production' ]
    Default: 'dev'
  S3Bucket:
    Description: 'Name of the S3 Bucket'
    Type: String
  S3Key:
    Description: 'Name of the S3 Key'
    Type: String
  LayerName:
    Description: 'Name of the Lambda Layer'
    Type: String
  VersionNumber:
    Description: 'Version Number of the Layer for updating layer name'
    Type: String
    Default: 1
  LayerDescription:
    Description: 'Lambda layer description'
    Type: String
    Default: "morpheusCfnLayer"

Resources:
  LambdaLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      CompatibleRuntimes:
        - python3.10
      Content:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref S3Key
      Description: !Ref LayerDescription
      LayerName: !Sub '${LayerName}-${EnvironmentType}-${AWS::Region}-${VersionNumber}'
      LicenseInfo: MIT

Outputs:
  LambdaLayer:
    Value: !Ref LambdaLayer