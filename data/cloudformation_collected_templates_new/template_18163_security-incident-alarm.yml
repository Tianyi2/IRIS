Resources:
  FailedLoginAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Alarm for repeated failed API calls"
      Namespace: AWS/CloudTrail
      MetricName: FailedAPICalls
      Dimensions:
        - Name: EventSource
          Value: signin.amazonaws.com
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref ResponseLambda
        - '{{SNS_TOPIC_ARN}}'  # Replace with your SNS Topic ARN
  ResponseLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SecurityResponse
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          def get_input(prompt):
              try:
                  return os.environ.get(prompt) or input(f"Enter {prompt}: ")
              except EOFError:
                  raise ValueError(f"{prompt} not provided")

          def lambda_handler(event, context):
              region = get_input('AWS_REGION')
              sns_topic_arn = get_input('SNS_TOPIC_ARN')
              iam = boto3.client('iam', region_name=region)
              user = event.get('user', 'unknown')
              iam.deactivate_mfa_device(UserName=user)
              iam.delete_access_key(UserName=user, AccessKeyId='compromised-key')
              sns = boto3.client('sns', region_name=region)
              sns.publish(
                  TopicArn=sns_topic_arn,
                  Message=f"Security response executed for user {user}"
              )
              return {'statusCode': 200, 'body': json.dumps('Security response executed')}
      Runtime: python3.9
      Timeout: 30
      Environment:
        Variables:
          AWS_REGION: '{{AWS_REGION}}'  # Replace with your AWS region (e.g., us-east-1)
          SNS_TOPIC_ARN: '{{SNS_TOPIC_ARN}}'  # Replace with your SNS Topic ARN
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecurityResponsePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:DeactivateMFADevice
                  - iam:DeleteAccessKey
                  - sns:Publish
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
