AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Roles for lambda functions

Parameters:
  EnvironmentType:
    Type: String
    Description: Environment of Deployment
    AllowedValues: [ 'dev', 'qa', 'qa2', 'uat', 'int', 'int2', 'production' ]
    Default: 'dev'
  UnOrganizedBucket:
    Type: String
    Description: Un-Organized bucket name
  OrganizedBucket:
    Type: String
    Description: Organized bucket name
  EventsTopicSnsArn:
    Type: String
    Description: SNS Events fifo topic arn
  BucketDecryptionKey:
    Description: S3 Bucket Decryption Key
    Type: String
  SnsEncryptionKey:
    Description: CKMS key for SNS
    Type: String
  PrivoUserPoolArn:
    Description: Privo User Pool Id
    Type: String


Resources:
  PartnerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'morpheus-partner-cfn-${EnvironmentType}-lambda-role'
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: ''
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: logs
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub 'arn:aws:logs:*:${AWS::AccountId}:*'
        - PolicyName: dynamodb
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:ListTables
                  - dynamodb:DescribeTable
                  - dynamodb:Update*
                  - dynamodb:PutItem
                  - dynamodb:Get*
                  - dynamodb:BatchGet*
                Resource:
                  - !Sub 'arn:aws:dynamodb:*:*:table/Privo-*'
                  - !Sub 'arn:aws:dynamodb:*:*:table/Ksf-Microweb-Links-Table'
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/secret/morpheus-*'
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/secret/morpheus/*'
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/secret/application-*'
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/secret/morpheus'
        - PolicyName: queues
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:SendMessage
                  - sqs:DeleteMessage
                  - sqs:Get*
                Resource:
                  - !Sub 'arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:morpheus-*'
                  - !Sub 'arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:aquaflow-*'
                  - !Sub 'arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:branchled-partner-*'
                  - !Sub 'arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:notifications*'
        - PolicyName: buckets
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !Sub 'arn:aws:s3:::${OrganizedBucket}/*'
                  - !Sub 'arn:aws:s3:::${UnOrganizedBucket}/*'
        - PolicyName: lambdaVPCAccessExecutionPermission
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeSubnets
                  - ec2:DeleteNetworkInterface
                  - ec2:AssignPrivateIpAddresses
                  - ec2:UnassignPrivateIpAddresses
                Resource:
                  - !Sub '*'
        - PolicyName: sns
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref EventsTopicSnsArn
        - PolicyName: crypto
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:Encrypt
                  - kms:ReEncrypt*
                  - kms:GenerateDataKey*
                  - kms:DescribeKey
                Resource:
                  - !Ref BucketDecryptionKey
                  - !Ref SnsEncryptionKey
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:ListUsers
                  - cognito-idp:AdminUpdateUserAttributes
                Resource:
                  - !Ref PrivoUserPoolArn
        - PolicyName: stepfunctions
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - states:Start*
                  - states:Describe*
                  - states:Get*
                  - states:StopExecution
                  - states:SendTaskSuccess
                Resource:
                  - !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:morpheus*'
                  - !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:morpheus-*'
                  - !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:aquaflow-*'
                  - !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:BranchLedCfnPartner-*'
                  - !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:Aquaman-*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
Outputs:
  PartnerLambdaRoleArn:
    Description: 'Lambda IAM Role for cloudwatch, SQS, S3 and DynamoDb'
    Value: !GetAtt PartnerLambdaRole.Arn
