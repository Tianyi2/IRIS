AWSTemplateFormatVersion: '2010-09-09'
Description: 'HDB Agent - Phase 3 PostgreSQL Integration (Simplified)'

Parameters:
  ProjectPrefix:
    Type: String
    Default: hdbma
    Description: Project prefix for resource naming
  
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod
    Description: Environment name
  
  VersionTag:
    Type: String
    Default: v1
    Description: Version identifier for resources

  ExistingRDSEndpoint:
    Type: String
    Default: database-1.ch2k24cycu6i.ap-southeast-2.rds.amazonaws.com
    Description: Existing RDS PostgreSQL endpoint

  ExistingDatabaseName:
    Type: String
    Default: hdba_postgres
    Description: Existing PostgreSQL database name

Resources:
  # Database Master Password Secret (for direct connection)
  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectPrefix}-postgres-${EnvironmentName}-${VersionTag}'
      Description: !Sub 'PostgreSQL credentials for HDB Agent (${EnvironmentName}-${VersionTag})'
      SecretString: !Sub |
        {
          "username": "postgres",
          "password": "hackathon2024",
          "engine": "postgres",
          "host": "${ExistingRDSEndpoint}",
          "port": 5432,
          "dbname": "${ExistingDatabaseName}"
        }
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Version
          Value: !Ref VersionTag

  # IAM Role for PostgreSQL Lambda functions
  PostgreSQLLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectPrefix}-postgres-lambda-role-${EnvironmentName}-${VersionTag}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: PostgreSQLAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Ref DatabaseSecret
              - Effect: Allow
                Action:
                  - rds-data:ExecuteStatement
                  - rds-data:BatchExecuteStatement
                  - rds-data:BeginTransaction
                  - rds-data:CommitTransaction
                  - rds-data:RollbackTransaction
                Resource: !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:*'
              - Effect: Allow
                Action:
                  - rds:DescribeDBClusters
                  - rds:DescribeDBInstances
                Resource: '*'
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Version
          Value: !Ref VersionTag

  # Security Group for Lambda to access RDS
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda to access PostgreSQL RDS
      VpcId: vpc-0594a667050262c62
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 10.0.0.0/8
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectPrefix}-lambda-sg-${EnvironmentName}-${VersionTag}'

  # Lambda Function for PostgreSQL API
  PostgreSQLAPIFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectPrefix}-postgres-api-${EnvironmentName}-${VersionTag}'
      Runtime: python3.13
      Handler: lambda_function.lambda_handler
      Timeout: 60
      MemorySize: 1024
      Role: !GetAtt PostgreSQLLambdaRole.Arn
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - subnet-05ef955b7c5edb66e
          - subnet-0be15cf15ab7853eb
      Environment:
        Variables:
          DATABASE_NAME: !Ref ExistingDatabaseName
          SECRET_ARN: !Ref DatabaseSecret
          CONNECTION_TYPE: direct_connection
          DB_HOST: !Ref ExistingRDSEndpoint
          DB_PORT: '5432'
      Code: ../lambda/postgres_query/
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Version
          Value: !Ref VersionTag

  # API Gateway for PostgreSQL Lambda
  PostgreSQLAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${ProjectPrefix}-postgres-api-${EnvironmentName}-${VersionTag}'
      Description: 'API for HDB PostgreSQL queries'
      EndpointConfiguration:
        Types:
          - REGIONAL

  # API Gateway Resource (catch-all)
  PostgreSQLAPIResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PostgreSQLAPI
      ParentId: !GetAtt PostgreSQLAPI.RootResourceId
      PathPart: '{proxy+}'

  # API Gateway Method for all HTTP methods
  PostgreSQLAPIMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PostgreSQLAPI
      ResourceId: !Ref PostgreSQLAPIResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PostgreSQLAPIFunction.Arn}/invocations'

  # Root resource method for health check
  PostgreSQLAPIRootMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PostgreSQLAPI
      ResourceId: !GetAtt PostgreSQLAPI.RootResourceId
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PostgreSQLAPIFunction.Arn}/invocations'

  # Lambda permissions for API Gateway
  PostgreSQLAPILambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PostgreSQLAPIFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PostgreSQLAPI}/*/*'

  PostgreSQLAPIRootLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PostgreSQLAPIFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PostgreSQLAPI}/*'

  # API Gateway Deployment
  PostgreSQLAPIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: 
      - PostgreSQLAPIMethod
      - PostgreSQLAPIRootMethod
    Properties:
      RestApiId: !Ref PostgreSQLAPI
      StageName: !Ref EnvironmentName

Outputs:
  DatabaseSecretArn:
    Description: ARN of the database secret for PostgreSQL connection
    Value: !Ref DatabaseSecret
    Export:
      Name: !Sub '${AWS::StackName}-DatabaseSecretArn'

  PostgreSQLAPIEndpoint:
    Description: API Gateway endpoint for PostgreSQL queries
    Value: !Sub 'https://${PostgreSQLAPI}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}'
    Export:
      Name: !Sub '${AWS::StackName}-PostgreSQLAPIEndpoint'

  PostgreSQLLambdaFunction:
    Description: PostgreSQL Lambda function name
    Value: !Ref PostgreSQLAPIFunction
    Export:
      Name: !Sub '${AWS::StackName}-PostgreSQLLambdaFunction'

  DatabaseEndpoint:
    Description: Direct PostgreSQL database endpoint
    Value: !Ref ExistingRDSEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-DatabaseEndpoint'

  SamplePostgreSQLQuery:
    Description: Sample PostgreSQL query to test the setup
    Value: |
      SELECT town, flat_type, AVG(resale_price::numeric) as avg_price, COUNT(*) as transactions
      FROM resale_transactions
      WHERE month >= TO_CHAR(CURRENT_DATE - INTERVAL '12 months', 'YYYY-MM')
      GROUP BY town, flat_type
      ORDER BY avg_price DESC
      LIMIT 10;
    Export:
      Name: !Sub '${AWS::StackName}-SamplePostgreSQLQuery'