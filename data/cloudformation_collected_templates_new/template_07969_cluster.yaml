        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt DeploymentControllerRole.Arn
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:aws:iam::${AWS::AccountId}:policy/ZalandoCloud-mlbuilder-permission-boundary"
{{- end }}
  DeploymentStatusServiceRole:
    Type: AWS::IAM::Role
