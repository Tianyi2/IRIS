  AWSLBControllerIAMRole:
    Properties:
      AssumeRolePolicyDocument: !Sub
        - |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Federated": [
                    "arn:aws:iam::${AWS::AccountId}:oidc-provider/${OIDC}"
                  ]
                },
                "Action": [
                  "sts:AssumeRoleWithWebIdentity"
                ],
                "Condition": {
                  "StringEquals": {
                    "${OIDC}:sub": "system:serviceaccount:kube-system:aws-load-balancer-controller"
                  }
                }
              }
            ]
          }
        - OIDC: !Select [1, !Split ["//", !GetAtt EKSCluster.OpenIdConnectIssuerUrl]]
      Path: /
      Policies:
        - PolicyDocument:
            Version: '2012-10-17'
            Statement:
            - Effect: Allow
              Action:
              - iam:CreateServiceLinkedRole
              Resource: "*"
              Condition:
                StringEquals:
                  iam:AWSServiceName: elasticloadbalancing.amazonaws.com
            - Effect: Allow
              Action:
              - ec2:DescribeAccountAttributes
              - ec2:DescribeAddresses
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeInternetGateways
              - ec2:DescribeVpcs
              - ec2:DescribeVpcPeeringConnections
              - ec2:DescribeSubnets
              - ec2:DescribeSecurityGroups
              - ec2:DescribeInstances
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeTags
              - ec2:GetCoipPoolUsage
              - ec2:DescribeCoipPools
              - ec2:GetSecurityGroupsForVpc
              - ec2:DescribeIpamPools
              - elasticloadbalancing:DescribeLoadBalancers
              - elasticloadbalancing:DescribeLoadBalancerAttributes
              - elasticloadbalancing:DescribeListeners
              - elasticloadbalancing:DescribeListenerCertificates
              - elasticloadbalancing:DescribeSSLPolicies
              - elasticloadbalancing:DescribeRules
              - elasticloadbalancing:DescribeTargetGroups
              - elasticloadbalancing:DescribeTargetGroupAttributes
              - elasticloadbalancing:DescribeTargetHealth
              - elasticloadbalancing:DescribeTags
              - elasticloadbalancing:DescribeTrustStores
              - elasticloadbalancing:DescribeListenerAttributes
              - elasticloadbalancing:DescribeCapacityReservation
              Resource: "*"
            - Effect: Allow
              Action:
              - cognito-idp:DescribeUserPoolClient
              - acm:ListCertificates
              - acm:DescribeCertificate
              - iam:ListServerCertificates
              - iam:GetServerCertificate
              - waf-regional:GetWebACL
              - waf-regional:GetWebACLForResource
              - waf-regional:AssociateWebACL
              - waf-regional:DisassociateWebACL
              - wafv2:GetWebACL
              - wafv2:GetWebACLForResource
              - wafv2:AssociateWebACL
              - wafv2:DisassociateWebACL
              - shield:GetSubscriptionState
              - shield:DescribeProtection
              - shield:CreateProtection
              - shield:DeleteProtection
              Resource: "*"
            - Effect: Allow
              Action:
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:RevokeSecurityGroupIngress
              Resource: "*"
            - Effect: Allow
              Action:
              - ec2:CreateSecurityGroup
              Resource: "*"
            - Effect: Allow
              Action:
              - ec2:CreateTags
              Resource: arn:aws:ec2:*:*:security-group/*
              Condition:
                StringEquals:
                  ec2:CreateAction: CreateSecurityGroup
                'Null':
                  aws:RequestTag/elbv2.k8s.aws/cluster: 'false'
            - Effect: Allow
              Action:
              - ec2:CreateTags
              - ec2:DeleteTags
              Resource: arn:aws:ec2:*:*:security-group/*
              Condition:
                'Null':
                  aws:RequestTag/elbv2.k8s.aws/cluster: 'true'
                  aws:ResourceTag/elbv2.k8s.aws/cluster: 'false'
            - Effect: Allow
              Action:
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:RevokeSecurityGroupIngress
              - ec2:DeleteSecurityGroup
              Resource: "*"
              Condition:
                'Null':
                  aws:ResourceTag/elbv2.k8s.aws/cluster: 'false'
            - Effect: Allow
              Action:
              - elasticloadbalancing:CreateLoadBalancer
              - elasticloadbalancing:CreateTargetGroup
              Resource: "*"
              Condition:
                'Null':
                  aws:RequestTag/elbv2.k8s.aws/cluster: 'false'
            - Effect: Allow
              Action:
              - elasticloadbalancing:CreateListener
              - elasticloadbalancing:DeleteListener
              - elasticloadbalancing:CreateRule
              - elasticloadbalancing:DeleteRule
              Resource: "*"
            - Effect: Allow
              Action:
              - elasticloadbalancing:AddTags
              - elasticloadbalancing:RemoveTags
              Resource:
              - arn:aws:elasticloadbalancing:*:*:targetgroup/*/*
              - arn:aws:elasticloadbalancing:*:*:loadbalancer/net/*/*
              - arn:aws:elasticloadbalancing:*:*:loadbalancer/app/*/*
              Condition:
                'Null':
                  aws:RequestTag/elbv2.k8s.aws/cluster: 'true'
                  aws:ResourceTag/elbv2.k8s.aws/cluster: 'false'
            - Effect: Allow
              Action:
              - elasticloadbalancing:AddTags
              - elasticloadbalancing:RemoveTags
              Resource:
              - arn:aws:elasticloadbalancing:*:*:listener/net/*/*/*
              - arn:aws:elasticloadbalancing:*:*:listener/app/*/*/*
              - arn:aws:elasticloadbalancing:*:*:listener-rule/net/*/*/*
              - arn:aws:elasticloadbalancing:*:*:listener-rule/app/*/*/*
            - Effect: Allow
              Action:
              - elasticloadbalancing:ModifyLoadBalancerAttributes
              - elasticloadbalancing:SetIpAddressType
              - elasticloadbalancing:SetSecurityGroups
              - elasticloadbalancing:SetSubnets
              - elasticloadbalancing:DeleteLoadBalancer
              - elasticloadbalancing:ModifyTargetGroup
              - elasticloadbalancing:ModifyTargetGroupAttributes
              - elasticloadbalancing:DeleteTargetGroup
              - elasticloadbalancing:ModifyListenerAttributes
              - elasticloadbalancing:ModifyCapacityReservation
              - elasticloadbalancing:ModifyIpPools
              Resource: "*"
              Condition:
                'Null':
                  aws:ResourceTag/elbv2.k8s.aws/cluster: 'false'
            - Effect: Allow
              Action:
              - elasticloadbalancing:AddTags
              Resource:
              - arn:aws:elasticloadbalancing:*:*:targetgroup/*/*
              - arn:aws:elasticloadbalancing:*:*:loadbalancer/net/*/*
              - arn:aws:elasticloadbalancing:*:*:loadbalancer/app/*/*
              Condition:
                StringEquals:
                  elasticloadbalancing:CreateAction:
                  - CreateTargetGroup
                  - CreateLoadBalancer
                'Null':
                  aws:RequestTag/elbv2.k8s.aws/cluster: 'false'
            - Effect: Allow
              Action:
              - elasticloadbalancing:RegisterTargets
              - elasticloadbalancing:DeregisterTargets
              Resource: arn:aws:elasticloadbalancing:*:*:targetgroup/*/*
            - Effect: Allow
              Action:
              - elasticloadbalancing:SetWebAcl
              - elasticloadbalancing:ModifyListener
              - elasticloadbalancing:AddListenerCertificates
              - elasticloadbalancing:RemoveListenerCertificates
              - elasticloadbalancing:ModifyRule
              - elasticloadbalancing:SetRulePriorities
              Resource: "*"
          PolicyName: root
      RoleName: "aws-lb-controller-{{.Cluster.LocalID}}"
    Type: 'AWS::IAM::Role'
# {{- end }}
  RemoteFilesEncryptionKey:
    Type: "AWS::KMS::Key"
    Properties:
      Description: The master key for encryption of remote files
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Id: "remote-files-encryption-key"
        Statement:
          - Sid: "Enable IAM User Permissions"
            Effect: "Allow"
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
            - "kms:DescribeKey"
            Resource: "*"
          - Sid: "Allow administering the key"
            Effect: "Allow"
            Principal:
              AWS:
                - !Sub "arn:aws:iam::${AWS::AccountId}:role/cluster-lifecycle-manager-entrypoint"
                - !Sub "arn:aws:iam::${AWS::AccountId}:role/Shibboleth-Administrator"
                - !Sub "arn:aws:iam::${AWS::AccountId}:role/Administrator"
            Action:
            - "kms:*"
            - "tag:TagResources"
            Resource: "*"
          - Sid: "Enable master and worker nodes to decrypt the remote files"
            Effect: "Allow"
            Principal:
              AWS:
                - "Fn::GetAtt":
                  - "MasterIAMRole"
                  - "Arn"
                - "Fn::GetAtt":
                  - "WorkerIAMRole"
                  - "Arn"
            Resource: "*"
            Action:
            - "kms:Decrypt"
  EtcdEncryptionKey:
    Type: "AWS::KMS::Key"
    Properties:
      Description: The KMS key for encryption of secrets in etcd
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Id: "etcd-key-policy"
        Statement:
          - Sid: "Allow CLM to manage this key"
            Effect: "Allow"
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:role/cluster-lifecycle-manager-entrypoint"
            Action: "kms:*"
            Resource: "*"
          - Sid: "Allow Administrator to manage and use this key"
            Effect: "Allow"
            Principal:
              AWS:
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/Shibboleth-Administrator"
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/Administrator"
            Action:
            - "kms:*"
            - "tag:TagResources"
            Resource: "*"
{{- if eq .Cluster.Provider "zalando-eks" }}
          - Sid: "Allow EKSClusterRole access to describe the key"
            Effect: "Allow"
            Principal:
              AWS:
              - !GetAtt EKSClusterRole.Arn
            Action:
            - "kms:DescribeKey"
            - "kms:CreateGrant"
            Resource: "*"
{{- else }}
          - Sid: "Enable master nodes to encrypt and decrypt secrets in etcd"
            Effect: "Allow"
            Principal:
              AWS:
                - "Fn::GetAtt":
                  - "MasterIAMRole"
                  - "Arn"
            Resource: "*"
            Action:
            - "kms:Encrypt"
            - "kms:Decrypt"
{{- end }}
{{- if ne .Cluster.Provider "zalando-eks" }}
  MasterFilesEncryptionKey:
    Type: "AWS::KMS::Key"
    Properties:
      Description: The KMS key for encryption of remote files for master nodes
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Id: "master-key-policy"
        Statement:
          - Sid: "Enable IAM User Permissions"
            Effect: "Allow"
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
            - "kms:DescribeKey"
            Resource: "*"
          - Sid: "Allow administering the key"
            Effect: "Allow"
            Principal:
              AWS:
                - !Sub "arn:aws:iam::${AWS::AccountId}:role/cluster-lifecycle-manager-entrypoint"
                - !Sub "arn:aws:iam::${AWS::AccountId}:role/Shibboleth-Administrator"
                - !Sub "arn:aws:iam::${AWS::AccountId}:role/Administrator"
            Action:
            - "kms:*"
            - "tag:TagResources"
            Resource: "*"
          - Sid: "Enable master nodes to decrypt the remote files"
            Effect: "Allow"
            Principal:
              AWS:
                - "Fn::GetAtt":
                  - "MasterIAMRole"
                  - "Arn"
            Resource: "*"
            Action:
            - "kms:Decrypt"
{{- end}}
  WorkerFilesEncryptionKey:
    Type: "AWS::KMS::Key"
    Properties:
      Description: The KMS key for encryption of remote files for worker nodes
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Id: "worker-key-policy"
        Statement:
          - Sid: "Enable IAM User Permissions"
            Effect: "Allow"
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
            - "kms:DescribeKey"
            Resource: "*"
          - Sid: "Allow administering the key"
            Effect: "Allow"
            Principal:
              AWS:
                - !Sub "arn:aws:iam::${AWS::AccountId}:role/cluster-lifecycle-manager-entrypoint"
                - !Sub "arn:aws:iam::${AWS::AccountId}:role/Shibboleth-Administrator"
                - !Sub "arn:aws:iam::${AWS::AccountId}:role/Administrator"
            Action:
            - "kms:*"
            - "tag:TagResources"
            Resource: "*"
          - Sid: "Enable worker nodes to decrypt the remote files"
            Effect: "Allow"
            Principal:
              AWS:
                - "Fn::GetAtt":
                  - "WorkerIAMRole"
                  - "Arn"
            Resource: "*"
            Action:
            - "kms:Decrypt"
