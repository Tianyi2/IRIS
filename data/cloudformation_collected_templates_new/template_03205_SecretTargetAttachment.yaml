AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Minimal CloudFormation template demonstrating
  AWS::SecretsManager::SecretTargetAttachment usage.

Resources:

  # RDS MySQL database instance
  MyDBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: MySQL
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      MasterUsername: admin
      MasterUserPassword: AdminPassword123!
      PubliclyAccessible: true
      BackupRetentionPeriod: 0

  # Secrets Manager secret storing database credentials
  MyDBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Secret for RDS database credentials
      GenerateSecretString:
        SecretStringTemplate: '{"username":"admin"}'
        GenerateStringKey: password
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  # Attaches the secret to the RDS instance
  # This enables Secrets Manager rotation integration with RDS
  MySecretAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref MyDBSecret
      TargetId: !Ref MyDBInstance
      TargetType: AWS::RDS::DBInstance

Outputs:

  DBInstanceIdentifier:
    Description: RDS instance identifier
    Value: !Ref MyDBInstance

  SecretArn:
    Description: ARN of the created secret
    Value: !Ref MyDBSecret
