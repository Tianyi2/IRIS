Conditions:
  PerHostSupportedRegion: !Not
    - !Equals
      - !Ref AWS::Region
      - match-all-regions

  GovCloudCondition: !Or
    - !Equals
      - !Ref AWS::Region
      - us-gov-west-1
    - !Equals
      - !Ref AWS::Region
      - us-gov-east-1

Resources:
  MainMP:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}templates/marketplace/main-mp.template.yaml
      Parameters:
        AWSIKeyPairName: !Ref AWSKeyPairName
        AWSIVPC: !Ref AWSVPC
        DSISubnetID: !Ref DeepSecuritySubnet
        DBIRDSInstanceSize: !FindInMap
          - RDSInstanceSize
          - !Ref AWS::Region
          - !FindInMap
            - DeploymentSize
            - !Ref ProtectedInstances
            - Size
        DBIStorageAllocation: !FindInMap
          - RDSStorageSize
          - !Ref ProtectedInstances
          - Size
        DBPBackupDays: "5"
        DBPCreateDbInstance: Yes
        DBICAdminName: dsmadmin
        DBICAdminPassword: !Ref DeepSecurityAdminPass
        DBPEngine: PostgreSQL
        DBPEndpoint: ""
        DBPName: dsm
        DSCAdminName: !Ref DeepSecurityAdminName
        DSCAdminPassword: !Ref DeepSecurityAdminPass
        DSIMultiNode: "2"
        DSIPLicenseKey: XX-XXXX-XXXXX-XXXXX-XXXXX-XXXXX-XXXXX
        DSIPHeartbeatPort: "4120"
        DSIPGUIPort: "443"
        DSIPInstanceType: !FindInMap
          - DSMSIZE
          - !Ref AWS::Region
          - !FindInMap
            - DeploymentSize
            - !Ref ProtectedInstances
            - Size
        DBISubnet1: !Ref DatabaseSubnet1
        DBISubnet2: !Ref DatabaseSubnet2
        DSIPLicense: PerHost
        DBPMultiAZ: "true"
        ImageId: !Ref ImageId
        MPS3BucketName: !Ref MPS3BucketName
        MPS3BucketRegion: !Ref MPS3BucketRegion
        MPS3KeyPrefix: !Ref MPS3KeyPrefix
    Condition: PerHostSupportedRegion

Outputs:
  DeepSecurityConsole:
    Value: !GetAtt MainMP.Outputs.DeepSecurityConsole
    Condition: PerHostSupportedRegion
