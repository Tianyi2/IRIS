AWSTemplateFormatVersion: '2010-09-09'
Description: 'Amazon EKS Cluster with EC2 worker nodes'

Parameters:
  EnvironmentName:
    Type: String
    Default: claim-status-prod
    Description: Environment name prefix
  
  KubernetesVersion:
    Type: String
    Default: '1.28'
    Description: Kubernetes version
  
  NodeInstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type for worker nodes
    AllowedValues:
      - t3.medium
      - t3.large
      - m5.large
      - m5.xlarge
  
  NodeGroupMinSize:
    Type: Number
    Default: 2
    Description: Minimum number of worker nodes
  
  NodeGroupMaxSize:
    Type: Number
    Default: 4
    Description: Maximum number of worker nodes
  
  NodeGroupDesiredSize:
    Type: Number
    Default: 2
    Description: Desired number of worker nodes

Resources:
  # EKS Cluster IAM Role
  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
        - arn:aws:iam::aws:policy/AmazonEKSVPCResourceController
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-eks-cluster-role

  # EKS Cluster
  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub ${EnvironmentName}-cluster
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt EKSClusterRole.Arn
      ResourcesVpcConfig:
        SecurityGroupIds:
          - Fn::ImportValue: !Sub ${EnvironmentName}-EKSClusterSecurityGroup
        SubnetIds: !Split
          - ','
          - Fn::ImportValue: !Sub ${EnvironmentName}-PrivateSubnets
        EndpointPrivateAccess: true
        EndpointPublicAccess: true
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
            - Type: authenticator
            - Type: controllerManager
            - Type: scheduler
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-cluster

  # EKS Node IAM Role
  EKSNodeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-eks-node-role

  # Additional IAM Policy for Node Role
  EKSNodeAdditionalPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ${EnvironmentName}-eks-node-additional-policy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/claims-status
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub arn:aws:s3:::claim-notes-${AWS::AccountId}
              - !Sub arn:aws:s3:::claim-notes-${AWS::AccountId}/*
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource: !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-lite-v1:0
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/eks/${EnvironmentName}-cluster/*
      Roles:
        - !Ref EKSNodeRole

  # EKS Node Group
  EKSNodeGroup:
    Type: AWS::EKS::Nodegroup
    DependsOn: EKSCluster
    Properties:
      ClusterName: !Ref EKSCluster
      NodegroupName: !Sub ${EnvironmentName}-node-group
      NodeRole: !GetAtt EKSNodeRole.Arn
      Subnets: !Split
        - ','
        - Fn::ImportValue: !Sub ${EnvironmentName}-PrivateSubnets
      ScalingConfig:
        MinSize: !Ref NodeGroupMinSize
        MaxSize: !Ref NodeGroupMaxSize
        DesiredSize: !Ref NodeGroupDesiredSize
      InstanceTypes:
        - !Ref NodeInstanceType
      AmiType: AL2_x86_64
      DiskSize: 20
      Labels:
        Environment: !Ref EnvironmentName
        Application: claim-status-api
      Tags:
        Name: !Sub ${EnvironmentName}-node
        Environment: !Ref EnvironmentName

  # OIDC Provider for IRSA (IAM Roles for Service Accounts)
  EKSClusterOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 9e99a48a9960b14926bb7f3b02e22da2b0ab7280
      Url: !GetAtt EKSCluster.OpenIdConnectIssuerUrl
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-eks-oidc-provider

  # Service Account IAM Role for Pods
  PodServiceAccountRole:
    Type: AWS::IAM::Role
    DependsOn: EKSClusterOIDCProvider
    Properties:
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {
                    "Federated": "${OIDCProviderArn}"
                  },
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${OIDCUrl}:sub": "system:serviceaccount:claim-status-api:claim-api-sa"
                    }
                  }
                }
              ]
            }
          - OIDCProviderArn: !GetAtt EKSClusterOIDCProvider.Arn
            OIDCUrl: !Select [1, !Split ["//", !GetAtt EKSCluster.OpenIdConnectIssuerUrl]]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-pod-service-account-role

  PodServiceAccountPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ${EnvironmentName}-pod-service-account-policy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/claims-status
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub arn:aws:s3:::claim-notes-${AWS::AccountId}
              - !Sub arn:aws:s3:::claim-notes-${AWS::AccountId}/*
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource: !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-lite-v1:0
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/eks/${EnvironmentName}-cluster/*
      Roles:
        - !Ref PodServiceAccountRole

Outputs:
  EKSClusterName:
    Description: EKS Cluster Name
    Value: !Ref EKSCluster
    Export:
      Name: !Sub ${EnvironmentName}-EKSClusterName

  EKSClusterArn:
    Description: EKS Cluster ARN
    Value: !GetAtt EKSCluster.Arn
    Export:
      Name: !Sub ${EnvironmentName}-EKSClusterArn

  EKSClusterEndpoint:
    Description: EKS Cluster Endpoint
    Value: !GetAtt EKSCluster.Endpoint
    Export:
      Name: !Sub ${EnvironmentName}-EKSClusterEndpoint

  EKSNodeRoleArn:
    Description: EKS Node Role ARN
    Value: !GetAtt EKSNodeRole.Arn
    Export:
      Name: !Sub ${EnvironmentName}-EKSNodeRoleArn

  PodServiceAccountRoleArn:
    Description: Pod Service Account Role ARN
    Value: !GetAtt PodServiceAccountRole.Arn
    Export:
      Name: !Sub ${EnvironmentName}-PodServiceAccountRoleArn
