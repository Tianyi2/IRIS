AWSTemplateFormatVersion: "2010-09-09"
Description: Partner Stack for API Gateway Resources

Parameters:
  EnvironmentType:
    Type: String
    Description: Environment of Deployment
    AllowedValues: [ "dev", "qa", "qa2", "uat", "int", "int2", "production" ]
  PrivoPartnerApiLambdaArn:
    Type: String
    Description: Privo partner fast api proxy lambda
  PrivoPartnerWebhookApiArn:
    Type: String
    Description: Privo Partner Webhook lambda
  SblPartnerApiLambdaArn:
    Type: String
    Description: SBL partner fast api proxy lambda
  MicroWebServiceLambdaArn:
    Type: String
    Description: Micro Web Service fast api lambda
  MicroWebAuthLambdaArn:
    Type: String
    Description: Micro Web Service fast api lambda

Resources:
  PartnerApiEndpoint:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        IronManPartnerAuthorizerLambdaArn: !ImportValue PartnerProxyAuthorizerFunction
        EnvironmentType: !Ref EnvironmentType
        PrivoPartnerApiLambdaArn: !Ref PrivoPartnerApiLambdaArn
        PrivoPartnerWebhookApiArn: !Ref PrivoPartnerWebhookApiArn
        SblPartnerApiLambdaArn: !Ref SblPartnerApiLambdaArn
        MicroWebServiceLambdaArn: !Ref MicroWebServiceLambdaArn
        MicroWebApiId: !ImportValue AntmanApi
        MicroWebApiParentResourceId: !ImportValue AntmanAPIRootResourceId
        AntmanGatewayIronManAuthorizer: !ImportValue AntmanTokenAuthorizer
      TemplateURL: partner_apis.yaml
  MicrowebApi:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        EnvironmentType: !Ref EnvironmentType
        MicroWebServiceLambdaArn: !Ref MicroWebServiceLambdaArn
        MicroWebAuthLambdaArn: !Ref MicroWebAuthLambdaArn
      TemplateURL: microweb_apis.yaml