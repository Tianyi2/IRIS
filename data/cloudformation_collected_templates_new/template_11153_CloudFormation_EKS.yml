AWSTemplateFormatVersion: '2010-09-09'
Description: 'EKS Cluster with Managed Node Groups - Lefebre Use Case'

Parameters:
  ClusterName:
    Description: 'Name of the EKS Cluster (must be lowercase and follow DNS naming conventions)'
    Type: String
    MinLength: 1
    MaxLength: 63
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: 'Cluster name must be lowercase alphanumeric with hyphens'

  EnvironmentName:
    Description: 'Environment name (e.g., dev, staging, prod)'
    Type: String
    AllowedValues: ['dev', 'staging', 'prod']
    Default: 'dev'

  Organization:
    Description: Organization name
    Type: String
    Default: LefebreCorp

  BusinessUnit:
    Description: Business unit
    Type: String
    Default: CloudPlatform

  CostCenter:
    Description: Cost center code
    Type: String
    Default: CC1234

  Owner:
    Description: Resource owner (email or name)
    Type: String
    Default: team@example.com

  DataClassification:
    Description: Data classification
    Type: String
    Default: Internal

  Compliance:
    Description: Compliance label
    Type: String
    Default: ISO27001
  
  VpcId:
    Description: 'VPC ID where the EKS cluster will be deployed'
    Type: AWS::EC2::VPC::Id

  PublicSubnets:
    Description: 'List of public subnet IDs for load balancers'
    Type: List<AWS::EC2::Subnet::Id>

  PrivateSubnets:
    Description: 'List of private subnet IDs for worker nodes'
    Type: List<AWS::EC2::Subnet::Id>

  InstanceType:
    Description: 'EC2 instance type for worker nodes'
    Type: String
    Default: 't3.medium'
    AllowedValues:
      - 't3.small'
      - 't3.medium'
      - 't3.large'
      - 'm5.large'
      - 'm5.xlarge'
    ConstraintDescription: 'Must be a valid EC2 instance type'

  KubernetesVersion:
    Description: 'EKS Kubernetes version'
    Type: String
    Default: '1.29'
    AllowedValues:
      - '1.28'
      - '1.29'
      - '1.30'

  NodeVolumeSize:
    Description: 'Root volume size for worker nodes (GB)'
    Type: Number
    Default: 50
    MinValue: 20
    MaxValue: 1000

  NodeDesiredCapacity:
    Description: 'Initial number of worker nodes'
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 10

  NodeMinSize:
    Description: 'Minimum number of worker nodes'
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10

  NodeMaxSize:
    Description: 'Maximum number of worker nodes'
    Type: Number
    Default: 6
    MinValue: 1
    MaxValue: 20

  EnableClusterLogging:
    Description: 'Enable EKS control plane logging'
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

  LogRetentionDays:
    Description: 'Number of days to retain cluster logs'
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 365

  EnablePrivateEndpoint:
    Description: 'Enable private access to the Kubernetes API endpoint'
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

  EnablePublicEndpoint:
    Description: 'Enable public access to the Kubernetes API endpoint'
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

  CIDRForPrivateAccess:
    Description: 'CIDR blocks that can access the private endpoint (comma separated)'
    Type: CommaDelimitedList
    Default: '10.0.0.0/16'

  CIDRForPublicAccess:
    Description: 'CIDR blocks that can access the public endpoint (comma separated)'
    Type: CommaDelimitedList
    Default: '0.0.0.0/0'

  ExistingKeyPairName:
    Description: 'Name of an existing EC2 KeyPair for node SSH access'
    Type: AWS::EC2::KeyPair::KeyName
    Default: 'my-existing-keypair'

Mappings:
  AmiTypeMap:
    x86:
      AL2: 'AL2_x86_64'
      BOTTLEROCKET: 'BOTTLEROCKET_x86_64'
    arm64:
      AL2: 'AL2_ARM_64'
      BOTTLEROCKET: 'BOTTLEROCKET_ARM_64'

Conditions:
  IsProd: !Equals [!Ref EnvironmentName, 'prod']
  IsPublicEndpointEnabled: !Equals [!Ref EnablePublicEndpoint, 'true']
  IsPrivateEndpointEnabled: !Equals [!Ref EnablePrivateEndpoint, 'true']
  IsLoggingEnabled: !Equals [!Ref EnableClusterLogging, 'true']

Resources:
  # IAM Roles
  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ClusterName}-eks-cluster-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
        - arn:aws:iam::aws:policy/AmazonEKSServicePolicy
      Tags:
        - Key: Name
          Value: !Sub '${ClusterName}-eks-cluster-role'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Organization
          Value: !Ref Organization
        - Key: BusinessUnit
          Value: !Ref BusinessUnit
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: Owner
          Value: !Ref Owner
        - Key: DataClassification
          Value: !Ref DataClassification
        - Key: Compliance
          Value: !Ref Compliance

  NodegroupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ClusterName}-nodegroup-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      Tags:
        - Key: Name
          Value: !Sub '${ClusterName}-nodegroup-role'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Organization
          Value: !Ref Organization
        - Key: BusinessUnit
          Value: !Ref BusinessUnit
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: Owner
          Value: !Ref Owner
        - Key: DataClassification
          Value: !Ref DataClassification
        - Key: Compliance
          Value: !Ref Compliance

  # Security Groups
  ControlPlaneSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'Security group for EKS control plane communication with worker nodes'
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub '${ClusterName}-control-plane-sg'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Organization
          Value: !Ref Organization
        - Key: BusinessUnit
          Value: !Ref BusinessUnit
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: Owner
          Value: !Ref Owner
        - Key: DataClassification
          Value: !Ref DataClassification
        - Key: Compliance
          Value: !Ref Compliance

  WorkerNodeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'Security group for EKS worker nodes'
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub '${ClusterName}-worker-node-sg'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Organization
          Value: !Ref Organization
        - Key: BusinessUnit
          Value: !Ref BusinessUnit
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: Owner
          Value: !Ref Owner
        - Key: DataClassification
          Value: !Ref DataClassification
        - Key: Compliance
          Value: !Ref Compliance

  # Security Group Rules
  ControlPlaneToWorkerNodeIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: 'Allow control plane to communicate with worker nodes'
      FromPort: 1025
      ToPort: 65535
      GroupId: !Ref WorkerNodeSecurityGroup
      SourceSecurityGroupId: !Ref ControlPlaneSecurityGroup
      IpProtocol: tcp

  WorkerNodeToControlPlaneEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      Description: 'Allow worker nodes to communicate with control plane'
      FromPort: 443
      ToPort: 443
      GroupId: !Ref WorkerNodeSecurityGroup
      DestinationSecurityGroupId: !Ref ControlPlaneSecurityGroup
      IpProtocol: tcp

  WorkerNodeToWorkerNodeIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: 'Allow worker nodes to communicate with each other'
      FromPort: 0
      ToPort: 65535
      GroupId: !Ref WorkerNodeSecurityGroup
      SourceSecurityGroupId: !Ref WorkerNodeSecurityGroup
      IpProtocol: '-1'

  # EKS Cluster
  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Ref ClusterName
      RoleArn: !GetAtt EKSClusterRole.Arn
      Version: !Ref KubernetesVersion
      ResourcesVpcConfig:
        SubnetIds: !Ref PrivateSubnets
        SecurityGroupIds:
          - !Ref ControlPlaneSecurityGroup
        EndpointPrivateAccess: !Ref EnablePrivateEndpoint
        EndpointPublicAccess: !Ref EnablePublicEndpoint
        PublicAccessCidrs: !If [IsPublicEndpointEnabled, !Ref CIDRForPublicAccess, []]
      Logging:
          ClusterLogging:
            EnabledTypes:
                - Type: "api"
                - Type: "audit"
                - Type: "authenticator"
                - Type: "controllerManager"
                - Type: "scheduler"
            
      Tags:
        - Key: Name
          Value: !Ref ClusterName
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: KubernetesVersion
          Value: !Ref KubernetesVersion
        - Key: Organization
          Value: !Ref Organization
        - Key: BusinessUnit
          Value: !Ref BusinessUnit
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: Owner
          Value: !Ref Owner
        - Key: DataClassification
          Value: !Ref DataClassification
        - Key: Compliance
          Value: !Ref Compliance

  # Managed Node Groups
  ManagedNodeGroup:
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !Ref EKSCluster
      NodegroupName: !Sub '${ClusterName}-managed-ng'
      NodeRole: !GetAtt NodegroupRole.Arn
      Subnets: !Ref PrivateSubnets
      ScalingConfig:
        MinSize: !Ref NodeMinSize
        MaxSize: !Ref NodeMaxSize
        DesiredSize: !Ref NodeDesiredCapacity
      InstanceTypes:
        - !Ref InstanceType
      AmiType: !FindInMap ['AmiTypeMap', 'x86', 'AL2']
      DiskSize: !Ref NodeVolumeSize
      RemoteAccess:
        Ec2SshKey: !Ref ExistingKeyPairName
        SourceSecurityGroups:
          - !Ref WorkerNodeSecurityGroup
      Labels:
        Environment: !Ref EnvironmentName
        NodeGroupType: 'managed'
      Tags:
        Name: !Sub '${ClusterName}-managed-ng'
        Environment: !Ref EnvironmentName
        'k8s.io/cluster-autoscaler/enabled': 'true'
        'k8s.io/cluster-autoscaler/discovery': !Sub '${ClusterName}'
        Organization: !Ref Organization
        BusinessUnit: !Ref BusinessUnit
        CostCenter: !Ref CostCenter
        Owner: !Ref Owner
        DataClassification: !Ref DataClassification
        Compliance: !Ref Compliance
        

  # Cluster Autoscaler IAM Policy
  ClusterAutoscalerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: IsProd
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'autoscaling:DescribeAutoScalingGroups'
              - 'autoscaling:DescribeAutoScalingInstances'
              - 'autoscaling:DescribeLaunchConfigurations'
              - 'autoscaling:DescribeTags'
              - 'autoscaling:SetDesiredCapacity'
              - 'autoscaling:TerminateInstanceInAutoScalingGroup'
              - 'ec2:DescribeLaunchTemplateVersions'
            Resource: '*'
      Roles:
        - !Ref NodegroupRole

  # CloudWatch Log Group for Cluster Logs
  ClusterLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: IsLoggingEnabled
    Properties:
      LogGroupName: !Sub '/aws/eks/${ClusterName}/cluster'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Name
          Value: !Sub '${ClusterName}-logs'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Organization
          Value: !Ref Organization
        - Key: BusinessUnit
          Value: !Ref BusinessUnit
        - Key: CostCenter
          Value: !Ref CostCenter
        - Key: Owner
          Value: !Ref Owner
        - Key: DataClassification
          Value: !Ref DataClassification
        - Key: Compliance
          Value: !Ref Compliance

Outputs:
  ClusterName:
    Description: 'EKS Cluster Name'
    Value: !Ref EKSCluster
    Export:
      Name: !Sub '${AWS::StackName}-ClusterName'

  ClusterEndpoint:
    Description: 'EKS Cluster API Endpoint'
    Value: !GetAtt EKSCluster.Endpoint
    Export:
      Name: !Sub '${AWS::StackName}-ClusterEndpoint'

  ClusterSecurityGroupId:
    Description: 'EKS Control Plane Security Group ID'
    Value: !Ref ControlPlaneSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-ClusterSecurityGroupId'

  NodeSecurityGroupId:
    Description: 'EKS Worker Node Security Group ID'
    Value: !Ref WorkerNodeSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-NodeSecurityGroupId'

  NodegroupRoleArn:
    Description: 'EKS Nodegroup IAM Role ARN'
    Value: !GetAtt NodegroupRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-NodegroupRoleArn'