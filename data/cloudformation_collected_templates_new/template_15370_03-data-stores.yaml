AWSTemplateFormatVersion: '2010-09-09'
Description: 'DynamoDB table and S3 bucket for Claim Status API'

Parameters:
  EnvironmentName:
    Type: String
    Default: claim-status-prod
    Description: Environment name prefix

Resources:
  # DynamoDB Table for Claims
  ClaimsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: claims-status
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: claimId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: claimId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: status-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-claims-table
        - Key: Environment
          Value: !Ref EnvironmentName

  # S3 Bucket for Claim Notes
  ClaimNotesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub claim-notes-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 90
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-claim-notes
        - Key: Environment
          Value: !Ref EnvironmentName

  # S3 Bucket Policy
  ClaimNotesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ClaimNotesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt ClaimNotesBucket.Arn
              - !Sub ${ClaimNotesBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: false

  # ECR Repository
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: claim-status-api
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ecr
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  ClaimsTableName:
    Description: DynamoDB Claims Table Name
    Value: !Ref ClaimsTable
    Export:
      Name: !Sub ${EnvironmentName}-ClaimsTableName

  ClaimsTableArn:
    Description: DynamoDB Claims Table ARN
    Value: !GetAtt ClaimsTable.Arn
    Export:
      Name: !Sub ${EnvironmentName}-ClaimsTableArn

  ClaimNotesBucketName:
    Description: S3 Bucket for Claim Notes
    Value: !Ref ClaimNotesBucket
    Export:
      Name: !Sub ${EnvironmentName}-ClaimNotesBucketName

  ClaimNotesBucketArn:
    Description: S3 Bucket ARN
    Value: !GetAtt ClaimNotesBucket.Arn
    Export:
      Name: !Sub ${EnvironmentName}-ClaimNotesBucketArn

  ECRRepositoryUri:
    Description: ECR Repository URI
    Value: !GetAtt ECRRepository.RepositoryUri
    Export:
      Name: !Sub ${EnvironmentName}-ECRRepositoryUri
