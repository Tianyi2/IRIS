AWSTemplateFormatVersion: '2010-09-09'
Description: Secrets for Inspect Evals AWS Batch Jobs

Parameters:
  Environment:
    Type: String
    Default: dev
    Description: Environment name (e.g., dev, prod)
    AllowedValues:
      - dev
      - staging
      - prod

Resources:
  HuggingFaceTokenSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/HF_TOKEN
      Description: HuggingFace Token https://huggingface.co/settings/tokens
      SecretString: "not-set"

  OpenAIAPIKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/OPENAI_API_KEY
      Description: OpenAI API Key https://platform.openai.com/settings/api-keys
      SecretString: "not-set"

  AnthropicAPIKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/ANTHROPIC_API_KEY
      Description: Anthropic API Key https://console.anthropic.com/settings/keys
      SecretString: "not-set"

  GoogleAPIKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/GOOGLE_API_KEY
      Description: Google API Key
      SecretString: "not-set"

  MistralAPIKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/MISTRAL_API_KEY
      Description: Mistral API Key
      SecretString: "not-set"

  GrokAPIKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/GROK_API_KEY
      Description: Grok API Key
      SecretString: "not-set"

  TogetherAPIKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/TOGETHER_API_KEY
      Description: Together AI API Key
      SecretString: "not-set"

  OpenRouterAPIKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/OPENROUTER_API_KEY
      Description: OpenRouter API Key
      SecretString: "not-set"

  AWSAccessKeyIDSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/AWS_ACCESS_KEY_ID
      Description: AWS Access Key ID
      SecretString: "not-set"

  AWSSecretAccessKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/AWS_SECRET_ACCESS_KEY
      Description: AWS Secret Access Key
      SecretString: "not-set"

  AWSDefaultRegionSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/AWS_DEFAULT_REGION
      Description: AWS Default Region
      SecretString: "not-set"

  AzureAIAPIKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/AZUREAI_API_KEY
      Description: AzureAI API Key
      SecretString: "not-set"

  AzureAIBaseURLSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/AZUREAI_BASE_URL
      Description: AzureAI Model Base URL
      SecretString: "not-set"

  GroqAPIKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/GROQ_API_KEY
      Description: Groq API Key
      SecretString: "not-set"

  CloudflareAccountIDSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/CLOUDFLARE_ACCOUNT_ID
      Description: Cloudflare Account ID
      SecretString: "not-set"

  CloudflareAPITokenSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: RetainExceptOnCreate
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub inspect-evals/${Environment}/CLOUDFLARE_API_TOKEN
      Description: Cloudflare API Token
      SecretString: "not-set"

  # Add permissions to the Batch Job Role to read all secrets
  BatchJobSecretPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: BatchJobSecretAccess
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Ref HuggingFaceTokenSecret
              - !Ref OpenAIAPIKeySecret
              - !Ref AnthropicAPIKeySecret
              - !Ref GoogleAPIKeySecret
              - !Ref MistralAPIKeySecret
              - !Ref GrokAPIKeySecret
              - !Ref OpenRouterAPIKeySecret
              - !Ref TogetherAPIKeySecret
              - !Ref AWSAccessKeyIDSecret
              - !Ref AWSSecretAccessKeySecret
              - !Ref AWSDefaultRegionSecret
              - !Ref AzureAIAPIKeySecret
              - !Ref AzureAIBaseURLSecret
              - !Ref GroqAPIKeySecret
              - !Ref CloudflareAccountIDSecret
              - !Ref CloudflareAPITokenSecret
      Roles:
        - InspectEvalsBatchJobRole
