AWSTemplateFormatVersion: "2010-09-09"

Description: 'Trend Micro Deep Security Marketplace main template. For more information see http://aws.trendmicro.com. (qs-1ngr590jt)'

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W3005
        - W7001
        - W8001

  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Deep Security Manager Configuration
        Parameters:
          - DSCAdminName
          - DSCAdminPassword
          - DSIPInstanceType
          - AWSIKeyPairName
          - DSIPLicense
          - DSIMultiNode
          - DSIPLicenseKey
          - DSIPGUIPort
          - DSIPHeartbeatPort
          - DSCLicenseType
      - Label:
          default: Network Configuration
        Parameters:
          - AWSIVPC
          - DSISubnetID
          - DBISubnet1
          - DBISubnet2
          - DSELBPosture
          - DSProxyUrl
      - Label:
          default: Database Configuration
        Parameters:
          - DBICAdminName
          - DBICAdminPassword
          - DBPName
          - DBPMultiAZ
          - DBPEngine
          - DBPCreateDbInstance
          - DBIRDSInstanceSize
          - DBIStorageAllocation
          - DBPBackupDays
          - DBPEndpoint
    ParameterLabels:
      AWSIKeyPairName:
        default: EC2 Key Pair for SSH access
      AWSIVPC:
        default: VPC for Deep Security Components
      DSISubnetID:
        default: Subnet for Deep Security Managers. Must be public subnet if deploying Internet-facing infrastructure, else must be private.
      DBIRDSInstanceSize:
        default: RDS Instance Type
      DBIStorageAllocation:
        default: RDS Storage Size
      DBPBackupDays:
        default: Backup Retention
      DBPCreateDbInstance:
        default: Create new DB Instance?
      DBICAdminName:
        default: Admin username for Database
      DBICAdminPassword:
        default: Admin password for Database
      DBPEngine:
        default: Choose PostgreSQL, MSSQL, Oracle or Aurora PostgreSQL Engine
      DBPEndpoint:
        default: Existing Database Endpoint if not creating new
      DBPName:
        default: Name of database
      DSCAdminName:
        default: Admin username for Deep Security
      DSCAdminPassword:
        default: Admin password for Deep Security
      DSIMultiNode:
        default: Number of Deep Security Managers to deploy
      DSIPLicenseKey:
        default: License Key
      DSIPHeartbeatPort:
        default: TCP port for Deep Security Agents
      DSIPGUIPort:
        default: TCP port for Deep Security Console
      DSIPInstanceType:
        default: EC2 Instance Type for Deep Security Manager
      DBISubnet1:
        default: Primary private subnet for RDS
      DBISubnet2:
        default: Secondary private subnet for RDS
      DSIPLicense:
        default: Deep Security License Type
      DBPMultiAZ:
        default: Single- or Multi- AZ RDS instance
      DSCLicenseType:
        default: Select Enterprise or Network License Key Type
      DSELBPosture:
        default: Use internal or internet-facing ELB
      DSProxyUrl:
        default: Url for a proxy server for internet traffic in the format of host:port. Leave blank if not required

Parameters:
  AWSIKeyPairName:
    Description: Existing key pair to use for connecting to your Deep Security Manager Instance
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Select an existing EC2 Key Pair.

  AWSIVPC:
    Description: Existing VPC to deploy Deep Security Manager. Must contain at least 1 public and 2 private subnets
    Type: AWS::EC2::VPC::Id
    AllowedPattern: '[-_a-zA-Z0-9]*'

  DSISubnetID:
    Description: Choose a public subnet for Deep Security Manager. Must be in same AZ as primary RDS subnet.
    Type: AWS::EC2::Subnet::Id
    AllowedPattern: '[-_a-zA-Z0-9]*'
    ConstraintDescription: Subnet ID must exist in the chosen VPC

  DBIRDSInstanceSize:
    Description: Trend Micro Deep Security Database instance class
    Type: String
    AllowedValues:
      - db.m5.large
      - db.m5.xlarge
      - db.m5.2xlarge
      - db.m5.4xlarge
      - db.m5.8xlarge
      - db.m6g.large
      - db.m6g.xlarge
      - db.m6g.2xlarge
      - db.m6g.4xlarge
      - db.m6g.8xlarge
      - db.m6i.large
      - db.m6i.xlarge
      - db.m6i.2xlarge
      - db.m6i.4xlarge
      - db.m6i.8xlarge
      - db.r3.large
      - db.r3.xlarge
      - db.r3.2xlarge
      - db.r3.4xlarge
      - db.r3.8xlarge
      - db.r4.large
      - db.r4.xlarge
      - db.r4.2xlarge
      - db.r4.4xlarge
      - db.r4.8xlarge
      - db.r5.large
      - db.r5.xlarge
      - db.r5.2xlarge
      - db.r5.4xlarge
      - db.r5.8xlarge
      - db.r6g.large
      - db.r6g.xlarge
      - db.r6g.2xlarge
      - db.r6g.4xlarge
      - db.r6g.8xlarge
      - db.r6i.large
      - db.r6i.xlarge
      - db.r6i.2xlarge
      - db.r6i.4xlarge
      - db.r6i.8xlarge
    Default: db.m5.large
    ConstraintDescription: must select a valid database instance type.

  DBIStorageAllocation:
    Description: The Storage Allocated to Database Instance (in GB). Minimum 200 for SQL Server, 10 for Oracle.
    Type: Number
    Default: 100
    MinValue: 10
    MaxValue: 3072
    ConstraintDescription: must be between 10 and 3072Gb.

  DBPBackupDays:
    Description: Days to keep automatic RDS backups (0-35)
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 35
    ConstraintDescription: must be between 0 and 35 days.

  DBPCreateDbInstance:
    Description: Choose whether or not to create an RDS instance for the Deep Security Manager Deployment
    Type: String
    AllowedValues:
      - Yes
    Default: Yes

  DBICAdminName:
    Description: Admin account username to be used for the database instance
    Type: String
    Default: dsadmin
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: must begin with a letter and contain only alphanumeric characters.

  DBICAdminPassword:
    Description: Password to be used for the database admin account. 8-41 alphanumeric characters
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 41
    AllowedPattern: '[a-zA-Z0-9!^*\-_+]*'
    ConstraintDescription: Can only contain alphanumeric characters or the following special characters !^*-_+ Min length 8, max length 41

  DBPEngine:
    Description: Choose PostgreSQL, Microsoft SQL, Oracle or Aurora PostgreSQL for DSM database Engine
    Type: String
    AllowedValues:
      - SQL
      - Oracle
      - PostgreSQL
      - AuroraPostgreSQL
    Default: PostgreSQL

  DBPEndpoint:
    Description: If you have an existing oracle instance, enter the endpoint address here, else this field will be ignored
    Type: String
    Default: Enter Oracle Address here if needed

  DBPName:
    Description: Name to be assigned to the database
    Type: String
    Default: dsm
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: must begin with a letter and contain only alphanumeric characters.

  DSCAdminName:
    Description: The Deep Security Manager administrator account username for Web Console Access
    Type: String
    Default: admin
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: must begin with a letter and contain only alphanumeric characters.

  DSCAdminPassword:
    Description: The Deep Security Manager administrator account password
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 41
    AllowedPattern: '[a-zA-Z0-9!^*\-_+]*'
    ConstraintDescription: Can only contain alphanumeric characters or the following special characters !^*-_+ Min length 8, max length 41

  DSIMultiNode:
    Description: Select number of Deep Security Managers to Deploy
    Type: Number
    AllowedValues:
      - "1"
      - "2"

  DSIPLicenseKey:
    Description: Deep Security License key including dashes. Only required for BYOL license type. (e.g. AP-E9RM-99WHE-B5UR5-BV8YB-HVYM8-HYYVG)
    Type: String
    Default: XX-XXXX-XXXXX-XXXXX-XXXXX-XXXXX-XXXXX
    MinLength: 37
    MaxLength: 37
    AllowedPattern: '[A-Z0-9]{2}-[A-Z0-9]{4}-[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}'
    ConstraintDescription: Key can only contain ASCII characters.

  DSIPHeartbeatPort:
    Description: The heartbeat port used by Deep Security Agents and appliances to communicate with the Deep Security Manager.
    Type: Number
    Default: "4120"
    MinValue: 0
    MaxValue: 65535
    ConstraintDescription: Must be a valid TCP port.

  DSIPGUIPort:
    Description: The Deep Security Manager application and GUI port.
    Type: Number
    Default: "443"
    MinValue: 0
    MaxValue: 65535
    ConstraintDescription: Must be a valid TCP port.

  DSIPInstanceType:
    Description: Amazon EC2 instance type for BYOL Deep Security Manager Node Instances (ignored for other license types)
    Type: String
    AllowedValues:
      - m4.large
      - m4.xlarge
      - m4.2xlarge
      - m4.4xlarge
      - m4.10xlarge
      - m5.large
      - m5.xlarge
      - m5.2xlarge
      - m5.4xlarge
      - m5.8xlarge
      - c3.xlarge
      - c3.2xlarge
      - c3.4xlarge
      - c3.8xlarge
      - c4.xlarge
      - c4.2xlarge
      - c4.4xlarge
      - c4.8xlarge
      - c5.4xlarge
      - c5.9xlarge
      - r3.large
      - r3.xlarge
      - r3.2xlarge
      - r3.4xlarge
      - r3.8xlarge
      - i2.xlarge
      - i2.2xlarge
      - i2.4xlarge
      - i2.8xlarge
      - g2.2xlarge
      - r4.large
      - r4.xlarge
    Default: m5.xlarge

  DBISubnet1:
    Description: Choose a primary private subnet for RDS instance. Must be in same AZ as Deep Security Manager
    Type: AWS::EC2::Subnet::Id
    ConstraintDescription: RDS Subnet Groups must be comprised of 2 subnets in seperate availability zones with the specified VPC for deploying this template

  DBISubnet2:
    Description: Choose a secondary private subnet for RDS instance. Must not be the same as primary subnet.
    Type: AWS::EC2::Subnet::Id
    ConstraintDescription: RDS Subnet Groups must be comprised of 2 subnets in seperate availability zones with the specified VPC for deploying this template

  DSIPLicense:
    Description: Choose License Model. If choosing BYOL you may enter the license below
    Type: String
    AllowedValues:
      - PerHost
      - BYOL

  DBPMultiAZ:
    Description: Use Multi-AZ or SQL Mirroring Option Group for RDS Instance
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "false"

  DSELBPosture:
    Description: Use internal or internet-facing ELB
    Type: String
    AllowedValues:
      - Internet-facing
      - Internal
    Default: Internet-facing

  DSCLicenseType:
    Type: String
    AllowedValues:
      - Enterprise
      - Network
    Default: Enterprise

  DSProxyUrl:
    Type: String
    Default: ""
    AllowedPattern: ^$|^(?!(?i)http)(.+):[\d]+$|^(?=\d+\.\d+\.\d+\.\d+\:\d+$)(?:(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9][0-9]|[0-9])\.?){4}:(6553[0-5]|655[0-2][0-9]\d|65[0-4](\d){2}|6[0-4](\d){3}|[1-5](\d){4}|[1-9](\d){0,3}){1}$

  ImageId:
    Description: The AMI that will be used to launch EC2 resources.
    Type: AWS::EC2::Image::Id

  MPS3BucketName:
    Description: Name of the S3 bucket for the copy of the nested templates.
    Type: String

  MPS3BucketRegion:
    Description: AWS Region where the S3 bucket for the copy of the nested templates is hosted.
    Type: String

  MPS3KeyPrefix:
    Description: S3 key prefix that is used to simulate a folder for the copy of the nested templates.
    Type: String

Mappings:
  DSMNodeDependency:
    Node1DB:
      String: DSDatabaseAbstract
    Node2DB:
      String: DSM95Node1
    Node1NoDB:
      String: DSISecurityGroups
    Node2NoDB:
      String: DSM95Node2NoDB

Conditions:
  DSIsMultiNode: !Equals
    - !Ref DSIMultiNode
    - "2"

  LaunchRDSInstance: !Equals
    - !Ref DBPCreateDbInstance
    - Yes

  DoNotLaunchRDSInstance: !Equals
    - !Ref DBPCreateDbInstance
    - No

  DSMNode2DB: !And
    - !Condition DSIsMultiNode
    - !Condition LaunchRDSInstance

  DSMNode2NoDB: !And
    - !Condition DSIsMultiNode
    - !Condition DoNotLaunchRDSInstance

  InternetFacingELB: !Equals
    - !Ref DSELBPosture
    - Internet-facing

  GovCloudCondition: !Or
    - !Equals
      - !Ref AWS::Region
      - us-gov-west-1
    - !Equals
      - !Ref AWS::Region
      - us-gov-east-1

Resources:
  DSMNode1:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - DSDatabaseAbstract
      - DSIDSMSecurityGroup
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}templates/marketplace/dsm-mp.template.yaml
      Parameters:
        AWSIKeyPairName: !Ref AWSIKeyPairName
        AWSIVPC: !Ref AWSIVPC
        DSIPLicense: !Ref DSIPLicense
        DSIPLicenseKey: !Ref DSIPLicenseKey
        DSCAdminName: !Ref DSCAdminName
        DSCAdminPassword: !Ref DSCAdminPassword
        DBPRDSEndpoint: !GetAtt DSDatabaseAbstract.Outputs.DSDBEndpoint
        DBPName: !Ref DBPName
        DBICAdminName: !Ref DBICAdminName
        DBICAdminPassword: !Ref DBICAdminPassword
        DSIPGUIPort: !Ref DSIPGUIPort
        DSIPHeartbeatPort: !Ref DSIPHeartbeatPort
        DSMPMNode: No
        DSISubnetID: !Ref DSISubnetID
        DSMSG: !GetAtt DSIDSMSecurityGroup.Outputs.DSMSG
        DBPEngine: !Ref DBPEngine
        DSIPInstanceType: !Ref DSIPInstanceType
        CreateEIP: "False"
        DSIELB: !GetAtt DSIELB.Outputs.DSIELB
        DSM1CompleteWaitHandle: !Ref DSM1CompleteWaitHandle
        DSIELBFQDN: !GetAtt DSIELB.Outputs.ELBFQDN
        DSELBPosture: !Ref DSELBPosture
        DSCLicenseType: !Ref DSCLicenseType
        DSProxyUrl: !Ref DSProxyUrl
        ImageId: !Ref ImageId
        MPS3BucketName: !Ref MPS3BucketName
        MPS3BucketRegion: !Ref MPS3BucketRegion
        MPS3KeyPrefix: !Ref MPS3KeyPrefix
    Condition: LaunchRDSInstance

  DSMNode2:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - DSIDSMSecurityGroup
      - DSM1CompleteWaitCondition
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}templates/marketplace/dsm-mp.template.yaml
      Parameters:
        AWSIKeyPairName: !Ref AWSIKeyPairName
        AWSIVPC: !Ref AWSIVPC
        DSIPLicense: !Ref DSIPLicense
        DSIPLicenseKey: !Ref DSIPLicenseKey
        DSCAdminName: !Ref DSCAdminName
        DSCAdminPassword: !Ref DSCAdminPassword
        DBPRDSEndpoint: !GetAtt DSDatabaseAbstract.Outputs.DSDBEndpoint
        DBPName: !Ref DBPName
        DBICAdminName: !Ref DBICAdminName
        DBICAdminPassword: !Ref DBICAdminPassword
        DSIPGUIPort: !Ref DSIPGUIPort
        DSIPHeartbeatPort: !Ref DSIPHeartbeatPort
        DSMPMNode: Yes
        DSISubnetID: !Ref DSISubnetID
        DSMSG: !GetAtt DSIDSMSecurityGroup.Outputs.DSMSG
        DBPEngine: !Ref DBPEngine
        DSIPInstanceType: !Ref DSIPInstanceType
        CreateEIP: "False"
        DSIELB: !GetAtt DSIELB.Outputs.DSIELB
        DSELBPosture: !Ref DSELBPosture
        DSProxyUrl: !Ref DSProxyUrl
        ImageId: !Ref ImageId
        MPS3BucketName: !Ref MPS3BucketName
        MPS3BucketRegion: !Ref MPS3BucketRegion
        MPS3KeyPrefix: !Ref MPS3KeyPrefix
    Condition: DSMNode2DB

  DSMNode1NoDB:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - DSIDSMSecurityGroup
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}templates/marketplace/dsm-mp.template.yaml
      Parameters:
        AWSIKeyPairName: !Ref AWSIKeyPairName
        AWSIVPC: !Ref AWSIVPC
        DSIPLicense: !Ref DSIPLicense
        DSIPLicenseKey: !Ref DSIPLicenseKey
        DSCAdminName: !Ref DSCAdminName
        DSCAdminPassword: !Ref DSCAdminPassword
        DBPRDSEndpoint: !Ref DBPEndpoint
        DBPName: !Ref DBPName
        DBICAdminName: !Ref DBICAdminName
        DBICAdminPassword: !Ref DBICAdminPassword
        DSIPGUIPort: !Ref DSIPGUIPort
        DSIPHeartbeatPort: !Ref DSIPHeartbeatPort
        DSMPMNode: No
        DSISubnetID: !Ref DSISubnetID
        DSMSG: !GetAtt DSIDSMSecurityGroup.Outputs.DSMSG
        DBPEngine: !Ref DBPEngine
        DSIPInstanceType: !Ref DSIPInstanceType
        CreateEIP: "False"
        DSM1NoDBCompleteWaitHandle: !Ref DSM1NoDBCompleteWaitHandle
        DSIELB: !GetAtt DSIELB.Outputs.DSIELB
        DSIELBFQDN: !GetAtt DSIELB.Outputs.ELBFQDN
        DSELBPosture: !Ref DSELBPosture
        DSProxyUrl: !Ref DSProxyUrl
        ImageId: !Ref ImageId
        MPS3BucketName: !Ref MPS3BucketName
        MPS3BucketRegion: !Ref MPS3BucketRegion
        MPS3KeyPrefix: !Ref MPS3KeyPrefix
    Condition: DoNotLaunchRDSInstance

  DSMNode2NoDB:
    Type: AWS::CloudFormation::Stack
    DependsOn: DSM1NoDBCompleteWaitCondition
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}templates/marketplace/dsm-mp.template.yaml
      Parameters:
        AWSIKeyPairName: !Ref AWSIKeyPairName
        AWSIVPC: !Ref AWSIVPC
        DSIPLicense: !Ref DSIPLicense
        DSIPLicenseKey: !Ref DSIPLicenseKey
        DSCAdminName: !Ref DSCAdminName
        DSCAdminPassword: !Ref DSCAdminPassword
        DBPRDSEndpoint: !Ref DBPEndpoint
        DBPName: !Ref DBPName
        DBICAdminName: !Ref DBICAdminName
        DBICAdminPassword: !Ref DBICAdminPassword
        DSIPGUIPort: !Ref DSIPGUIPort
        DSIPHeartbeatPort: !Ref DSIPHeartbeatPort
        DSMPMNode: Yes
        DSISubnetID: !Ref DSISubnetID
        DSMSG: !GetAtt DSIDSMSecurityGroup.Outputs.DSMSG
        DBPEngine: !Ref DBPEngine
        DSIPInstanceType: !Ref DSIPInstanceType
        CreateEIP: "False"
        DSIELB: !GetAtt DSIELB.Outputs.DSIELB
        DSELBPosture: !Ref DSELBPosture
        DSProxyUrl: !Ref DSProxyUrl
        ImageId: !Ref ImageId
        MPS3BucketName: !Ref MPS3BucketName
        MPS3BucketRegion: !Ref MPS3BucketRegion
        MPS3KeyPrefix: !Ref MPS3KeyPrefix
    Condition: DSMNode2NoDB

  DSDatabaseAbstract:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}templates/common/db/ds-db-abstract.template.yaml
      Parameters:
        DBPName: !Ref DBPName
        DBIStorageAllocation: !Ref DBIStorageAllocation
        DBIRDSInstanceSize: !Ref DBIRDSInstanceSize
        DBPEngine: !Ref DBPEngine
        DBICAdminName: !Ref DBICAdminName
        DBICAdminPassword: !Ref DBICAdminPassword
        RDSSG: !GetAtt DSIRDSSecurityGroup.Outputs.RDSSG
        MultiAZ: !Ref DBPMultiAZ
        StorageType: gp3
        DBPBackupDays: !Ref DBPBackupDays
        DBISubnet1: !Ref DBISubnet1
        DBISubnet2: !Ref DBISubnet2
        MPS3BucketName: !Ref MPS3BucketName
        MPS3BucketRegion: !Ref MPS3BucketRegion
        MPS3KeyPrefix: !Ref MPS3KeyPrefix
    Condition: LaunchRDSInstance

  DSIRDSSecurityGroup:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}templates/common/security-groups/rds-security-group.template.yaml
      Parameters:
        AWSIVPC: !Ref AWSIVPC
        DBPEngine: !Ref DBPEngine
        DSMSG: !GetAtt DSIDSMSecurityGroup.Outputs.DSMSG
    Condition: LaunchRDSInstance

  DSIDSMSecurityGroup:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}templates/common/security-groups/dsm-security-group.template.yaml
      Parameters:
        AWSIVPC: !Ref AWSIVPC
        DSIPGUIPort: !Ref DSIPGUIPort
        DSIPHeartbeatPort: !Ref DSIPHeartbeatPort

  DSIELB:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}templates/common/dsm-elb.template.yaml
      Parameters:
        AWSIVPC: !Ref AWSIVPC
        DSIPHeartbeatPort: !Ref DSIPHeartbeatPort
        DSIPGUIPort: !Ref DSIPGUIPort
        DSISubnetID: !Ref DSISubnetID
        DSELBPosture: !Ref DSELBPosture
        MPS3BucketName: !Ref MPS3BucketName
        MPS3BucketRegion: !Ref MPS3BucketRegion
        MPS3KeyPrefix: !Ref MPS3KeyPrefix

  DSIDSMSecurityGroupIngressRules:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${MPS3BucketName}.s3.${MPS3BucketRegion}.${AWS::URLSuffix}/${MPS3KeyPrefix}templates/common/security-groups/dsm-sg-ingress-rules.template.yaml
      Parameters:
        DSMSG: !GetAtt DSIDSMSecurityGroup.Outputs.DSMSG
        ELBSourceSG: !GetAtt DSIELB.Outputs.ELBSourceSecurityGroup
        DSIPHeartbeatPort: !Ref DSIPHeartbeatPort
        DSIPGUIPort: !Ref DSIPGUIPort

  DSM1CompleteWaitHandle:
    Type: AWS::CloudFormation::WaitConditionHandle
    Condition: LaunchRDSInstance

  DSM1CompleteWaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn:
      - DSMNode1
    Properties:
      Handle: !Ref DSM1CompleteWaitHandle
      Timeout: "3000"
    Condition: LaunchRDSInstance

  DSM1NoDBCompleteWaitHandle:
    Type: AWS::CloudFormation::WaitConditionHandle
    Condition: DoNotLaunchRDSInstance

  DSM1NoDBCompleteWaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn:
      - DSMNode1NoDB
    Properties:
      Handle: !Ref DSM1CompleteWaitHandle
      Timeout: "3000"
    Condition: DoNotLaunchRDSInstance

Outputs:
  DeepSecurityConsole:
    Value: !Sub https://${DSIELB.Outputs.ELBFQDN}:${DSIPGUIPort}

  DeepSecurityHeartbeat:
    Value: !Sub dsm://${DSIELB.Outputs.ELBFQDN}:${DSIPHeartbeatPort}/

  ELBCanonicalHostedZoneNameID:
    Value: !GetAtt DSIELB.Outputs.ELBCanonicalHostedZoneNameID

  ELBDNSName:
    Value: !GetAtt DSIELB.Outputs.ELBDNSName
