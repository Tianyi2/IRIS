AWSTemplateFormatVersion: 2010-09-09
Description: Stack for resources like Dynamodb and Kinesis Stream

Parameters:
  EnvironmentType:
    Type: String
    Description: Environment of Deployment
    AllowedValues: [ "dev", "qa", "qa2", "uat", "int", "int2", "production" ]
    Default: "dev"

Conditions:
  EnvironmentProd: !Equals [ !Ref EnvironmentType, "production" ]
  EnvironmentNotProd: !Not [ !Equals [ !Ref EnvironmentType, "production" ] ]
  EnvironmentDev: !Equals [ !Ref EnvironmentType, "dev" ]
  DynamoStreaming: !Or
    - !Condition EnvironmentProd
    - !Condition EnvironmentDev

Resources:
  PrivoPartnerMappingTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      KinesisStreamSpecification:
        StreamArn: !Sub
          - "arn:aws:kinesis:${AWS::Region}:${AWS::AccountId}:stream/${KinesisStream}"
          - KinesisStream: !ImportValue DynamoKinesisStream
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TableName: Privo-Partner-Mapping-Table
      AttributeDefinitions:
        - AttributeName: 'idemKey'
          AttributeType: 'S'
      KeySchema:
        - AttributeName: 'idemKey'
          KeyType: 'HASH'
      BillingMode: PAY_PER_REQUEST

  PrivoPartnerAppFormTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      KinesisStreamSpecification:
        StreamArn: !Sub
          - "arn:aws:kinesis:${AWS::Region}:${AWS::AccountId}:stream/${KinesisStream}"
          - KinesisStream: !ImportValue DynamoKinesisStream
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TableName: Privo-Partner-AppForm-Table
      AttributeDefinitions:
        - AttributeName: 'partnerLoanId'
          AttributeType: 'S'
      KeySchema:
        - AttributeName: 'partnerLoanId'
          KeyType: 'HASH'
      BillingMode: PAY_PER_REQUEST

  PrivoPartnerAppFormKinesisStream:
    Type: AWS::CloudFormation::Stack
    Condition: DynamoStreaming
    Properties:
      TemplateURL: Common/02_kinesis_stream.yaml

  PrivoPartnerAppFormGlue:
    Type: AWS::CloudFormation::Stack
    Condition: DynamoStreaming
    Properties:
      Parameters:
        Location: dynamo-cdc/morpheus/privo_partner_appform_table/
        TableName: morpheus_privo_partner_appform_table
        DataLakeBucket: !ImportValue PARTITIONED-DATA-LAKE-BUCKET
        GlueDataBase: !Join
          - '_'
          - - 'partitioned_datalake'
            - !Ref EnvironmentType
            - !Join
              - '_'
              - !Split
                - '-'
                - !Ref AWS::Region
      TemplateURL: Common/02_glue.yaml

  PrivoPartnerAppFormFirehoseDeliveryStream:
    Type: AWS::CloudFormation::Stack
    Condition: DynamoStreaming
    Properties:
      Parameters:
        DataLakeBucket: !ImportValue PARTITIONED-DATA-LAKE-BUCKET
        ProcessDynamoEntriesLambda: !ImportValue ProcessDynamoEntries
        EnvironmentType: !Ref EnvironmentType
        KinesisStream: !GetAtt [ 'PrivoPartnerAppFormKinesisStream', 'Outputs.KinesisStream' ]
        GlueDataBase: !Join
          - '_'
          - - 'partitioned_datalake'
            - !Ref EnvironmentType
            - !Join
              - '_'
              - !Split
                - '-'
                - !Ref AWS::Region
        GlueTable: !GetAtt [ 'PrivoPartnerAppFormGlue', 'Outputs.GlueTable' ]
        TableName: privo_partner_appform_table
      TemplateURL: Common/02_firehose_delivery_stream.yaml

  KsfMicrowebLinksTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      KinesisStreamSpecification:
        StreamArn: !Sub
          - "arn:aws:kinesis:${AWS::Region}:${AWS::AccountId}:stream/${KinesisStream}"
          - KinesisStream: !ImportValue DynamoKinesisStream
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TableName: Ksf-Microweb-Links-Table
      AttributeDefinitions:
        - AttributeName: 'partnerLoanId'
          AttributeType: 'S'
      KeySchema:
        - AttributeName: 'partnerLoanId'
          KeyType: 'HASH'
      BillingMode: PAY_PER_REQUEST
