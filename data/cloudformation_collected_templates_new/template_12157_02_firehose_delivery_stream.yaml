---
AWSTemplateFormatVersion: 2010-09-09

Parameters:
  DataLakeBucket:
    Type: String
    Description: Data Lake Bucket
  ProcessDynamoEntriesLambda:
    Type: String
    Description: Process Dynamo Entries Lambda ARN
  EnvironmentType:
    Type: String
    Description: Environment Type
  KinesisStream:
    Type: String
    Description: Kinesis Stream
  GlueDataBase:
    Type: String
    Description: Glue Database
  GlueTable:
    Type: String
    Description: Glue Table
  TableName:
    Type: String
    Description: table name

Resources:
  FirehoseDeliveryStreamRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
        Version: '2012-10-17'
      Description: Role for Firehose stream to receive data
      Policies:
        - PolicyDocument:
            Statement:
              - Action:
                  - logs:*
                Effect: Allow
                Resource: "*"
            Version: '2012-10-17'
          PolicyName: AllowLogging
        - PolicyDocument:
            Statement:
              - Action:
                  - kms:Encrypt
                  - kms:Decrypt
                  - kms:ReEncrypt
                  - kms:GenerateDataKey*
                  - kms:DescribeKey
                Effect: Allow
                Resource: !ImportValue s3-encryption-key
            Version: '2012-10-17'
          PolicyName: kms
        - PolicyDocument:
            Statement:
              - Action:
                  - s3:ListBucket
                  - s3:ListBucketByTags
                  - s3:GetBucketLocation
                Effect: Allow
                Resource:
                  - !Sub 'arn:aws:s3:::${DataLakeBucket}'
            Version: '2012-10-17'
          PolicyName: s3Permissions1
        - PolicyDocument:
            Statement:
              - Action:
                  - s3:PutObject
                  - s3:ListObjects
                  - s3:PutObjectAcl
                Effect: Allow
                Resource:
                  - !Sub 'arn:aws:s3:::${DataLakeBucket}'
                  - !Sub 'arn:aws:s3:::${DataLakeBucket}/*'
            Version: '2012-10-17'
          PolicyName: s3Permissions2
        - PolicyDocument:
            Statement:
              - Action:
                  - kinesis:DescribeStream
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                  - kinesis:ListShards
                Effect: Allow
                Resource: !Sub 'arn:aws:kinesis:${AWS::Region}:${AWS::AccountId}:stream/${KinesisStream}'
            Version: '2012-10-17'
          PolicyName: KinesisPermissions
        - PolicyDocument:
            Statement:
              - Action:
                  - lambda:InvokeFunction
                  - lambda:GetFunctionConfiguration
                Effect: Allow
                Resource: !Ref ProcessDynamoEntriesLambda
            Version: '2012-10-17'
          PolicyName: lambdaPermissions
      Tags:
      - Key: Name
        Value: !Select [ 1, !Split [ '-', !Ref 'AWS::StackName' ] ]
      - Key: Project
        Value: 'DataLake'
      - Key: Service
        Value: datalake
      - Key: Owner
        Value: Electron
      - Key: Department
        Value: Tech
      - Key: Stage
        Value: LMS
      - Key: Sub-Department
        Value: Privo


  DeliveryRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: ''
            Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'sts:ExternalId': !Ref 'AWS::AccountId'
      Path: "/"
      Policies:
        - PolicyName: firehose_delivery_policy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - 's3:AbortMultipartUpload'
                  - 's3:GetBucketLocation'
                  - 's3:GetObject'
                  - 's3:ListBucket'
                  - 's3:ListBucketMultipartUploads'
                  - 's3:PutObject'
                Resource:
                  - !Sub 'arn:aws:s3:::${DataLakeBucket}'
                  - !Sub 'arn:aws:s3:::${DataLakeBucket}/*'
              - Effect: Allow
                Action: 'glue:GetTableVersions'
                Resource: '*'
              - Effect: Allow
                Action: 'logs:PutLogEvents'
                Resource: '*'
      Tags:
      - Key: Name
        Value: !Select [ 1, !Split [ '-', !Ref 'AWS::StackName' ] ]
      - Key: Project
        Value: 'DataLake'
      - Key: Service
        Value: datalake
      - Key: Owner
        Value: Electron
      - Key: Department
        Value: Tech
      - Key: Stage
        Value: LMS
      - Key: Sub-Department
        Value: Privo

  KinesisFireHoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/kinesisfirehose/${TableName}'

  KinesisFireHoseLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogStreamName: !Sub 'KinesisFireHose-${TableName}'
      LogGroupName: !Ref KinesisFireHoseLogGroup

  KinesisFireHoseBackupLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/kinesisfirehose/${TableName}_backup'

  KinesisFireHoseBackupLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogStreamName: 'KinesisFireHose-${TableName}-Backup'
      LogGroupName: !Ref KinesisFireHoseBackupLogGroup

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !Sub 'arn:aws:kinesis:${AWS::Region}:${AWS::AccountId}:stream/${KinesisStream}'
        RoleARN: !GetAtt FirehoseDeliveryStreamRole.Arn
      ExtendedS3DestinationConfiguration:
        BucketARN: !Sub 'arn:aws:s3:::${DataLakeBucket}'
        BufferingHints:
          IntervalInSeconds: 60
          SizeInMBs: 64
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref KinesisFireHoseLogGroup
          LogStreamName: !Ref KinesisFireHoseLogStream
        CompressionFormat: UNCOMPRESSED
        ErrorOutputPrefix: !Sub "dynamo-cdc/aquaman/error/${TableName}/!{firehose:error-output-type}/year=!{timestamp:YYYY}/month=!{timestamp:MM}/day=!{timestamp:dd}/"
        Prefix: !Sub "dynamo-cdc/aquaman/${TableName}/year=!{timestamp:YYYY}/month=!{timestamp:MM}/day=!{timestamp:dd}/"
        RoleARN: !GetAtt FirehoseDeliveryStreamRole.Arn
        ProcessingConfiguration:
          Enabled: true
          Processors:
            - Type: Lambda
              Parameters:
              - ParameterName: LambdaArn
                ParameterValue: !Ref ProcessDynamoEntriesLambda
              - ParameterName: NumberOfRetries
                ParameterValue: 2
              - ParameterName: BufferSizeInMBs
                ParameterValue: 3
              - ParameterName: BufferIntervalInSeconds
                ParameterValue: 60
        DataFormatConversionConfiguration:
          Enabled: True
          SchemaConfiguration:
            CatalogId: !Ref AWS::AccountId
            VersionId: LATEST
            RoleARN: !GetAtt DeliveryRole.Arn
            DatabaseName: !Ref GlueDataBase
            TableName: !Ref GlueTable
            Region: !Ref AWS::Region
          InputFormatConfiguration:
            Deserializer:
              OpenXJsonSerDe:
                CaseInsensitive: true
                ConvertDotsInJsonKeysToUnderscores: false
          OutputFormatConfiguration:
            Serializer:
              ParquetSerDe:
                Compression: GZIP
        S3BackupMode: Enabled
        S3BackupConfiguration:
          BucketARN: !Sub 'arn:aws:s3:::${DataLakeBucket}'
          ErrorOutputPrefix: !Sub "dynamo-backup/aquaman/${TableName}/!{firehose:error-output-type}/year=!{timestamp:YYYY}/month=!{timestamp:MM}/day=!{timestamp:dd}/"
          Prefix: !Sub "dynamo-backup/aquaman/${TableName}/year=!{timestamp:YYYY}/month=!{timestamp:MM}/day=!{timestamp:dd}/"
          RoleARN: !GetAtt FirehoseDeliveryStreamRole.Arn
          CloudWatchLoggingOptions:
            Enabled: true
            LogGroupName: !Ref KinesisFireHoseBackupLogGroup
            LogStreamName: !Ref KinesisFireHoseBackupLogStream

      Tags:
      - Key: Name
        Value: !Select [ 1, !Split [ '-', !Ref 'AWS::StackName' ] ]
      - Key: Project
        Value: 'DataLake'
      - Key: Service
        Value: datalake
      - Key: Owner
        Value: Electron
      - Key: Department
        Value: Tech
      - Key: Stage
        Value: LMS
      - Key: Sub-Department
        Value: Privo