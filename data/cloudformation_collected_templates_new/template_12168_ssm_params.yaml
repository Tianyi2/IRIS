AWSTemplateFormatVersion: 2010-09-09
Description: Stack for SSM Parameter.

Parameters:
  EnvironmentType:
    Type: String
    Description: Environment of Deployment
    AllowedValues: [ "dev", "qa", "qa2", "uat", "int", "int2", "production" ]
    Default: "dev"

Resources:
  # Dynamodb Resources
  PrivoPartnerAppFormTable:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        ParamKey: "/mrp/privo/PARTNER-APPFORM-TABLE"
        ParamValue: !Sub "Privo-Partner-AppForm-Table"
      TemplateURL: Common/03_ssm_parameter.yaml

  PrivoPartnerMappingTable:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        ParamKey: "/mrp/privo/PARTNER-MAPPING-TABLE"
        ParamValue: !Sub "Privo-Partner-Mapping-Table"
      TemplateURL: Common/03_ssm_parameter.yaml

  # vkyc params
  PrivoVkycMaxAttempts:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        ParamKey: "/mrp/privo/MAX-KYC-ATTEMPTS"
        ParamValue: "3"
      TemplateURL: Common/03_ssm_parameter.yaml

  KsfMicrowebLinksTable:
    Type: AWS::CloudFormation::Stack
    Properties:
      Parameters:
        ParamKey: "/mrp/privo/KSF-MICROWEB-LINKS-TABLE"
        ParamValue: !Sub "Ksf-Microweb-Links-Table"
      TemplateURL: Common/03_ssm_parameter.yaml

