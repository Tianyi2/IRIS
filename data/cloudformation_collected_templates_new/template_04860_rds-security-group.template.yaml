AWSTemplateFormatVersion: "2010-09-09"

Description: 'This template creates the security group to allow communication from Deep Security Managers to their RDS Instance. (qs-1ngr590j9)'

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W8001

Parameters:
  AWSIVPC:
    Description: Existing VPC to deploy Deep Security Manager
    Type: AWS::EC2::VPC::Id
    AllowedPattern: '[-_a-zA-Z0-9]*'

  DBPEngine:
    Description: Choose PostgreSQL, MSSQL, Oracle or AuroraPostgreSQL for DSM database Engine
    Type: String
    AllowedValues:
      - SQL
      - Oracle
      - PostgreSQL
      - AuroraPostgreSQL
    Default: PostgreSQL

  DSMSG:
    Type: AWS::EC2::SecurityGroup::Id

Conditions:
  DBTypeIsOracle: !Equals
    - !Ref DBPEngine
    - Oracle

  DBTypeIsSQL: !Equals
    - !Ref DBPEngine
    - SQL

  DBTypeIsPostgreSQL: !Or
    - !Equals
      - !Ref DBPEngine
      - PostgreSQL
    - !Equals
      - !Ref DBPEngine
      - AuroraPostgreSQL

Resources:
  RDSSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow DSM to Database communication
      VpcId: !Ref AWSIVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !If
            - DBTypeIsOracle
            - 1521
            - !If
              - DBTypeIsPostgreSQL
              - 5432
              - 1433
          ToPort: !If
            - DBTypeIsOracle
            - 1521
            - !If
              - DBTypeIsPostgreSQL
              - 5432
              - 1433
          SourceSecurityGroupId: !Ref DSMSG
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: DSMRDSSG

Outputs:
  RDSSG:
    Value: !GetAtt RDSSG.GroupId
