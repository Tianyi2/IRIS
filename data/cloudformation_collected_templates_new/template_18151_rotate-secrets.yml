Resources:
  Secret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: my-secret
      Description: Database credentials
      SecretString: '{"username":"admin","password":"initial"}'
  RotationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SecretRotator
      Handler: rotate.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          def get_input(prompt):
              try:
                  return os.environ.get(prompt) or input(f"Enter {prompt}: ")
              except EOFError:
                  raise ValueError(f"{prompt} not provided")

          def lambda_handler(event, context):
              secret_arn = get_input('SECRET_ARN')
              sns_topic_arn = get_input('SNS_TOPIC_ARN')
              secretsmanager = boto3.client('secretsmanager')
              sns = boto3.client('sns')
              new_secret = secretsmanager.rotate_secret(SecretId=secret_arn)
              sns.publish(
                  TopicArn=sns_topic_arn,
                  Message=f"Secret {secret_arn} rotated successfully"
              )
              return {'statusCode': 200, 'body': json.dumps('Secret rotation complete')}
      Runtime: python3.9
      Timeout: 30
      Environment:
        Variables:
          SECRET_ARN: '{{SECRETS_MANAGER_ARN}}'  # Replace with your Secrets Manager ARN
          SNS_TOPIC_ARN: '{{SNS_TOPIC_ARN}}'  # Replace with your SNS Topic ARN
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecretRotationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:RotateSecret
                  - secretsmanager:GetSecretValue
                Resource: '{{SECRETS_MANAGER_ARN}}'  # Replace with your Secrets Manager ARN
              - Effect: Allow
                Action: sns:Publish
                Resource: '{{SNS_TOPIC_ARN}}'  # Replace with your SNS Topic ARN
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
  ScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Monthly secret rotation
      ScheduleExpression: rate(30 days)
      Targets:
        - Arn: !GetAtt RotationFunction.Arn
          Id: RotationFunctionTarget
  PermissionForEvents:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RotationFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScheduleRule.Arn
