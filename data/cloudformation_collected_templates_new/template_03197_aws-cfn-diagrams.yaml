  AWS::RDS::DBInstance:
    kind: cluster
    style: Database
    icon:
      classname:
        - when: (Engine or property(SourceDBInstanceIdentifier, "Engine")) == "MariaDB"
          then: diagrams.aws.database.RDSMariadbInstance
        - when: (Engine or property(SourceDBInstanceIdentifier, "Engine")) == "MySQL"
          then: diagrams.aws.database.RDSMysqlInstance
        - when: (Engine or property(SourceDBInstanceIdentifier, "Engine")) == "Oracle"
          then: diagrams.aws.database.RDSOracleInstance
        - when: (Engine or property(SourceDBInstanceIdentifier, "Engine")) == "PostgreSQL"
          then: diagrams.aws.database.RDSPostgresqlInstance
        - when: (Engine or property(SourceDBInstanceIdentifier, "Engine")) == "SqlServer"
          then: diagrams.aws.database.RDSSqlServerInstance
        - then: diagrams.aws.database.RDSInstance
    edges:
      - DBClusterIdentifier
      - DBParameterGroupName
      - DBSubnetGroupName
      - SourceDBInstanceIdentifier
      - VPCSecurityGroups
    parent_cluster_property:
      - SourceDBInstanceIdentifier
      - DBClusterIdentifier
