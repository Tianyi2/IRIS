AWSTemplateFormatVersion: 2010-09-09
Description: Stack for Amazon Redshift cookbook Chapter11
Parameters:
  CookbookIAMUserName:
    Type: String
    Description: cookbook iam user name
    Default: ''
  CookbookBucketName:
    Type: String
    Description: >-
      Session name must satisfy regular expression pattern
      ^[a-zA-Z0-9](-*[a-zA-Z0-9])*
    Default: ''
  RedshiftDWHRole:
    Type: String
    Description: redshift data warehouse role name
    Default: ''
Resources:
           
  Chapter11IAMPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      ManagedPolicyName: Chapter11IAMPolicy
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - 'redshift:*'
              - 'redshift-data:*'
              - 'secretsmanager:*'
              - 'logs:*'
              - 'sns:*'
              - 'cloudwatch:*'
              - 'cloudformation:*'
              - 'kms:*'
              - 'glue:*'
              - 'ec2:*'
              - 'iam:*'
              - s3:ListAllMyBuckets
              - s3:GetBucketLocation  
              - 'rds:*'
              - cloudtrail:DescribeTrails
              - 'cfn:*'
              - 'databrew:*'
              - 'appflow:*'
              - 'elasticache:*'
              - 'dataexchange:*'
              - 'quicksight:*'
			  - 'datazone:*'
            Resource:
              - '*'
          - Effect: Allow
            Action:
              - s3:*
            Resource:
              - !Sub "arn:aws:s3:::${CookbookBucketName}"
              - !Sub "arn:aws:s3:::${CookbookBucketName}/*"               
      Users:
        - !Ref CookbookIAMUserName
  Chapter11RedshiftPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${CookbookBucketName}'
              - !Sub 'arn:aws:s3:::${CookbookBucketName}/*'
          - Effect: Allow
            Action:
              - glue:*  
            Resource:
              - '*'    
          - Effect: Allow
            Action:
              - sagemaker:*  
            Resource:
              - '*'   
          - Effect: Allow
            Action:
              - bedrock:*  
            Resource:
              - '*'  
          - Effect: Allow
            Action:
              - lambda:*  
            Resource:
              - '*'                  
          - Effect: Allow
            Action:
              - secretsmanager:*
            Resource:
              - '*'                 
      Roles:
        - !Ref RedshiftDWHRole
  
  QuickSightRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: quicksight-role-1
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: quicksight.amazonaws.com
          Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
        - arn:aws:iam::aws:policy/service-role/AWSQuickSightDescribeRedshift

  QuicksightRolePolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
            - 'ec2:CreateNetworkInterface'
            - 'ec2:ModifyNetworkInterfaceAttribute'
            - 'ec2:DeleteNetworkInterface'
            - 'ec2:DescribeSubnets'
            - 'ec2:DescribeSecurityGroups'
            Resource: '*'
      Roles:
        - !Ref QuickSightRole
        
Outputs:
  Chapter11IAMPolicy:
    Description: IAM policy access for chapter 11
    Value: !Ref Chapter11IAMPolicy
  Chapter11RedshiftPolicy:
    Description: Chapter11 redshift policy
    Value: !Ref Chapter11RedshiftPolicy
  QuickSightRoleArn:
    Description: The ARN of the QuickSight role
    Value: !GetAtt QuickSightRole.Arn
           
