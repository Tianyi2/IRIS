AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation Template for SSM Parameters

Metadata:
  'AWS::CloudFormation::Interface':
    ParameterGroups:
      - Label:
          default: 'SSM Parameter Keys'
        Parameters:
          - ParamKey
          - ParamValue

    ParameterLabels:
      ParamKey:
        default: Param Key
      ParamValue:
        default: Param Value

Parameters:
  ParamKey:
    Description: 'Param Key'
    Type: String
  ParamValue:
    Description: 'Param Value'
    Type: String

Resources:
  SSMParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Ref ParamKey
      Type: String
      Value: !Ref ParamValue

Outputs:
  SsmParam:
    Description: Name of the SSM Parameter
    Value: !Ref SSMParameter
